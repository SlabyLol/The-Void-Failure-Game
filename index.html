<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>VOID_BREACH_V6_PRO</title>
    <style>
        :root { --red: #ff0000; --green: #00ff41; --monitor-color: #1a1a1a; }
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; background: #000; font-family: 'Courier New', monospace; overflow: hidden; color: #fff; }

        .office {
            position: relative; width: 100vw; height: 100vh;
            background: radial-gradient(circle at 50% 40%, #0a0a0a 0%, #000 90%);
            display: flex; justify-content: center; align-items: center;
        }

        /* STALKER - Viel unheimlicheres Design */
        #stalker {
            position: absolute;
            top: 480px; /* Startposition tief hinter dem Monitor */
            left: 50%; transform: translateX(-50%);
            width: 300px; z-index: 2;
            filter: brightness(0.2) blur(1px);
            transition: top 0.1s linear;
        }

        .monitor-case {
            width: 680px; height: 480px; background: var(--monitor-color);
            border-radius: 30px; border: 10px solid #222;
            position: relative; z-index: 10;
            box-shadow: 0 0 100px #000;
        }

        .screen {
            width: calc(100% - 60px); height: calc(100% - 60px);
            margin: 30px; background: #000; position: relative;
            overflow: hidden; border: 5px solid #111; border-radius: 15px;
        }

        /* Gameplay Styles */
        .view { width: 100%; height: 100%; display: none; flex-direction: column; align-items: center; justify-content: center; position: absolute; padding: 20px; box-sizing: border-box; text-align: center; }
        .active { display: flex; }
        #timer-bar { position: absolute; top: 0; left: 0; height: 6px; background: var(--red); width: 100%; z-index: 100; }
        .node { width: 50px; height: 50px; border: 1px solid #333; margin: 10px; cursor: pointer; display: inline-block; background: #050505; }
        .gauge { width: 250px; height: 30px; border: 1px solid #444; position: relative; }
        #needle { width: 4px; height: 100%; background: #fff; position: absolute; box-shadow: 0 0 10px #fff; }
        .target { position: absolute; width: 40px; height: 100%; background: rgba(255,0,0,0.5); left: 105px; }

        /* Story Scroll */
        #story-box { width: 90%; height: 180px; overflow: hidden; position: relative; border-top: 1px solid #222; }
        #story-content { position: absolute; width: 100%; top: 180px; color: var(--green); line-height: 2; font-size: 13px; text-align: left; }

        /* VERBESSERTER JUMPSCARE */
        #jumpscare { 
            position: fixed; top: 0; left: 0; width: 100%; height: 100%; 
            background: #000; z-index: 99999; display: none; 
            align-items: center; justify-content: center; overflow: hidden;
        }
        .scare-face { 
            width: 130%; height: 130%; 
            filter: contrast(300%) brightness(150%);
            animation: glitch-anim 0.05s infinite;
        }
        @keyframes glitch-anim {
            0% { transform: scale(1) translate(0); filter: invert(0); }
            20% { transform: scale(1.1) translate(-20px, 10px); }
            40% { transform: scale(1.05) translate(20px, -10px); filter: invert(1); }
            60% { transform: scale(1.15) translate(-10px, -20px); }
            80% { transform: scale(1) translate(15px, 15px); filter: invert(0.5); }
            100% { transform: scale(1.1) translate(0); }
        }
    </style>
</head>
<body>

<audio id="snd" src="c_jscare.mp3" preload="auto"></audio>

<div class="office">
    <div id="stalker">
        <svg viewBox="0 0 200 200">
            <path d="M100,20 C60,20 20,60 25,120 C30,180 80,195 110,190 C140,195 180,180 185,120 C190,60 140,20 100,20" fill="white" />
            <circle cx="70" cy="85" r="20" fill="black" /><circle cx="130" cy="85" r="20" fill="black" />
            <circle cx="70" cy="85" r="8" fill="red" /><circle cx="130" cy="85" r="8" fill="red" />
            <path d="M60,140 Q100,160 140,140" stroke="black" stroke-width="5" fill="none" />
        </svg>
    </div>

    <div class="monitor-case">
        <div class="screen">
            <div id="v-menu" class="view active">
                <h1 style="color:var(--green); letter-spacing: 5px;">VOID_ENTRY</h1>
                <button onclick="startTasks()" style="background:none; border:1px solid #444; color:#fff; padding:10px; cursor:pointer;">DECRYPT story-void.txt</button>
            </div>

            <div id="v-game" class="view">
                <div id="timer-bar"></div>
                <div id="game-stage"></div>
                <p id="info-text" style="font-size: 11px; margin-top: 15px; color: #666;"></p>
            </div>

            <div id="v-boss" class="view">
                <h2 style="color:red; animation: blink 0.2s infinite;">!!! CRITICAL SYSTEM BREACH !!!</h2>
                <div onclick="hitBoss()" style="cursor: crosshair; margin: 20px;">
                    <svg width="120" height="120" viewBox="0 0 100 100">
                        <circle cx="50" cy="50" r="45" fill="white" />
                        <circle cx="35" cy="40" r="8" fill="red" /><circle cx="65" cy="40" r="8" fill="red" />
                    </svg>
                </div>
                <div style="width: 200px; height: 10px; border: 1px solid red;">
                    <div id="hp-bar" style="width: 100%; height: 100%; background: red;"></div>
                </div>
            </div>

            <div id="v-story" class="view">
                <div id="story-box"><div id="story-content">Reading data...</div></div>
                <button id="re-btn" style="display:none; background:none; border:1px solid red; color:red; padding:10px; cursor:pointer;" onclick="rebootSequence()">SYSTEM REBOOT</button>
            </div>

            <div id="v-final" class="view">
                <h3>RESTORING KERNEL...</h3>
                <div style="width: 250px; height: 10px; border: 1px solid #333; margin-top: 20px;">
                    <div id="final-fill" style="width: 0%; height: 100%; background: var(--red);"></div>
                </div>
            </div>
        </div>
    </div>
</div>

<div id="jumpscare">
    <div class="scare-face">
        <svg viewBox="0 0 200 200">
            <path d="M100,20 C50,20 20,70 25,130 C30,190 80,205 110,200 C140,205 190,190 195,130 C200,70 150,20 100,20" fill="white" />
            <circle cx="60" cy="85" r="35" fill="red" />
            <circle cx="140" cy="85" r="35" fill="red" />
            <path d="M50,150 Q100,190 150,150" stroke="black" stroke-width="10" fill="none" />
        </svg>
    </div>
</div>

<script>
    let lvl = 1, bossHP = 15, timerInt, needleInt;
    const sfx = document.getElementById('snd');

    function showView(id) {
        document.querySelectorAll('.view').forEach(v => v.classList.remove('active'));
        document.getElementById(id).classList.add('active');
    }

    function startTasks() {
        showView('v-game');
        const stage = document.getElementById('game-stage');
        stage.innerHTML = '';
        
        if(lvl === 1) {
            document.getElementById('info-text').innerText = "CLEAN CORRUPTED NODES";
            startTimer(7);
            for(let i=0; i<4; i++) {
                let n = document.createElement('div'); n.className='node';
                n.onclick = function() { this.style.background='red'; this.classList.add('d'); if(document.querySelectorAll('.d').length==4) { lvl++; startTasks(); } };
                stage.appendChild(n);
            }
        } else if(lvl === 2) {
            document.getElementById('info-text').innerText = "SYNC DATA FREQUENCY";
            stage.innerHTML = '<div class="gauge"><div class="target"></div><div id="needle"></div></div>';
            startTimer(5);
            let p = 0, d = 1;
            needleInt = setInterval(() => {
                p += 5*d; if(p>=246 || p<=0) d*=-1;
                document.getElementById('needle').style.left = p+'px';
            }, 16);
            stage.onclick = () => { if(p>=105 && p<=145) { clearInterval(timerInt); clearInterval(needleInt); showView('v-boss'); } else { triggerJumpscare(); } };
        }
    }

    function startTimer(s) {
        let w = 100; clearInterval(timerInt);
        timerInt = setInterval(() => {
            w -= (100 / (s * 10));
            document.getElementById('timer-bar').style.width = w + "%";
            if(w <= 0) triggerJumpscare();
        }, 100);
    }

    function hitBoss() {
        bossHP--;
        document.getElementById('hp-bar').style.width = (bossHP * 6.7) + "%";
        if(bossHP <= 0) { showView('v-story'); loadFile(); }
    }

    async function loadFile() {
        try {
            const r = await fetch('story-void.txt');
            const t = await r.text();
            document.getElementById('story-content').innerText = t;
        } catch(e) {
            document.getElementById('story-content').innerText = "VOID_ERROR: story-void.txt not found. But he found you.";
        }
        let y = 180;
        const si = setInterval(() => {
            y -= 0.5; document.getElementById('story-content').style.top = y + "px";
            if(y < -300) { clearInterval(si); document.getElementById('re-btn').style.display='block'; }
        }, 30);
    }

    function rebootSequence() {
        showView('v-final');
        let p = 0;
        const stalker = document.getElementById('stalker');
        const fill = document.getElementById('final-fill');
        const fi = setInterval(() => {
            p += 0.3; fill.style.width = p + "%";
            // Kopf kommt langsam hoch
            stalker.style.top = (480 - (p * 4.3)) + "px";
            if(p >= 100) { clearInterval(fi); setTimeout(triggerJumpscare, 500); }
        }, 50);
    }

    function triggerJumpscare() {
        // Stoppt alle Timer, damit kein zweiter Jumpscare kommt
        clearInterval(timerInt);
        clearInterval(needleInt);
        sfx.play();
        document.getElementById('jumpscare').style.display = 'flex';
        setTimeout(() => location.reload(), 3000);
    }
</script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>VOID_FAILURE // THE_FINAL_MANIFESTATION</title>
    <style>
        :root { --fnaf-red: #800000; --fnaf-green: #0f380f; }
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; background: #000; font-family: 'Courier New', monospace; overflow: hidden; }

        /* Environment & Ambiance */
        .office { width: 110%; height: 110%; top: -5%; left: -5%; position: fixed; background: radial-gradient(circle at 50% 50%, #111 0%, #050505 70%, #000 100%); display: flex; justify-content: center; align-items: center; animation: breathe 10s infinite ease-in-out; }
        @keyframes breathe { 0%, 100% { transform: scale(1); filter: brightness(1); } 50% { transform: scale(1.02); filter: brightness(0.7); } }
        .scanlines { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: linear-gradient(rgba(18, 16, 16, 0) 50%, rgba(0, 0, 0, 0.4) 50%); background-size: 100% 3px; pointer-events: none; z-index: 1000; opacity: 0.4; }

        /* Monitor Hardware */
        .monitor { width: 640px; height: 500px; background: #0a0a0a; border-radius: 15px; padding: 10px; position: relative; box-shadow: 0 0 100px #000; border: 3px solid #151515; z-index: 10; transition: opacity 1.5s ease-in-out; }
        .screen { width: 100%; height: 100%; background: #010401; position: relative; overflow: hidden; border: 12px solid #050505; border-radius: 10px; }

        /* Start Menu & UI */
        .view { width: 100%; height: 100%; display: none; flex-direction: column; align-items: center; justify-content: center; text-align: center; }
        .active { display: flex; }
        .glitch-title { font-size: 50px; color: #fff; text-shadow: 3px 0 red, -3px 0 blue; animation: titleShake 0.1s infinite; letter-spacing: 8px; }
        @keyframes titleShake { 0% { transform: translate(1px, -1px); } 50% { transform: translate(-1px, 1px); clip-path: inset(10% 0 15% 0); } 100% { transform: translate(0); } }
        .btn { background: none; border: 1px solid #333; color: #555; padding: 12px 30px; margin: 10px; cursor: pointer; font-family: inherit; letter-spacing: 3px; transition: 0.2s; text-transform: uppercase; }
        .btn:hover { color: #fff; border-color: #fff; text-shadow: 0 0 15px red; background: #100; }

        /* Jumpscare: Corrupted Face */
        #jumpscare-layer { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #000; z-index: 9999; display: none; align-items: center; justify-content: center; }
        .scare-svg { width: 140%; height: 140%; filter: contrast(4) brightness(0.6); animation: intenseJitter 0.03s infinite; }
        @keyframes intenseJitter { 0% { transform: translate(15px, -10px) scale(1.1); } 50% { transform: translate(-20px, 15px) scale(1.2); } 100% { transform: translate(10px, 10px); } }

        /* THE BOSS (Level 5) */
        #scp-void { position: absolute; width: 550px; height: 550px; top: 50%; left: 50%; transform: translate(-50%, -50%) scale(0); opacity: 0; z-index: 200; cursor: pointer; pointer-events: none; transition: opacity 2s, filter 4s; }
        .void-mass { fill: #fff; filter: blur(4px); animation: voidPulse 3s infinite alternate; }
        @keyframes voidPulse { 0% { transform: scale(1) rotate(0deg); } 100% { transform: scale(1.1) rotate(5deg); } }

        /* Gameplay Elements */
        #timer-bar { width: 100%; height: 8px; background: var(--fnaf-red); position: absolute; top: 0; left: 0; box-shadow: 0 0 15px red; }
        .node { width: 45px; height: 45px; border: 2px solid #222; margin: 10px; cursor: pointer; display: inline-block; transition: 0.1s; }
        .target-zone { position: absolute; width: 45px; height: 100%; background: rgba(255,0,0,0.3); left: 127px; border-inline: 1px solid #f00; }
        #stab-bar { width: 4px; height: 100%; background: #fff; position: absolute; }

        /* Endings */
        #ending-screen { position: fixed; top:0; left:0; width:100%; height:100%; background:#000; z-index: 10000; display:none; flex-direction:column; align-items:center; justify-content:center; transition: background 6s; }
    </style>
</head>
<body>

<audio id="jscare-sound" src="c_jscare.mp3"></audio>
<div class="scanlines"></div>

<div class="office" id="bg-container">
    <div id="scp-void" onclick="attackVoid()">
        <svg viewBox="0 0 200 200" class="void-mass">
            <path d="M100,10 C130,40 170,20 180,80 C195,130 145,160 150,195 C100,180 45,195 25,140 C10,95 35,65 45,25 C70,45 100,10" />
            <circle id="eye-l" cx="70" cy="85" r="14" fill="red" opacity="0.8" />
            <circle id="eye-r" cx="130" cy="95" r="18" fill="red" opacity="0.8" />
            <circle id="pupil-l" cx="70" cy="85" r="5" fill="black" />
            <circle id="pupil-r" cx="130" cy="95" r="6" fill="black" />
        </svg>
    </div>

    <div class="monitor" id="mon-frame">
        <div class="screen">
            <div id="v-start" class="view active">
                <div class="glitch-title">VOID_FAILURE</div>
                <button class="btn" onclick="startGame()">INITIATE SYSTEM</button>
            </div>
            <div id="v-game" class="view">
                <div id="timer-bar"></div>
                <div id="game-zone"></div>
            </div>
            <div id="v-boss-pre" class="view">
                <h1 style="color:red; animation: titleShake 0.05s infinite;">HARDWARE CRITICAL</h1>
                <p>IT IS HERE.</p>
            </div>
        </div>
    </div>
</div>

<div id="jumpscare-layer">
    <svg class="scare-svg" viewBox="0 0 200 200">
        <path d="M100,15 C40,15 10,65 15,125 C20,185 70,200 100,195 C130,200 180,185 185,125 C190,65 160,15 100,15" fill="#111" stroke="#fff" stroke-width="2"/>
        <path d="M45,75 Q60,65 75,85 Q60,105 45,85 Z" fill="black" />
        <path d="M125,80 Q140,70 155,90 Q140,110 125,90 Z" fill="black" />
        <circle cx="60" cy="85" r="5" fill="red" />
        <circle cx="140" cy="90" r="4" fill="red" />
        <path d="M55,145 Q100,220 145,145 C120,135 80,135 55,145" fill="black" stroke="red" stroke-width="2.5"/>
    </svg>
</div>

<div id="ending-screen">
    <h1 id="end-title" style="color:white; letter-spacing:15px;">VOID_LOG</h1>
    <p id="end-desc" style="color:#555; width:70%; text-align:center;"></p>
    <button class="btn" onclick="location.reload()">REBOOT</button>
</div>

<script>
    let lvl = 1, timer, moveInterval, goodEndTimer;
    const sound = document.getElementById('jscare-sound');

    // Eye Tracking Logic for the Boss
    document.addEventListener('mousemove', (e) => {
        if (lvl === 5) {
            const pupils = [document.getElementById('pupil-l'), document.getElementById('pupil-r')];
            const centers = [{x: 70, y: 85}, {x: 130, y: 95}];
            pupils.forEach((p, i) => {
                let dx = (e.clientX - window.innerWidth/2) / 100;
                let dy = (e.clientY - window.innerHeight/2) / 100;
                p.setAttribute('cx', centers[i].x + dx);
                p.setAttribute('cy', centers[i].y + dy);
            });
        }
    });

    function showView(id) {
        document.querySelectorAll('.view').forEach(v => v.classList.remove('active'));
        document.getElementById('v-' + id).classList.add('active');
    }

    function startGame() {
        sound.play().then(() => { sound.pause(); sound.currentTime = 0; });
        lvl = 1; showView('game'); runLevel();
    }

    function runLevel() {
        const zone = document.getElementById('game-zone');
        zone.innerHTML = '';
        if (lvl === 5) { finale(); return; }

        startTimer(13 - (lvl * 2));

        if(lvl === 1) {
            zone.innerHTML = '<p>REBOOT NODES</p>';
            for(let i=0; i<3; i++) {
                let d = document.createElement('div'); d.className = 'node';
                d.onclick = function() { this.style.background="red"; this.classList.add('ok'); if(document.querySelectorAll('.ok').length==3) next(); };
                zone.appendChild(d);
            }
        } else if(lvl === 2) {
            zone.innerHTML = '<p>STABILIZE CORE</p><div style="width:300px; height:50px; border:1px solid #222; position:relative;" id="c"><div class="target-zone"></div><div id="stab-bar"></div></div>';
            let p = 0, dr = 1;
            moveInterval = setInterval(() => {
                p += (4 + lvl) * dr; if(p >= 296 || p <= 0) dr *= -1;
                document.getElementById('stab-bar').style.left = p + "px";
            }, 10);
            document.getElementById('c').onclick = () => {
                clearInterval(moveInterval);
                if(p >= 127 && p <= 172) next(); else sc();
            };
        } else if(lvl === 3) {
            zone.innerHTML = '<p>SYNC FREQUENCY</p><input type="range" id="k" min="0" max="100"><p id="v">SEARCHING...</p>';
            let t = Math.floor(Math.random() * 70) + 15;
            document.getElementById('k').oninput = (e) => {
                document.getElementById('v').innerText = e.target.value + " / " + t;
                if(Math.abs(e.target.value - t) < 3) next();
            };
        } else if(lvl === 4) {
            zone.innerHTML = '<p>DECRYPTION KEY</p>';
            let target = Math.floor(Math.random() * 8000) + 1000;
            zone.innerHTML += `<p style="color:red; font-size:24px;">${target}</p><input type="text" id="code" style="background:#000; color:#fff; border:1px solid #333; text-align:center;">`;
            const inp = document.getElementById('code'); inp.focus();
            inp.oninput = (e) => { if(e.target.value == target) next(); };
        }
    }

    function startTimer(s) {
        let w = 100; clearInterval(timer);
        timer = setInterval(() => {
            w -= (100 / (s * 10));
            document.getElementById('timer-bar').style.width = w + "%";
            if(w <= 0) sc();
        }, 100);
    }

    function next() { clearInterval(timer); lvl++; setTimeout(runLevel, 500); }

    function sc() {
        clearInterval(timer); clearInterval(moveInterval);
        sound.play();
        document.getElementById('jumpscare-layer').style.display = 'flex';
        setTimeout(() => location.reload(), 1600);
    }

    function finale() {
        clearInterval(timer);
        showView('boss-pre');
        setTimeout(() => {
            document.getElementById('mon-frame').style.opacity = "0";
            setTimeout(() => {
                document.getElementById('mon-frame').style.display = "none";
                const v = document.getElementById('scp-void');
                v.style.opacity = "1"; v.style.transform = "translate(-50%, -50%) scale(1.6)"; v.style.pointerEvents = "auto";
                goodEndTimer = setTimeout(goodEnding, 10000);
            }, 1500);
        }, 2000);
    }

    function attackVoid() {
        clearTimeout(goodEndTimer);
        const v = document.getElementById('scp-void');
        v.style.filter = "invert(1) blur(60px)";
        setTimeout(() => {
            document.getElementById('end-title').innerText = "BAD ENDING: EXTERMINATION";
            document.getElementById('end-desc').innerText = "You attacked the entity. The void is closed, but you are now truly alone in the dark.";
            document.getElementById('ending-screen').style.display = "flex";
        }, 4000);
    }

    function goodEnding() {
        document.body.style.background = "#fff";
        document.getElementById('ending-screen').style.background = "#fff";
        const v = document.getElementById('scp-void');
        v.style.filter = "brightness(5) blur(30px)";
        setTimeout(() => {
            document.getElementById('end-title').style.color = "#000";
            document.getElementById('end-title').innerText = "GOOD ENDING: MERCY";
            document.getElementById('end-desc').style.color = "#333";
            document.getElementById('end-desc').innerText = "By choosing not to attack, you found peace. The entity was only a mirror of your own fear.";
            document.getElementById('ending-screen').style.display = "flex";
        }, 6000);
    }
</script>
</body>
</html>

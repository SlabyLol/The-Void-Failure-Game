<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The Void Failure - Fixed Edition</title>
    <style>
        :root {
            --fnaf-green: #24ff15;
            --fnaf-red: #ff0000;
        }

        body, html {
            margin: 0; padding: 0; width: 100%; height: 100%;
            background: #000; color: var(--fnaf-green);
            font-family: 'Courier New', monospace; overflow: hidden;
            user-select: none;
        }

        /* Büro & Monitor */
        .office {
            width: 100%; height: 100%;
            background: radial-gradient(circle at 50% 40%, #1a1a1a 0%, #050505 70%, #000 100%);
            display: flex; justify-content: center; align-items: center;
            perspective: 1200px;
        }

        .desk {
            width: 800px; height: 500px; background: #121212;
            position: relative; transform: rotateX(15deg);
            border-top: 10px solid #0a0a0a; box-shadow: 0 60px 150px #000;
            display: flex; justify-content: center; align-items: center;
        }

        .monitor {
            width: 480px; height: 360px; background: #1a1a1a;
            border-radius: 12px; padding: 15px; position: relative;
            box-shadow: 0 0 50px #000; transform: translateZ(50px);
            transition: transform 0.1s, opacity 0.5s;
        }

        .screen {
            width: 100%; height: 100%; background: #040604;
            position: relative; overflow: hidden; border: 4px solid #000;
        }

        /* Jumpscare & Effekte */
        #jumpscare-layer {
            position: fixed; top:0; left:0; width:100%; height:100%;
            background: #000; z-index: 9999; display: none;
            align-items: center; justify-content: center;
        }

        .scary-face {
            width: 150%; height: 150%; fill: #500;
            animation: tremor 0.05s infinite;
        }

        .crack-overlay {
            position: absolute; top:0; left:0; width:100%; height:100%;
            background: url('https://www.transparenttextures.com/patterns/glass-knobs.png');
            background-size: cover; opacity: 0; z-index: 100; pointer-events: none;
            filter: invert(1);
        }

        /* SCP Void */
        #scp-void {
            position: absolute; width: 350px; height: 350px;
            top: 50%; left: 50%; transform: translate(-50%, -50%) scale(0);
            opacity: 0; z-index: 5; pointer-events: none;
            transition: transform 0.5s, opacity 0.5s;
        }

        /* UI */
        .view { width: 100%; height: 100%; display: none; flex-direction: column; align-items: center; justify-content: center; }
        .active { display: flex; }
        .btn { background: transparent; border: 1px solid var(--fnaf-green); color: var(--fnaf-green); padding: 10px 20px; margin: 10px; cursor: pointer; font-family: inherit; }
        .btn:hover { background: var(--fnaf-green); color: #000; }

        @keyframes tremor { 0% { transform: translate(5px, 5px); } 50% { transform: translate(-5px, -5px); } }
        @keyframes shake-monitor { 0% { transform: translateZ(50px) translate(2px, 2px); } 50% { transform: translateZ(50px) translate(-2px, -2px); } }
    </style>
</head>
<body>

<div id="jumpscare-layer">
    <svg class="scary-face" viewBox="0 0 200 200">
        <circle cx="60" cy="80" r="30" fill="red" />
        <circle cx="140" cy="80" r="30" fill="red" />
        <path d="M 30 150 Q 100 250 170 150" stroke="white" stroke-width="12" fill="none" />
    </svg>
</div>

<div class="office">
    <div id="scp-void">
        <svg viewBox="0 0 200 200">
            <path d="M100 0 L140 70 L200 100 L140 130 L100 200 L60 130 L0 100 L60 70 Z" fill="white" />
            <circle cx="75" cy="100" r="15" fill="red" />
            <circle cx="125" cy="100" r="15" fill="red" />
        </svg>
    </div>

    <div class="desk">
        <div class="monitor" id="monitor">
            <div class="screen">
                <div class="crack-overlay" id="crack"></div>
                
                <div id="v-start" class="view active">
                    <h1 style="color:white; letter-spacing: 3px;">VOID FAILURE</h1>
                    <button class="btn" onclick="startGame()">START SYSTEM</button>
                </div>

                <div id="v-game" class="view">
                    <div id="timer-bar" style="width:100%; height:6px; background:var(--fnaf-green); position:absolute; top:0;"></div>
                    <div id="game-zone"></div>
                </div>

                <div id="v-boss" class="view">
                    <h2 id="status-text">REPAIRING: 99%</h2>
                </div>
            </div>
        </div>
    </div>
</div>

<script>
    let lvl = 1;
    let timer;

    function startGame() {
        showView('game');
        runLevel();
    }

    function showView(id) {
        document.querySelectorAll('.view').forEach(v => v.classList.remove('active'));
        document.getElementById('v-' + id).classList.add('active');
    }

    function runLevel() {
        const zone = document.getElementById('game-zone');
        zone.innerHTML = '';
        if (lvl < 5) startTimer(7 - (lvl * 0.5));

        if (lvl === 1) { // Kabel
            zone.innerHTML = '<p>FIX ALL WIRES</p>';
            for(let i=0; i<3; i++) {
                let w = document.createElement('div');
                w.style = "width:50px;height:50px;border:2px solid #222;margin:10px;cursor:pointer";
                w.onclick = function() { this.style.background="red"; this.classList.add('done'); if(document.querySelectorAll('.done').length==3) nextLvl(); };
                zone.appendChild(w);
            }
        } else if (lvl === 2) { // 1-2-3
            zone.innerHTML = '<p>SEQUENCE 1-2-3</p>';
            [1,2,3].sort(()=>Math.random()-0.5).forEach(n => {
                let b = document.createElement('button'); b.className="btn"; b.innerText=n;
                b.onclick = function() { 
                    if(this.innerText == (document.querySelectorAll('.ok').length+1)) { 
                        this.classList.add('ok'); this.style.opacity=0.2; 
                        if(document.querySelectorAll('.ok').length==3) nextLvl(); 
                    } else triggerJumpscare(); 
                };
                zone.appendChild(b);
            });
        } else if (lvl === 3) { // Stabilizer
            zone.innerHTML = '<div id="disk" style="width:100px;height:100px;border:4px solid #333;border-radius:50%;position:relative"><div id="needle" style="width:3px;height:50px;background:white;position:absolute;left:48.5px;bottom:50%;transform-origin:bottom"></div></div><p>STOP AT TOP</p>';
            let deg = 0;
            let rot = setInterval(() => { 
                deg = (deg + 10) % 360; 
                if(document.getElementById('needle')) document.getElementById('needle').style.transform=`rotate(${deg}deg)`;
            }, 20);
            document.getElementById('disk').onclick = () => { if(deg < 30 || deg > 330) { clearInterval(rot); nextLvl(); } else { clearInterval(rot); triggerJumpscare(); } };
        } else if (lvl === 4) { // Klicks
            let c=0; let b=document.createElement('button'); b.className="btn"; b.innerText="OVERRIDE (15x)";
            b.onclick = () => { c++; b.innerText = 15-c; if(c>=15) nextLvl(); };
            zone.appendChild(b);
        } else {
            startEpicFinale();
        }
    }

    function startTimer(s) {
        let val = 100; clearInterval(timer);
        timer = setInterval(() => {
            val -= (100 / (s * 10));
            document.getElementById('timer-bar').style.width = val + "%";
            if(val <= 0) triggerJumpscare();
        }, 100);
    }

    function nextLvl() { lvl++; runLevel(); }

    function triggerJumpscare() {
        clearInterval(timer);
        document.getElementById('jumpscare-layer').style.display = 'flex';
        setTimeout(() => location.reload(), 1500);
    }

    function startEpicFinale() {
        clearInterval(timer);
        showView('boss');
        
        // 1. Monitor zittert
        setTimeout(() => {
            document.getElementById('monitor').style.animation = "shake-monitor 0.1s infinite";
        }, 1000);

        // 2. Screen zersplittert
        setTimeout(() => {
            document.getElementById('crack').style.opacity = "1";
            document.getElementById('status-text').innerText = "FATAL ERROR";
            document.getElementById('status-text').style.color = "red";
        }, 2500);

        // 3. SCP Void wirft Monitor weg & erscheint
        setTimeout(() => {
            const mon = document.getElementById('monitor');
            mon.style.transform = "translate(1200px, 400px) rotate(180deg)";
            mon.style.opacity = "0";

            const scp = document.getElementById('scp-void');
            scp.style.opacity = "1";
            scp.style.transform = "translate(-50%, -50%) scale(1.6)";
            scp.style.pointerEvents = "auto";
            
            // Finale: Auf SCP klicken um zu gewinnen
            scp.onclick = () => {
                scp.style.filter = "invert(1) hue-rotate(180deg)";
                scp.style.transform = "translate(-50%, -50%) scale(0)";
                setTimeout(() => {
                    alert("SYSTEM SECURED. SCP VOID PURGED.");
                    location.reload();
                }, 1000);
            };
        }, 4000);
    }
</script>
</body>
</html>

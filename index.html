<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>THE VOID FAILURE</title>
    <style>
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; background: #000; overflow: hidden; color: #fff; font-family: 'Courier New', Courier, monospace; }
        
        #game { width: 100%; height: 100%; display: flex; flex-direction: column; justify-content: center; align-items: center; cursor: none; position: relative; z-index: 2; }
        
        #creature-shadow {
            width: 300px; height: 300px;
            background: radial-gradient(circle, rgba(255,0,0,0.08) 0%, transparent 70%);
            border-radius: 50%; filter: blur(30px);
            position: absolute; pointer-events: none; transform: translate(-50%, -50%);
        }

        #jumpscare {
            position: fixed; top: 0; left: 0; width: 100vw; height: 100vh;
            display: none; background: #000; z-index: 9999;
            justify-content: center; align-items: center;
        }

        .scary-face {
            width: 120%; height: 120%;
            fill: #400; filter: drop-shadow(0 0 30px red);
            animation: vibrate 0.04s infinite;
        }

        @keyframes vibrate {
            0% { transform: scale(1.1) translate(5px, 5px); filter: invert(0); }
            25% { transform: scale(1.2) translate(-5px, 3px); }
            50% { transform: scale(1.1) translate(-2px, -5px); filter: invert(1); }
            75% { transform: scale(1.3) translate(4px, -2px); }
            100% { transform: scale(1.1) translate(0, 0); }
        }

        #never-back {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: #000; color: #f00; display: none; z-index: 10000;
            font-size: 1.5rem; font-weight: bold; overflow: hidden; 
            text-align: center; word-break: break-all; line-height: 0.8;
            animation: pulse-red 0.1s infinite;
        }

        @keyframes pulse-red {
            0% { color: #f00; }
            50% { color: #300; }
            100% { color: #f00; }
        }

        .instruction { font-size: 1.2rem; color: #333; text-align: center; z-index: 3; pointer-events: none; text-transform: uppercase; }
        #bad-msg { color: #ff0000; font-size: 4rem; display: none; z-index: 10001; font-weight: bold; text-shadow: 0 0 20px red; }
        
        #static-overlay {
            position: fixed; top:0; left:0; width:100%; height:100%;
            background: url('https://media.giphy.com/media/oEI9uWUicH9N6/giphy.gif');
            opacity: 0.03; pointer-events: none; z-index: 5;
        }
    </style>
</head>
<body>

<div id="static-overlay"></div>

<div id="game">
    <div id="creature-shadow"></div>
    <div id="instruction" class="instruction">Tippe, um tiefer in die Leere zu dringen...</div>
    <div id="bad-msg">ToO bAd :)</div>
</div>

<div id="jumpscare">
    <svg class="scary-face" viewBox="0 0 200 200">
        <path d="M 20 60 Q 50 10 100 10 Q 150 10 180 60 Q 200 120 100 190 Q 0 120 20 60" fill="#100" stroke="red" stroke-width="3"/>
        <circle cx="65" cy="75" r="18" fill="red" />
        <circle cx="135" cy="75" r="18" fill="red" />
        <path d="M 60 140 Q 100 180 140 140 L 135 150 Q 100 185 65 150 Z" fill="red" />
    </svg>
</div>

<div id="never-back"></div>

<audio id="audio-jumpscare" src="c_jscare.mp3"></audio>
<audio id="audio-neverback" src="ncb_loop.mp3" loop></audio>

<script>
    let level = 1;
    const game = document.getElementById('game');
    const shadow = document.getElementById('creature-shadow');
    const instr = document.getElementById('instruction');
    const badMsg = document.getElementById('bad-msg');
    
    const sJumpscare = document.getElementById('audio-jumpscare');
    const sNeverBack = document.getElementById('audio-neverback');

    // Schatten folgt Finger/Maus
    const moveHandler = (e) => {
        const x = e.clientX || e.touches[0].clientX;
        const y = e.clientY || e.touches[0].clientY;
        shadow.style.left = x + "px";
        shadow.style.top = y + "px";
    };
    window.addEventListener('mousemove', moveHandler);
    window.addEventListener('touchstart', moveHandler);

    // Klick-Fortschritt
    game.addEventListener('mousedown', () => {
        if(level < 5) {
            level++;
            if(level === 2) instr.innerText = "Level 2: Siehst du ihn?";
            if(level === 3) instr.innerText = "Level 3: Er kommt näher.";
            if(level === 4) instr.innerText = "Level 4: Fast geschafft...";
            if(level === 5) startLevel5();
        }
    });

    async function startLevel5() {
        instr.innerHTML = "SYSTEM ANFRAGE:<br>Mikrofon-Zugriff erforderlich für Level 5...";
        
        setTimeout(async () => {
            try {
                const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
                instr.innerHTML = "<span style='color:red; font-size:2rem;'>STILLE!<br>Sei leise. Er hört alles.</span>";
                monitorMic(stream);
            } catch (err) {
                // ABGELEHNT
                instr.style.display = "none";
                badMsg.style.display = "block";
                setTimeout(() => { triggerJumpscare(); }, 1000);
            }
        }, 2000);
    }

    function monitorMic(stream) {
        const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        const analyser = audioCtx.createAnalyser();
        const source = audioCtx.createMediaStreamSource(stream);
        source.connect(analyser);
        analyser.fftSize = 256;
        const data = new Uint8Array(analyser.frequencyBinCount);

        function check() {
            analyser.getByteFrequencyData(data);
            let vol = data.reduce((a, b) => a + b) / data.length;
            if (vol > 45) { // Empfindlichkeit für ca 50dB
                triggerJumpscare();
                stream.getTracks().forEach(t => t.stop());
            } else {
                requestAnimationFrame(check);
            }
        }
        check();
    }

    function triggerJumpscare() {
        document.getElementById('jumpscare').style.display = "flex";
        sJumpscare.play();
        if (navigator.vibrate) navigator.vibrate([1000, 500, 1000]);

        setTimeout(() => {
            document.getElementById('jumpscare').style.display = "none";
            showFinal();
        }, 1500); // Dauer des Jumpscares
    }

    function showFinal() {
        const final = document.getElementById('never-back');
        final.style.display = "block";
        sNeverBack.play();
        
        let txt = "";
        for(let i=0; i<4000; i++) txt += "NEVER COME BACK ";
        final.innerText = txt;
    }
</script>
</body>
</html>

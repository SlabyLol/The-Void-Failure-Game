<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>The Void Terminal</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="office">
        <div class="desk">
            <div class="tv-case">
                <div class="screen-border">
                    <div id="monitor" class="monitor-screen">
                        <div class="scanlines"></div>
                        <div class="vignette"></div>
                        
                        <div id="ui-overlay">
                            <div id="depth-display">DEPTH: <span id="depth-val">01</span></div>
                            <div class="battery-container">
                                <div id="timer-bar"></div>
                            </div>
                        </div>

                        <div id="content">
                            <div id="start-screen" class="view">
                                <h1 class="glitch" data-text="VOID_OS">VOID_OS</h1>
                                <button class="btn" onclick="initGame()">BOOT SYSTEM</button>
                            </div>

                            <div id="task-view" class="view" style="display:none;">
                                <div id="task-container"></div>
                            </div>

                            <div id="terminal-view" class="view" style="display:none;">
                                <div class="terminal-header">CRITICAL UPLOAD</div>
                                <div class="loading-area">
                                    <div id="upload-progress"></div>
                                </div>
                                <div id="terminal-logs"></div>
                                <div class="mic-indicator">VOICE_SENSOR: <span id="mic-status">ACTIVE</span></div>
                            </div>

                            <div id="boss-view" class="view" style="display:none;">
                                <div id="boss-target-circle"></div>
                                <div id="creature-silhouette"></div>
                                <img src="https://cdn-icons-png.flaticon.com/512/103/103362.png" id="knife-img" alt="Knife">
                            </div>
                        </div>
                    </div>
                </div>
                <div class="tv-knobs">
                    <div class="knob"></div>
                    <div class="knob"></div>
                </div>
            </div>
        </div>
    </div>

    <div id="jumpscare-layer">
        <div class="monster-face"></div>
    </div>

    <div id="fail-layer">
        <div id="fail-text"></div>
    </div>

    <div id="victory-layer" class="view" style="display:none;">
        <h1 class="cyan-glitch">SYSTEM SECURED</h1>
        <p>Thx for playing</p>
        <button class="btn" onclick="location.reload()">RESTART</button>
    </div>

    <audio id="snd-jscare" src="c_jscare.mp3"></audio>
    <audio id="snd-loop" src="ncb_loop.mp3" loop></audio>

    <script src="script.js"></script>
</body>
</html>

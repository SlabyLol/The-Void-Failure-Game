<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>The Void Failure Game</title>
    <style>
        :root { --fnaf-green: #24ff15; --fnaf-red: #ff0000; --terminal-bg: #050805; }
        
        body, html { 
            margin: 0; padding: 0; width: 100%; height: 100%; 
            background: #000; color: var(--fnaf-green); 
            font-family: 'Courier New', monospace; overflow: hidden; 
            user-select: none;
        }

        /* CRT EFFEKTE (Scanlines & Rauschen) */
        .crt-overlay { 
            position: fixed; top: 0; left: 0; width: 100%; height: 100%; 
            background: linear-gradient(rgba(18, 16, 16, 0) 50%, rgba(0, 0, 0, 0.1) 50%), 
                        linear-gradient(90deg, rgba(255, 0, 0, 0.03), rgba(0, 255, 0, 0.01), rgba(0, 0, 255, 0.03)); 
            z-index: 5000; pointer-events: none; background-size: 100% 3px, 3px 100%; opacity: 0.9; 
        }
        .vignette { 
            position: fixed; top: 0; left: 0; width: 100%; height: 100%; 
            box-shadow: inset 0 0 180px #000; z-index: 5001; pointer-events: none; 
        }

        #game-container { 
            position: relative; width: 100%; height: 100%; 
            display: flex; flex-direction: column; align-items: center; justify-content: center; 
        }

        /* TOP UI */
        #top-interface { 
            position: absolute; top: 30px; text-align: center; width: 100%; z-index: 100; 
        }
        .timer-shell { 
            width: 300px; height: 15px; border: 1px solid #222; margin: 10px auto; 
            background: #0a0000; overflow: hidden; border-radius: 2px;
        }
        #timer-bar { 
            width: 100%; height: 100%; background: var(--fnaf-green); 
            box-shadow: 0 0 15px var(--fnaf-green); transition: width 0.1s linear; 
        }

        /* GAME PANELS */
        .panel { 
            width: 380px; height: 480px; border: 4px solid #1a1a1a; 
            background: var(--terminal-bg); display: none; 
            flex-direction: column; align-items: center; justify-content: center; 
            position: relative; box-shadow: inset 0 0 60px #000; 
        }

        /* LEVEL 3 FIX: STABILIZER */
        #stab-disk { 
            width: 250px; height: 250px; border: 8px solid #111; border-radius: 50%; 
            position: relative; background: #010101; cursor: pointer; 
        }
        #stab-target-zone { 
            width: 60px; height: 35px; background: rgba(255, 0, 0, 0.4); 
            border: 2px solid red; position: absolute; top: -6px; left: 95px; 
            border-radius: 5px; box-shadow: 0 0 20px red; z-index: 1;
        }
        #stab-needle { 
            width: 6px; height: 120px; background: #fff; position: absolute; 
            bottom: 50%; left: calc(50% - 3px); transform-origin: bottom center; 
            box-shadow: 0 0 12px #fff; z-index: 2;
        }

        /* TASKS */
        .wire { width: 70px; height: 70px; border: 2px solid #333; margin: 15px; cursor: pointer; background: #000; }
        .wire.active { background: var(--fnaf-red); border-color: #fff; box-shadow: 0 0 25px red; }
        .num-btn { 
            width: 95px; height: 95px; background: #0a0a0a; border: 1px solid var(--fnaf-green); 
            color: var(--fnaf-green); font-size: 2.5rem; margin: 10px; cursor: pointer; 
        }
        .num-btn.done { opacity: 0.1; border-color: red; pointer-events: none; }

        /* BOSS BATTLE */
        #boss-creature { 
            width: 20px; height: 20px; background: #fff; border-radius: 50%; 
            filter: blur(15px); position: absolute; opacity: 0; top: 40%; 
        }
        #knife-sprite { 
            width: 130px; position: absolute; bottom: 30px; 
            filter: invert(1) brightness(1.5); transition: transform 0.1s; 
        }

        /* SCREENS */
        .full-screen { 
            position: fixed; top: 0; left: 0; width: 100%; height: 100%; 
            background: #000; z-index: 10000; display: flex; 
            flex-direction: column; align-items: center; justify-content: center; 
        }
        .btn-action { 
            padding: 20px 60px; background: transparent; border: 2px solid #444; 
            color: #666; cursor: pointer; font-family: inherit; font-size: 1.5rem; 
            letter-spacing: 10px; transition: 0.3s; 
        }
        .btn-action:hover { border-color: var(--fnaf-green); color: var(--fnaf-green); box-shadow: 0 0 30px var(--fnaf-green); }

        #jumpscare-box { 
            position: fixed; top: 0; left: 0; width: 100%; height: 100%; 
            background: #000; display: none; z-index: 20000; 
            align-items: center; justify-content: center; 
        }
        .jumpscare-monster { 
            width: 150%; height: 150%; fill: #200; 
            animation: jitter 0.04s infinite; 
        }

        #fail-text-wall { 
            position: fixed; top: 0; left: 0; width: 100%; height: 100%; 
            background: #000; color: #500; display: none; z-index: 30000; 
            word-break: break-all; overflow: hidden; font-size: 1.3rem; line-height: 0.6; 
        }

        @keyframes jitter { 
            0% { transform: scale(1.1) translate(10px, 10px); } 
            50% { transform: scale(1.15) translate(-10px, -10px); } 
            100% { transform: scale(1.1) translate(0,0); } 
        }
    </style>
</head>
<body>

    <div class="crt-overlay"></div>
    <div class="vignette"></div>

    <div id="game-container">
        <div id="top-interface">
            <div id="depth-indicator" style="letter-spacing: 5px; color: #444;">DEPTH_01</div>
            <div class="timer-shell"><div id="timer-bar"></div></div>
        </div>

        <div id="panel-tasks" class="panel"></div>

        <div id="panel-terminal" class="panel">
            <div style="font-size: 1.5rem; margin-bottom: 30px;">DECRYPTING... <span style="color:red">SHHH!</span></div>
            <div style="width: 85%; height: 20px; border: 1px solid var(--fnaf-green);">
                <div id="upload-fill" style="width:0%; height:100%; background: var(--fnaf-green);"></div>
            </div>
            <div id="terminal-logs" style="font-size: 0.7rem; margin-top: 40px; opacity: 0.4; width: 85%;"></div>
        </div>

        <div id="panel-boss" class="panel">
            <div id="boss-creature"></div>
            <div id="knife-sprite">
                <svg viewBox="0 0 50 150"><path d="M25 0 L45 80 L30 150 L20 150 L5 80 Z" fill="#fff" stroke="#fff"/></svg>
            </div>
            <div style="position:absolute; top:20px; color:red; font-size:0.8rem; letter-spacing:2px;">STRIKE_NOW</div>
        </div>
    </div>

    <div id="start-view" class="full-screen">
        <h1 style="letter-spacing: 15px; color: #111; margin-bottom: 60px;">THE VOID FAILURE</h1>
        <button class="btn-action" onclick="bootGame()">BOOT_SYSTEM</button>
    </div>

    <div id="jumpscare-box">
        <svg class="jumpscare-monster" viewBox="0 0 200 200">
            <circle cx="65" cy="80" r="20" fill="red"/><circle cx="135" cy="80" r="20" fill="red"/>
            <path d="M 40 155 Q 100 245 160 155" stroke="red" fill="none" stroke-width="12"/>
        </svg>
    </div>

    <div id="fail-text-wall"></div>

    <audio id="snd-jscare" src="c_jscare.mp3"></audio>
    <audio id="snd-loop" src="ncb_loop.mp3" loop></audio>

    <script>
        let level = 1;
        let timeLeft = 100;
        let timerInt, bossInt;
        const sndJscare = document.getElementById('snd-jscare');
        const sndLoop = document.getElementById('snd-loop');

        // Gehörschutz: Lautstärke
        sndJscare.volume = 0.5;
        sndLoop.volume = 0.4;

        function bootGame() {
            document.getElementById('start-view').style.display = 'none';
            // Audio Unlock
            sndJscare.play().then(() => { sndJscare.pause(); sndJscare.currentTime = 0; });
            loadLevel();
        }

        function loadLevel() {
            const p = document.getElementById('panel-tasks');
            p.style.display = 'flex';
            p.innerHTML = '';
            document.getElementById('depth-indicator').innerText = "DEPTH_0" + level;

            if (level === 1) { // Wires
                for(let i=0; i<3; i++) {
                    let w = document.createElement('div'); w.className = 'wire';
                    w.onclick = function() { this.classList.add('active'); if(document.querySelectorAll('.wire.active').length === 3) next(); };
                    p.appendChild(w);
                }
            } else if (level === 2) { // Sequence
                let goal = 1;
                [1,2,3].sort(()=>Math.random()-0.5).forEach(n => {
                    let b = document.createElement('button'); b.className = 'num-btn'; b.innerText = n;
                    b.onclick = function() { if(parseInt(this.innerText) === goal) { this.classList.add('done'); goal++; if(goal>3) next(); } else fail(); };
                    p.appendChild(b);
                });
            } else if (level === 3) { // STABILIZER (Corrected)
                let disk = document.createElement('div'); disk.id = 'stab-disk';
                let target = document.createElement('div'); target.id = 'stab-target-zone';
                let needle = document.createElement('div'); needle.id = 'stab-needle';
                let deg = 0;
                let rotate = setInterval(() => { deg = (deg + 8) % 360; needle.style.transform = `rotate(${deg}deg)`; }, 20);
                disk.onclick = () => { 
                    if(deg > 340 || deg < 20) { clearInterval(rotate); next(); } 
                    else fail(); 
                };
                disk.appendChild(target); disk.appendChild(needle); p.appendChild(disk);
            } else if (level === 4) { // Fast Click
                let h = 0;
                let b = document.createElement('button'); b.className = 'num-btn'; b.style.width = "250px"; b.innerText = "OVERRIDE";
                b.onclick = () => { h++; b.innerText = 12 - h; if(h >= 12) next(); };
                p.appendChild(b);
            } else {
                p.style.display = 'none';
                runLevel5Mic();
                return;
            }
            startTimer(12 - (level * 1.5));
        }

        function startTimer(s) {
            timeLeft = 100;
            clearInterval(timerInt);
            timerInt = setInterval(() => {
                timeLeft -= (0.1 / s) * 100;
                document.getElementById('timer-bar').style.width = timeLeft + "%";
                if(timeLeft <= 0) fail();
            }, 100);
        }

        function next() { level++; loadLevel(); }

        async function runLevel5Mic() {
            document.getElementById('panel-terminal').style.display = 'flex';
            document.getElementById('top-interface').style.display = 'none';
            let prg = 0;
            const logBox = document.getElementById('terminal-logs');
            const lines = ["> Syncing...", "> Bypass...", "> Soul.exe found.", "> Uploading...", "> WATCH OUT."];

            try {
                const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
                const audioCtx = new AudioContext();
                const analyser = audioCtx.createAnalyser();
                const source = audioCtx.createMediaStreamSource(stream);
                source.connect(analyser);
                const data = new Uint8Array(analyser.frequencyBinCount);

                const loop = setInterval(() => {
                    prg += 0.4;
                    document.getElementById('upload-fill').style.width = prg + "%";
                    if(Math.floor(prg) % 20 === 0 && prg % 1 === 0) logBox.innerHTML += lines[Math.floor(prg/21)] + "<br>";

                    analyser.getByteFrequencyData(data);
                    let vol = data.reduce((a,b)=>a+b)/data.length;
                    if(vol > 50) { clearInterval(loop); stream.getTracks().forEach(t=>t.stop()); fail(); }
                    if(prg >= 100) { clearInterval(loop); stream.getTracks().forEach(t=>t.stop()); runBossFight(); }
                }, 50);
            } catch(e) { fail(); }
        }

        function runBossFight() {
            document.getElementById('panel-terminal').style.display = 'none';
            document.getElementById('panel-boss').style.display = 'flex';
            let sz = 20;
            const cre = document.getElementById('boss-creature');
            bossInt = setInterval(() => {
                sz += 4; cre.style.width = sz + "px"; cre.style.height = sz + "px"; cre.style.opacity = sz/180;
                if(sz > 400) fail();
            }, 30);

            document.getElementById('panel-boss').onclick = () => {
                clearInterval(bossInt);
                document.getElementById('knife-sprite').style.transform = "translateY(-160px) rotate(-15deg)";
                if(sz > 90 && sz < 165) {
                    setTimeout(() => {
                        document.getElementById('panel-boss').style.display = 'none';
                        document.body.innerHTML = "<div class='full-screen'><h1 style='color:cyan'>SYSTEM_RESTORED</h1><p>Vielen Dank fürs Spielen!</p><button class='btn-action' onclick='location.reload()'>RESTART</button></div>";
                    }, 800);
                } else fail();
            };
        }

        function fail() {
            clearInterval(timerInt); clearInterval(bossInt);
            document.getElementById('jumpscare-box').style.display = 'flex';
            sndJscare.play();
            setTimeout(() => {
                document.getElementById('jumpscare-box').style.display = 'none';
                const wall = document.getElementById('fail-text-wall');
                wall.style.display = 'block';
                sndLoop.play();
                wall.innerText = "NEVER COME BACK ".repeat(3000);
            }, 1600);
        }
    </script>
</body>
</html>

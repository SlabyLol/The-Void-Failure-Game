<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>THE VOID FAILURE // FULL_RELEASE</title>
    <style>
        :root { --v-red: #720000; --v-glow: #ff0000; }
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; background: #000; font-family: 'Courier New', monospace; overflow: hidden; color: white; }

        /* Atmosphäre */
        .ambient { position: fixed; width: 100%; height: 100%; background: radial-gradient(circle, #0f0f0f 0%, #000 100%); display: flex; justify-content: center; align-items: center; }
        .crt-scan { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: linear-gradient(rgba(18, 16, 16, 0) 50%, rgba(0, 0, 0, 0.2) 50%); background-size: 100% 4px; pointer-events: none; z-index: 1000; opacity: 0.3; }

        /* Monitor Gehäuse */
        .monitor-frame { width: 660px; height: 500px; background: #080808; border: 4px solid #1a1a1a; position: relative; box-shadow: 0 0 100px #000; transition: transform 0.1s, opacity 1.5s; z-index: 5; }
        .screen { width: 100%; height: 100%; background: #010101; position: relative; overflow: hidden; border: 15px solid #050505; }

        /* Views */
        .view { width: 100%; height: 100%; display: none; flex-direction: column; align-items: center; justify-content: center; text-align: center; }
        .active { display: flex; }

        .title { font-size: 48px; font-weight: bold; text-shadow: 2px 0 red, -2px 0 blue; animation: shake 0.2s infinite; letter-spacing: 4px; color: #fff; }
        @keyframes shake { 0% { transform: translate(1px, 1px); } 50% { transform: translate(-1px, -1px); } 100% { transform: translate(0); } }

        .btn { background: none; border: 1px solid #444; color: #888; padding: 15px 40px; margin-top: 40px; cursor: pointer; font-family: inherit; letter-spacing: 2px; text-transform: uppercase; transition: 0.3s; }
        .btn:hover { color: #f00; border-color: #f00; box-shadow: 0 0 15px #f00; background: rgba(50,0,0,0.1); }

        /* Game Elements */
        #timer-bar { width: 100%; height: 8px; background: var(--v-red); position: absolute; top: 0; box-shadow: 0 0 10px red; }
        .node { width: 50px; height: 50px; border: 1px solid #222; margin: 10px; cursor: pointer; display: inline-block; background: #050505; }
        
        /* Die Nadel (Level 2) - JETZT LANGSAMER */
        .gauge-container { width: 300px; height: 50px; border: 1px solid #333; position: relative; margin: 20px auto; background: #050505; }
        .safe-zone { position: absolute; width: 60px; height: 100%; background: rgba(255,0,0,0.3); left: 120px; border-inline: 2px solid red; }
        #needle { width: 4px; height: 100%; background: #fff; position: absolute; box-shadow: 0 0 8px #fff; }

        /* BOSS: LEVEL 5 */
        #boss-room { position: fixed; width: 100%; height: 100%; top: 0; left: 0; display: none; justify-content: center; align-items: center; z-index: 2000; }
        .entity-svg { width: 700px; height: 700px; fill: white; filter: contrast(15) blur(1px); animation: breathing 0.1s infinite; cursor: crosshair; }
        @keyframes breathing { 0% { transform: scale(1); } 50% { transform: scale(1.03) translate(2px, -2px); } }

        /* Jumpscare */
        #jumpscare { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #000; z-index: 9999; display: none; align-items: center; justify-content: center; }
        .scare-img { width: 140%; height: 140%; animation: zoom 0.05s infinite; filter: saturate(3) contrast(2); }
        @keyframes zoom { 0% { transform: scale(1); } 50% { transform: scale(1.1); } }

        #final-screen { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #000; z-index: 10001; display: none; flex-direction: column; align-items: center; justify-content: center; color: #700; }
    </style>
</head>
<body>

<audio id="scare-snd" src="https://www.soundjay.com/buttons/beep-01a.mp3"></audio> <div class="crt-scan"></div>

<div class="ambient">
    <div class="monitor-frame" id="monitor">
        <div class="screen">
            <div id="v-start" class="view active">
                <div class="title">THE VOID FAILURE</div>
                <button class="btn" onclick="startGame()">SYSTEM START</button>
            </div>
            <div id="v-game" class="view">
                <div id="timer-bar"></div>
                <div id="game-ui" style="width: 100%;"></div>
            </div>
            <div id="v-error" class="view">
                <h1 style="color: red; animation: shake 0.05s infinite;">CRITICAL FAILURE</h1>
                <p>HARDWARE BREACH IN PROGRESS</p>
            </div>
        </div>
    </div>
</div>

<div id="boss-room">
    <div style="position: absolute; top: 10%; color: red; font-size: 20px; letter-spacing: 5px;">TERMINATE THE ENTITY</div>
    <svg viewBox="0 0 200 200" class="entity-svg" id="boss-body" onclick="hitBoss()">
        <path d="M100,10 C140,40 180,20 190,80 C200,140 150,160 160,200 C100,180 40,200 20,140 C0,80 40,60 50,20 C80,40 100,10" />
        <circle cx="70" cy="80" r="14" fill="red" />
        <circle cx="130" cy="85" r="16" fill="red" />
        <path d="M60,150 Q100,190 140,150" stroke="black" stroke-width="3" fill="none" />
    </svg>
    <div style="position: absolute; bottom: 50px; width: 60%; height: 10px; background: #200; border: 1px solid red;">
        <div id="boss-hp" style="width: 100%; height: 100%; background: red; box-shadow: 0 0 15px red;"></div>
    </div>
</div>

<div id="jumpscare">
    <svg class="scare-img" viewBox="0 0 200 200">
        <path d="M100,10 C40,10 10,60 15,120 C20,180 70,195 100,190 C130,195 180,180 185,120 C190,60 160,10 100,10" fill="#111" stroke="white" stroke-width="2"/>
        <circle cx="65" cy="80" r="15" fill="red" />
        <circle cx="135" cy="85" r="12" fill="red" />
        <path d="M40,140 L160,150 L100,195 Z" fill="black" stroke="red" />
    </svg>
</div>

<div id="final-screen">
    <h1 style="letter-spacing: 10px; font-size: 40px;">VOID_CONSUMED</h1>
    <p>THE FAILURE WAS INEVITABLE.</p>
    <button class="btn" onclick="location.reload()">REBOOT</button>
</div>

<script>
    let currentLvl = 1;
    let gameTimer;
    let needleInterval;
    let bossHealth = 100;

    function show(id) {
        document.querySelectorAll('.view').forEach(v => v.classList.remove('active'));
        document.getElementById('v-' + id).classList.add('active');
    }

    function startGame() {
        currentLvl = 1;
        show('game');
        loadLevel();
    }

    function loadLevel() {
        const ui = document.getElementById('game-ui');
        ui.innerHTML = '';
        
        if (currentLvl === 5) {
            startBossPhase();
            return;
        }

        // Timer Settings
        let seconds = (currentLvl === 3) ? 15 : 10;
        runTimer(seconds);

        if (currentLvl === 1) {
            ui.innerHTML = '<p>ACTIVATE NODES</p>';
            for(let i=0; i<4; i++) {
                let n = document.createElement('div'); n.className = 'node';
                n.onclick = function() { this.style.background = 'red'; this.classList.add('hit'); checkNodes(); };
                ui.appendChild(n);
            }
        } 
        else if (currentLvl === 2) {
            ui.innerHTML = '<p>STABILIZE CORE</p><div class="gauge-container"><div class="safe-zone"></div><div id="needle"></div></div><p>CLICK WHEN CENTERED</p>';
            let pos = 0; let dir = 1;
            // NADEL SPEED: 2.5 ist ein moderates Tempo
            needleInterval = setInterval(() => {
                pos += 2.5 * dir;
                if(pos >= 296 || pos <= 0) dir *= -1;
                document.getElementById('needle').style.left = pos + 'px';
            }, 10);
            document.querySelector('.gauge-container').onclick = () => {
                clearInterval(needleInterval);
                if(pos >= 120 && pos <= 180) nextLvl(); else triggerScare();
            };
        } 
        else if (currentLvl === 3) {
            ui.innerHTML = '<p>DECRYPT KEY</p>';
            let code = Math.floor(Math.random() * 9000) + 1000;
            ui.innerHTML += `<h2 style="color:red; font-size:30px; letter-spacing:5px;">${code}</h2><input type="text" id="codeIn" autocomplete="off" style="background:black; color:white; border:1px solid red; text-align:center; font-size:20px; outline:none;">`;
            const input = document.getElementById('codeIn');
            setTimeout(() => input.focus(), 50);
            input.oninput = () => { if(input.value == code) nextLvl(); };
        } 
        else if (currentLvl === 4) {
            ui.innerHTML = '<p>SYNC FREQUENCY</p><input type="range" id="slider" min="0" max="100" style="width:250px;"><p id="val">SCANNING...</p>';
            let target = Math.floor(Math.random() * 80) + 10;
            document.getElementById('slider').oninput = (e) => {
                document.getElementById('val').innerText = e.target.value + " / " + target;
                if(Math.abs(e.target.value - target) < 2) nextLvl();
            };
        }
    }

    function checkNodes() {
        if(document.querySelectorAll('.hit').length === 4) nextLvl();
    }

    function runTimer(s) {
        let w = 100;
        clearInterval(gameTimer);
        gameTimer = setInterval(() => {
            w -= (100 / (s * 10));
            document.getElementById('timer-bar').style.width = w + "%";
            if(w <= 0) triggerScare();
        }, 100);
    }

    function nextLvl() {
        clearInterval(gameTimer);
        clearInterval(needleInterval);
        currentLvl++;
        setTimeout(loadLevel, 400);
    }

    function triggerScare() {
        clearInterval(gameTimer);
        clearInterval(needleInterval);
        document.getElementById('jumpscare').style.display = 'flex';
        // Sound-Effekt hier abspielen (optional)
        setTimeout(() => location.reload(), 2000);
    }

    function startBossPhase() {
        clearInterval(gameTimer);
        show('error');
        setTimeout(() => {
            document.getElementById('monitor').style.opacity = "0";
            setTimeout(() => {
                document.getElementById('monitor').style.display = "none";
                document.getElementById('boss-room').style.display = "flex";
                // Boss Timer: 12 Sekunden zum Besiegen
                gameTimer = setTimeout(triggerScare, 12000);
            }, 1000);
        }, 2000);
    }

    function hitBoss() {
        bossHealth -= 4;
        document.getElementById('boss-hp').style.width = bossHealth + "%";
        document.body.style.background = "#200";
        setTimeout(() => document.body.style.background = "#000", 50);

        if(bossHealth <= 0) {
            clearTimeout(gameTimer);
            document.getElementById('boss-room').style.display = 'none';
            document.getElementById('final-screen').style.display = 'flex';
        }
    }
</script>

</body>
</html>

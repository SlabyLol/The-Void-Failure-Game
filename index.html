<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>VOID_BREACH_OFFICE_EDITION</title>
    <style>
        :root { --red: #ff0000; --green: #00ff41; --monitor-color: #2a2a2a; }
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; background: #020202; font-family: 'Courier New', monospace; overflow: hidden; color: #fff; }

        /* OFFICE SCENE */
        .office {
            position: relative; width: 100vw; height: 100vh;
            background: radial-gradient(circle at 50% 40%, #0d0d0d 0%, #000 85%);
            display: flex; justify-content: center; align-items: center;
        }

        .desk {
            position: absolute; bottom: 0; width: 100%; height: 25%;
            background: #080808; border-top: 4px solid #111; z-index: 5;
        }

        /* THE STALKER - Hiding behind the monitor casing */
        #stalker {
            position: absolute;
            top: 450px; /* Start deep behind the monitor */
            left: 50%; transform: translateX(-50%);
            width: 320px; z-index: 2;
            filter: brightness(0.3) grayscale(1);
            transition: top 0.1s linear;
        }

        /* CSS CRT MONITOR */
        .monitor-case {
            width: 700px; height: 500px; background: var(--monitor-color);
            border-radius: 40px; border: 12px solid #333;
            position: relative; z-index: 10;
            box-shadow: 0 0 100px #000, inset 0 0 50px #000;
        }

        .screen-bezel {
            width: calc(100% - 60px); height: calc(100% - 80px);
            margin: 30px auto; background: #111; border-radius: 20px;
            padding: 10px; box-shadow: inset 0 0 20px #000;
        }

        .screen {
            width: 100%; height: 100%; background: #000;
            position: relative; overflow: hidden; border-radius: 10px;
        }

        /* CRT SCANLINES */
        .screen::after {
            content: " "; position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background: linear-gradient(rgba(18, 16, 16, 0) 50%, rgba(0, 0, 0, 0.15) 50%);
            background-size: 100% 4px; pointer-events: none;
        }

        .view { width: 100%; height: 100%; display: none; flex-direction: column; align-items: center; justify-content: center; position: absolute; padding: 25px; box-sizing: border-box; text-align: center; }
        .active { display: flex; }

        /* TASKS */
        #timer-strip { position: absolute; top: 0; left: 0; height: 5px; background: var(--red); width: 100%; }
        .node { width: 50px; height: 50px; border: 2px solid #222; margin: 10px; cursor: pointer; display: inline-block; transition: 0.2s; }
        .gauge { width: 250px; height: 30px; border: 1px solid #333; position: relative; }
        #needle { width: 3px; height: 100%; background: #fff; position: absolute; left: 0; }
        .target { position: absolute; width: 40px; height: 100%; background: rgba(255,0,0,0.4); left: 105px; }

        /* STORY DISPLAY */
        #story-box { width: 90%; height: 200px; overflow: hidden; position: relative; border-top: 1px solid #222; margin-top: 10px; }
        #story-content { position: absolute; width: 100%; top: 200px; color: var(--green); line-height: 1.8; font-size: 13px; text-align: left; }

        .btn { background: transparent; border: 1px solid #444; color: #888; padding: 10px 20px; cursor: pointer; font-family: inherit; margin-top: 20px; }
        .btn:hover { border-color: #fff; color: #fff; }

        #jumpscare { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #000; z-index: 10000; display: none; align-items: center; justify-content: center; }
        .scare-svg { width: 150%; height: 150%; animation: flash 0.04s infinite; }
        @keyframes flash { 0% { filter: invert(0) scale(1); } 50% { filter: invert(1) scale(1.05); } }
    </style>
</head>
<body>

<audio id="scare-snd" src="c_jscare.mp3"></audio>

<div class="office">
    <div id="stalker">
        <svg viewBox="0 0 200 200">
            <path d="M100,20 C60,20 20,60 25,120 C30,180 80,195 110,190 C140,195 180,180 185,120 C190,60 140,20 100,20" fill="white" />
            <circle cx="70" cy="85" r="22" fill="black" /><circle cx="130" cy="85" r="22" fill="black" />
            <circle cx="70" cy="85" r="6" fill="red" /><circle cx="130" cy="85" r="6" fill="red" />
        </svg>
    </div>

    <div class="monitor-case">
        <div class="screen-bezel">
            <div class="screen">
                <div id="v-menu" class="view active">
                    <h1 style="color:var(--green); letter-spacing: 5px;">VOID_OS</h1>
                    <button class="btn" onclick="initTasks()">DECRYPT story-void.txt</button>
                </div>

                <div id="v-game" class="view">
                    <div id="timer-strip"></div>
                    <div id="stage-area"></div>
                    <p id="instruction" style="font-size: 11px; margin-top: 15px;"></p>
                </div>

                <div id="v-boss" class="view">
                    <h2 style="color:red; letter-spacing: 3px;">BREACH DETECTED</h2>
                    <div onclick="hitBoss()" style="cursor: crosshair;">
                        <svg width="130" height="130" viewBox="0 0 100 100">
                            <circle cx="50" cy="50" r="45" fill="white" />
                            <circle cx="35" cy="40" r="6" fill="red" /><circle cx="65" cy="40" r="6" fill="red" />
                        </svg>
                    </div>
                    <div style="width: 200px; height: 8px; border: 1px solid red; margin-top: 15px;">
                        <div id="hp-bar" style="width: 100%; height: 100%; background: red;"></div>
                    </div>
                </div>

                <div id="v-story" class="view">
                    <div id="story-box"><div id="story-content">Loading story-void.txt...</div></div>
                    <button id="reb-btn" class="btn" style="display:none;" onclick="startReboot()">REBOOT SYSTEM</button>
                </div>

                <div id="v-final" class="view">
                    <h3>SYSTEM RECOVERY...</h3>
                    <div style="width: 250px; height: 10px; border: 1px solid #333; margin-top: 20px;">
                        <div id="load-fill" style="width: 0%; height: 100%; background: var(--red);"></div>
                    </div>
                </div>
            </div>
        </div>
    </div>
    <div class="desk"></div>
</div>

<div id="jumpscare">
    <svg class="scare-svg" viewBox="0 0 200 200">
        <path d="M100,10 C40,10 10,60 15,120 C20,180 70,195 100,190 C130,195 180,180 185,120 C190,60 160,10 100,10" fill="white" />
        <circle cx="60" cy="80" r="35" fill="red" /><circle cx="140" cy="80" r="35" fill="red" />
    </svg>
</div>

<script>
    let currentLvl = 1, bossHP = 15, mainTimer, needleInt;
    const audio = document.getElementById('scare-snd');

    function show(id) {
        document.querySelectorAll('.view').forEach(v => v.classList.remove('active'));
        document.getElementById(id).classList.add('active');
    }

    function initTasks() {
        show('v-game');
        const area = document.getElementById('stage-area');
        area.innerHTML = ''; clearInterval(needleInt);
        
        if(currentLvl === 1) {
            document.getElementById('instruction').innerText = "STABILIZE SECTORS (0/4)";
            runTimer(8);
            for(let i=0; i<4; i++) {
                let n = document.createElement('div'); n.className='node';
                n.onclick = function() { 
                    this.style.background='red'; this.classList.add('done');
                    if(document.querySelectorAll('.done').length == 4) { currentLvl++; initTasks(); }
                };
                area.appendChild(n);
            }
        } else if(currentLvl === 2) {
            document.getElementById('instruction').innerText = "SYNC SIGNAL FREQUENCY";
            area.innerHTML = '<div class="gauge"><div class="target"></div><div id="needle"></div></div>';
            runTimer(6);
            let pos = 0, dir = 1;
            needleInt = setInterval(() => {
                pos += 5*dir; if(pos >= 247 || pos <= 0) dir *= -1;
                document.getElementById('needle').style.left = pos + 'px';
            }, 16);
            area.onclick = () => { 
                if(pos >= 105 && pos <= 145) { show('v-boss'); clearInterval(mainTimer); clearInterval(needleInt); } 
                else { triggerFail(); } 
            };
        }
    }

    function runTimer(sec) {
        let val = 100; clearInterval(mainTimer);
        mainTimer = setInterval(() => {
            val -= (100 / (sec * 10));
            document.getElementById('timer-strip').style.width = val + "%";
            if(val <= 0) triggerFail();
        }, 100);
    }

    function hitBoss() {
        bossHP--;
        document.getElementById('hp-bar').style.width = (bossHP * 6.7) + "%";
        if(bossHP <= 0) { show('v-story'); loadStoryFile(); }
    }

    async function loadStoryFile() {
        try {
            const resp = await fetch('story-void.txt');
            const txt = await resp.text();
            document.getElementById('story-content').innerText = txt;
        } catch(e) {
            document.getElementById('story-content').innerText = "ERROR: story-void.txt not found. But I am still here.";
        }
        scrollStory();
    }

    function scrollStory() {
        const content = document.getElementById('story-content');
        let y = 200;
        const si = setInterval(() => {
            y -= 0.5; content.style.top = y + "px";
            if(y < -300) { clearInterval(si); document.getElementById('reb-btn').style.display='block'; }
        }, 30);
    }

    function startReboot() {
        show('v-final');
        let p = 0;
        const stalker = document.getElementById('stalker');
        const load = document.getElementById('load-fill');
        const fi = setInterval(() => {
            p += 0.4; load.style.width = p + "%";
            // Head rising from behind
            let topPos = 450 - (p * 4.5); 
            stalker.style.top = topPos + "px";
            if(p >= 100) { clearInterval(fi); setTimeout(triggerFail, 800); }
        }, 50);
    }

    function triggerFail() {
        audio.play();
        document.getElementById('jumpscare').style.display = 'flex';
        setTimeout(() => location.reload(), 3000);
    }
</script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VOID_FAILURE // ERROR_SYSTEM_CRITICAL</title>
    <style>
        :root { 
            --fnaf-green: #15ff24; 
            --fnaf-red: #ff0000;
            --fnaf-crimson: #4a0000;
            --ui-border: rgba(36, 255, 21, 0.2);
            --glow: 0 0 20px rgba(255, 0, 0, 0.6);
        }
        
        body, html { 
            margin: 0; padding: 0; width: 100%; height: 100%; 
            background: #000; color: var(--fnaf-green); 
            font-family: 'Courier New', monospace; overflow: hidden; 
        }

        /* Ambient Scene with Shadow Movement */
        .office { 
            width: 110%; height: 110%; top: -5%; left: -5%; position: fixed;
            background: radial-gradient(circle at 50% 50%, #1a1a1a 0%, #080808 60%, #000 100%); 
            display: flex; justify-content: center; align-items: center; 
            transition: transform 0.1s ease-out;
            animation: darknessBreaks 15s infinite;
        }

        @keyframes darknessBreaks {
            0%, 100% { filter: brightness(1); }
            45% { filter: brightness(0.8) contrast(1.2); }
            47% { filter: brightness(0.2); }
            48% { filter: brightness(1.1); }
        }

        .scanlines {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: linear-gradient(rgba(18, 16, 16, 0) 50%, rgba(0, 0, 0, 0.3) 50%), 
                        linear-gradient(90deg, rgba(255, 0, 0, 0.05), rgba(0, 255, 0, 0.02), rgba(0, 0, 255, 0.05));
            background-size: 100% 2px, 3px 100%; pointer-events: none; z-index: 1000; opacity: 0.6;
        }

        /* Hardware Monitor */
        .monitor { 
            width: 600px; height: 460px; background: #0a0a0a; 
            border-radius: 20px; padding: 15px; position: relative; 
            box-shadow: 0 0 100px #000, inset 0 0 50px #000; 
            border: 6px solid #1a1a1a; transform-style: preserve-3d;
            z-index: 10;
        }

        .screen { 
            width: 100%; height: 100%; background: #010501; 
            position: relative; overflow: hidden; border: 10px solid #050505;
            border-radius: 10px; box-shadow: inset 0 0 40px rgba(0,0,0,1);
        }

        #crt-overlay {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background: url('crtb.png'); background-size: cover;
            opacity: 0.4; z-index: 100; pointer-events: none; mix-blend-mode: overlay;
        }

        /* Menu Glitch Effects */
        .view { width: 100%; height: 100%; display: none; flex-direction: column; align-items: center; justify-content: center; text-align: center; }
        .active { display: flex; }

        .glitch-text {
            font-size: 42px; letter-spacing: 15px; color: #fff;
            text-shadow: 2px 0 red, -2px 0 blue;
            animation: textGlitch 3s infinite;
        }

        @keyframes textGlitch {
            0% { transform: translate(0); }
            1% { transform: translate(-5px, 2px); }
            2% { transform: translate(5px, -2px); }
            3% { transform: translate(0); }
        }

        .btn { 
            background: rgba(0, 30, 0, 0.3); border: 1px solid var(--fnaf-green); 
            color: var(--fnaf-green); padding: 12px 35px; margin: 10px; 
            cursor: pointer; font-family: inherit; font-size: 14px; 
            text-transform: uppercase; letter-spacing: 5px; transition: 0.1s;
        }
        .btn:hover { background: var(--fnaf-red); color: #fff; border-color: #fff; box-shadow: var(--glow); }

        /* Gameplay Elements */
        #freq-container { width: 300px; height: 70px; border: 2px solid #333; position: relative; background: #000; cursor: crosshair; }
        .target-zone { position: absolute; width: 50px; height: 100%; background: rgba(255, 0, 0, 0.3); left: 125px; border-inline: 2px solid red; }
        #stab-bar { width: 4px; height: 100%; background: #fff; position: absolute; left: 0; box-shadow: 0 0 15px #fff; }

        /* THE JUMPSCARE (REWORKED) */
        #jumpscare-layer {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #000;
            z-index: 9999; display: none; align-items: center; justify-content: center;
        }
        .scare-face {
            width: 140%; height: 140%; fill: #fff;
            filter: contrast(5) brightness(0.6) blur(0.5px);
            animation: intenseJitter 0.03s infinite;
        }

        @keyframes intenseJitter {
            0% { transform: translate(10px, 10px) scale(1.1); filter: invert(0); }
            50% { transform: translate(-15px, 5px) scale(1.2); filter: invert(0.2); }
            100% { transform: translate(5px, -15px) scale(1.1); }
        }

        /* Ending Elements */
        #scp-void { position: absolute; width: 500px; height: 500px; top: 50%; left: 50%; transform: translate(-50%, -50%) scale(0); opacity: 0; z-index: 200; }
        #ending-screen { position: fixed; top:0; left:0; width:100%; height:100%; background: #000; z-index: 9000; display: none; flex-direction: column; align-items: center; justify-content: center; }
        #story-scroll { height: 400px; width: 80%; overflow: hidden; position: relative; mask-image: linear-gradient(transparent, #000 20%, #000 80%, transparent); }
        #story-content { position: absolute; width: 100%; color: #555; font-size: 16px; line-height: 2.5; top: 100%; animation: scrollText 50s linear infinite; white-space: pre-wrap; }
        
        @keyframes scrollText { from { top: 100%; } to { top: -300%; } }
    </style>
</head>
<body id="main-body">

<audio id="jumpscare-audio" src="c_jscare.mp3"></audio>
<div class="scanlines"></div>

<div class="office" id="parallax-bg">
    
    <div id="scp-void">
        <svg viewBox="0 0 200 200">
            <path d="M100 0 L135 60 L200 40 L160 110 L190 190 L100 150 L10 190 L40 110 L0 40 L65 60 Z" fill="#fff" />
            <circle cx="75" cy="95" r="18" fill="red" />
            <circle cx="125" cy="85" r="12" fill="red" />
            <circle cx="75" cy="95" r="6" fill="black" />
            <circle cx="125" cy="85" r="4" fill="black" />
        </svg>
        <img id="knife" style="display:none; position:absolute; top:30%; left:60%; width:80px;" src="data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 50 150'><path d='M25 0 L45 80 L30 150 L20 150 L5 80 Z' fill='silver' stroke='black'/></svg>">
    </div>

    <div class="monitor" id="monitor">
        <div class="screen">
            <div id="crt-overlay"></div>
            
            <div id="v-start" class="view active">
                <div class="glitch-text">VOID_FAILURE</div>
                <p style="color: #300; font-size: 10px; margin-top: -10px;">[CORE_UNSTABLE_REPAIR_REQUIRED]</p>
                <div style="margin-top: 40px;">
                    <button class="btn" onclick="startGame()">INITIALIZE</button><br>
                    <button class="btn" onclick="showView('settings')">CONFIG</button><br>
                    <button class="btn" onclick="showView('credits')">LOGS</button>
                </div>
            </div>

            <div id="v-settings" class="view">
                <h3>LEVEL_MODIFIER</h3>
                <select id="diff-select" class="btn">
                    <option value="1">SURVIVOR</option>
                    <option value="2" selected>VICTIM</option>
                    <option value="3">SLAUGHTER</option>
                </select>
                <button class="btn" onclick="showView('start')">BACK</button>
            </div>

            <div id="v-credits" class="view">
                <h3>SYSTEM_AUTHORS</h3>
                <p style="font-size: 12px;">ENTRY_01: DARKFOX</p>
                <p style="font-size: 12px; color:red;">ENTRY_02: IT_IS_WATCHING</p>
                <button class="btn" onclick="showView('start')">BACK</button>
            </div>

            <div id="v-game" class="view">
                <div id="timer-bar" style="width:100%; height:8px; background:var(--fnaf-red); position:absolute; top:0;"></div>
                <div id="game-zone"></div>
            </div>

            <div id="v-boss" class="view">
                <h1 style="color:red; animation: intenseJitter 0.1s infinite;">SYSTEM FAILURE</h1>
            </div>
        </div>
    </div>
</div>

<div id="jumpscare-layer">
    <svg class="scare-face" viewBox="0 0 200 200">
        <path d="M 100 20 C 40 20, 20 80, 25 130 C 35 180, 80 195, 100 195 C 120 195, 165 180, 175 130 C 180 80, 160 20, 100 20 Z" fill="#050505" stroke="#fff" stroke-width="0.5"/>
        <circle cx="65" cy="85" r="28" fill="#000" />
        <circle cx="135" cy="80" r="22" fill="#000" />
        <circle cx="68" cy="88" r="4" fill="#fff" opacity="0.8" />
        <circle cx="132" cy="82" r="3" fill="#fff" opacity="0.8" />
        <path d="M 55 145 Q 100 210 145 145 Q 100 135 55 145 Z" fill="#000" stroke="#400" stroke-width="3"/>
        <path d="M 60 115 L 55 135 M 140 110 L 145 130" stroke="red" stroke-width="1" />
    </svg>
</div>

<div id="dialog-box" style="display:none; position:fixed; bottom:40px; left:50%; transform:translateX(-50%); width:60%; border:1px solid red; background:#000; padding:20px; z-index:2000; cursor:pointer;" onclick="advanceDialog()">
    <div style="color:red; font-size:12px; margin-bottom:10px;">ENTITY_000:</div>
    <div id="dialog-text" style="color:#fff;">...</div>
</div>

<div id="ending-screen">
    <h1 style="letter-spacing: 20px; color:#fff;">THE END</h1>
    <div id="story-scroll"><div id="story-content">Loading legend...</div></div>
    <button class="btn" onclick="location.reload()">RESET SYSTEM</button>
</div>

<script>
    let lvl = 1, timer, isTrans = false, dialogStep = 0, moveInterval;
    const sound = document.getElementById('jumpscare-audio');

    // Parallax
    document.addEventListener('mousemove', (e) => {
        const x = (window.innerWidth / 2 - e.pageX) / 40;
        const y = (window.innerHeight / 2 - e.pageY) / 40;
        document.getElementById('parallax-bg').style.transform = `translate(${x}px, ${y}px)`;
    });

    async function loadStory() {
        try {
            const r = await fetch('story-void.txt');
            const txt = r.ok ? await r.text() : "The file story-void.txt is missing. The void remains silent.";
            document.getElementById('story-content').innerText = txt;
        } catch(e) { document.getElementById('story-content').innerText = "ERROR_DATA_CORRUPT."; }
    }

    function showView(id) {
        document.querySelectorAll('.view').forEach(v => v.classList.remove('active'));
        document.getElementById('v-' + id).classList.add('active');
    }

    function startGame() {
        loadStory();
        sound.play().then(() => { sound.pause(); sound.currentTime = 0; });
        // Start-Glitch
        document.getElementById('monitor').style.animation = "intenseJitter 0.05s 10";
        setTimeout(() => {
            lvl = 1; showView('game'); runLevel();
        }, 500);
    }

    function runLevel() {
        isTrans = false;
        const zone = document.getElementById('game-zone');
        zone.innerHTML = '';
        const d = parseInt(document.getElementById('diff-select').value);
        
        let timeBase = (lvl === 3) ? 14 : 11; 
        startTimer(timeBase - (lvl * 1.5) - (d * 2));

        if(lvl === 1) {
            zone.innerHTML = '<p style="font-size:12px;">REBOOT_NODES</p>';
            for(let i=0; i<3; i++) {
                let div = document.createElement('div');
                div.style = "width:55px; height:55px; border:2px solid var(--fnaf-green); margin:15px; cursor:pointer; display:inline-block; transition: 0.1s;";
                div.onclick = function() { if(isTrans) return; this.style.background="red"; this.classList.add('ok'); if(document.querySelectorAll('.ok').length==3) next(); };
                zone.appendChild(div);
            }
        } else if(lvl === 2) {
            zone.innerHTML = '<p style="font-size:12px;">STABILIZE_CORE</p><div id="freq-container"><div class="target-zone"></div><div id="stab-bar"></div></div>';
            let p = 0, dr = 1;
            moveInterval = setInterval(() => {
                p += (2.6 + (d * 0.8)) * dr; if(p >= 296 || p <= 0) dr *= -1;
                document.getElementById('stab-bar').style.left = p + "px";
            }, 10);
            document.getElementById('freq-container').onclick = () => {
                clearInterval(moveInterval);
                if(p >= 125 && p <= 175) next(); else sc();
            };
        } else if(lvl === 3) {
            zone.innerHTML = '<p style="font-size:12px;">MATCH_FREQUENCY</p><input type="range" id="knob" min="0" max="100" value="0"><p id="f-val" style="margin-top:15px; font-weight:bold; color:red;">??? Hz</p>';
            let target = Math.floor(Math.random() * 60) + 20;
            const k = document.getElementById('knob');
            k.oninput = () => {
                document.getElementById('f-val').innerText = `${k.value}Hz / ${target}Hz`;
                if(Math.abs(k.value - target) <= (5 - d)) next();
            };
        } else finale();
    }

    function startTimer(s) {
        let w = 100; clearInterval(timer);
        timer = setInterval(() => {
            w -= (100 / (s * 10));
            document.getElementById('timer-bar').style.width = w + "%";
            if(w <= 0) { clearInterval(moveInterval); sc(); }
        }, 100);
    }

    function next() { isTrans = true; clearInterval(timer); lvl++; setTimeout(runLevel, 600); }

    function sc() {
        isTrans = true; clearInterval(timer);
        sound.play();
        document.getElementById('main-body').style.animation = "intenseJitter 0.05s infinite";
        document.getElementById('jumpscare-layer').style.display = 'flex';
        setTimeout(() => location.reload(), 1800);
    }

    function finale() {
        clearInterval(timer); showView('boss');
        setTimeout(() => {
            document.getElementById('monitor').style.animation = "intenseJitter 0.05s infinite";
            setTimeout(() => {
                document.getElementById('monitor').style.display = "none";
                const v = document.getElementById('scp-void');
                v.style.opacity = "1"; v.style.transform = "translate(-50%, -50%) scale(1.5)"; v.style.pointerEvents = "auto";
                v.onclick = () => {
                    document.getElementById('knife').style.display = "block";
                    v.onclick = null;
                    setTimeout(() => { 
                        document.getElementById('dialog-box').style.display = "block"; 
                        advanceDialog(); 
                    }, 800);
                };
            }, 2000);
        }, 1500);
    }

    function advanceDialog() {
        dialogStep++;
        const t = document.getElementById('dialog-text');
        const lines = [
            "You found me... in the dark.",
            "I was never the error. You were.",
            "But now... we are both just code.",
            "Goodnight, User."
        ];
        if(dialogStep <= lines.length) {
            t.innerText = lines[dialogStep-1];
        } else {
            document.getElementById('dialog-box').style.display = "none";
            const v = document.getElementById('scp-void');
            v.style.transition = "all 5s cubic-bezier(0.9, 0, 0.1, 1)";
            v.style.filter = "invert(1) blur(50px)";
            v.style.transform = "translate(-50%, -50%) scale(0)";
            setTimeout(() => { document.getElementById('ending-screen').style.display = "flex"; }, 5000);
        }
    }
</script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VOID_FAILURE // DARKFOX CO. 2026</title>
    <style>
        :root { 
            --fnaf-green: #24ff15; 
            --fnaf-red: #ff0000;
            --ui-border: rgba(36, 255, 21, 0.4);
            --glow: 0 0 15px rgba(36, 255, 21, 0.5);
        }
        
        body, html { 
            margin: 0; padding: 0; width: 100%; height: 100%; 
            background: #000; color: var(--fnaf-green); 
            font-family: 'Courier New', monospace; overflow: hidden; 
        }

        /* Ambient Background & Vignette */
        .office { 
            width: 110%; height: 110%; top: -5%; left: -5%; position: fixed;
            background: radial-gradient(circle at 50% 50%, #151515 0%, #050505 70%, #000 100%); 
            display: flex; justify-content: center; align-items: center; 
            transition: transform 0.1s ease-out; /* Für Maus-Parallax */
        }

        /* Scanline Effect Overlay */
        .scanlines {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: linear-gradient(rgba(18, 16, 16, 0) 50%, rgba(0, 0, 0, 0.25) 50%), 
                        linear-gradient(90deg, rgba(255, 0, 0, 0.06), rgba(0, 255, 0, 0.02), rgba(0, 0, 255, 0.06));
            background-size: 100% 4px, 3px 100%; pointer-events: none; z-index: 1000;
        }

        /* Monitor Stylings */
        .monitor { 
            width: 580px; height: 440px; background: #111; 
            border-radius: 30px; padding: 20px; position: relative; 
            box-shadow: 0 50px 100px rgba(0,0,0,0.9), inset 0 0 30px #000; 
            border: 4px solid #222; transform-style: preserve-3d;
        }

        .screen { 
            width: 100%; height: 100%; background: #020402; 
            position: relative; overflow: hidden; border: 12px solid #0a0a0a;
            border-radius: 15px; box-shadow: inset 0 0 60px rgba(0,0,0,1);
        }

        #crt-overlay {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background: url('crtb.png'); background-size: cover;
            opacity: 0; z-index: 100; pointer-events: none; mix-blend-mode: overlay;
        }

        /* UI Elements */
        .view { width: 100%; height: 100%; display: none; flex-direction: column; align-items: center; justify-content: center; text-align: center; }
        .active { display: flex; }

        .btn { 
            background: transparent; border: 1px solid var(--fnaf-green); 
            color: var(--fnaf-green); padding: 12px 30px; margin: 8px; 
            cursor: pointer; font-family: inherit; font-size: 14px; 
            text-transform: uppercase; letter-spacing: 3px; transition: 0.2s;
            position: relative; overflow: hidden;
        }
        .btn:hover { background: var(--fnaf-green); color: #000; box-shadow: var(--glow); }

        /* Task Designs */
        #freq-container { width: 280px; height: 90px; border: 1px solid var(--ui-border); position: relative; display: flex; align-items: center; justify-content: center; background: rgba(0,20,0,0.2); }
        input[type=range] { width: 80%; accent-color: var(--fnaf-green); cursor: crosshair; }

        /* Void Entity */
        #scp-void { 
            position: absolute; width: 450px; height: 450px; top: 50%; left: 50%; 
            transform: translate(-50%, -50%) scale(0); opacity: 0; z-index: 200; 
            pointer-events: none; filter: drop-shadow(0 0 20px red);
        }
        
        #knife { 
            position: absolute; width: 100px; top: 25%; left: 58%; 
            transform: rotate(35deg); display: none; filter: drop-shadow(0 0 15px red); 
        }

        /* Cinematic Ending */
        #ending-screen { 
            position: fixed; top:0; left:0; width:100%; height:100%; 
            background: #000; z-index: 9000; display: none; 
            flex-direction: column; align-items: center; justify-content: center;
        }

        #story-scroll {
            height: 300px; width: 80%; overflow: hidden; position: relative;
            mask-image: linear-gradient(transparent, white 20%, white 80%, transparent);
        }
        #story-content {
            position: absolute; width: 100%; color: #aaa; font-size: 16px;
            line-height: 2; top: 100%; animation: scrollText 40s linear infinite;
        }

        @keyframes scrollText { from { top: 100%; } to { top: -200%; } }
        @keyframes glitch-shake { 
            0% { clip-path: inset(10% 0 30% 0); transform: translate(-5px, 5px); }
            50% { clip-path: inset(50% 0 10% 0); transform: translate(5px, -5px); }
            100% { clip-path: inset(10% 0 30% 0); transform: translate(0); }
        }
    </style>
</head>
<body>

<audio id="jumpscare-audio" src="c_jscare.mp3"></audio>
<div class="scanlines"></div>

<div class="office" id="bg-parallax">
    <div id="scp-void">
        <svg viewBox="0 0 200 200"><path d="M100 0 L140 70 L200 100 L140 130 L100 200 L60 130 L0 100 L60 70 Z" fill="white" /><circle cx="75" cy="100" r="15" fill="red" /><circle cx="125" cy="100" r="15" fill="red" /></svg>
        <img id="knife" src="data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 50 150'><path d='M25 0 L45 80 L30 150 L20 150 L5 80 Z' fill='silver' stroke='black'/></svg>">
    </div>

    <div class="monitor" id="monitor">
        <div class="screen">
            <div id="crt-overlay"></div>
            
            <div id="v-start" class="view active">
                <h1 style="letter-spacing: 8px; text-shadow: var(--glow);">VOID_FAILURE</h1>
                <p style="font-size: 10px; color: #333; margin-bottom: 30px;">// SECURE. CONTAIN. PROTECT.</p>
                <button class="btn" onclick="startGame()">ENTER TERMINAL</button>
                <button class="btn" onclick="showView('settings')">CONFIG</button>
                <button class="btn" onclick="showView('credits')">ACCESS LOGS</button>
                <div style="font-size: 9px; color: #222; margin-top: 20px;">© DARKFOX CO. 2026</div>
            </div>

            <div id="v-settings" class="view">
                <h3 style="letter-spacing: 5px;">SYSTEM CONFIG</h3>
                <label style="font-size: 11px; margin-top: 20px;">DIFFICULTY_LEVEL</label>
                <select id="diff-select" class="btn" style="background: #000;">
                    <option value="1">EASY_MODE</option>
                    <option value="2" selected>NORMAL_MODE</option>
                    <option value="3">VETERAN_MODE</option>
                </select>
                <button class="btn" onclick="showView('start')">RETURN</button>
            </div>

            <div id="v-credits" class="view">
                <h3>ACCESS LOGS</h3>
                <p style="font-size: 11px;">AUTH: <span style="color:white">DARKFOX</span></p>
                <p style="font-size: 11px;">ENGINE: DF_CORE_V4</p>
                <p style="font-size: 11px;">ASSET_01: C_JSCARE.MP3</p>
                <p style="font-size: 11px;">ASSET_02: CRTB.PNG</p>
                <button class="btn" onclick="showView('start')">RETURN</button>
            </div>

            <div id="v-game" class="view">
                <div id="timer-bar" style="width:100%; height:6px; background:var(--fnaf-green); position:absolute; top:0; box-shadow: var(--glow);"></div>
                <div id="game-zone"></div>
            </div>

            <div id="v-boss" class="view">
                <h2 id="status-text" style="animation: glitch-shake 0.2s infinite;">FATAL ERROR: 99%</h2>
            </div>
        </div>
    </div>
</div>

<div id="jumpscare-layer" style="position:fixed; top:0; left:0; width:100%; height:100%; background:#000; z-index:9999; display:none; align-items:center; justify-content:center;">
    <svg style="width:130%; height:130%; fill:red; filter: blur(2px);" viewBox="0 0 200 200">
        <circle cx="60" cy="70" r="30" /><circle cx="140" cy="70" r="30" />
        <path d="M 20 150 Q 100 250 180 150" stroke="white" stroke-width="15" fill="none" />
    </svg>
</div>

<div id="dialog-box" onclick="advanceDialog()">
    <div style="color:red; font-weight:bold; letter-spacing: 2px;">ENTITY_ID: VOID</div>
    <div id="dialog-text" style="margin-top:10px;">...</div>
</div>

<div id="ending-screen">
    <h1 style="color:white; letter-spacing: 10px;">THE END</h1>
    <div id="story-scroll">
        <div id="story-content"></div>
    </div>
    <button class="btn" onclick="location.reload()" style="margin-top:30px;">SYSTEM RESET</button>
</div>

<script>
    let lvl = 1;
    let timer;
    let isTrans = false;
    let dialogStep = 0;
    const jumpscareSound = document.getElementById('jumpscare-audio');

    // Cool Parallax Effect
    document.addEventListener('mousemove', (e) => {
        const x = (window.innerWidth / 2 - e.pageX) / 50;
        const y = (window.innerHeight / 2 - e.pageY) / 50;
        document.getElementById('bg-parallax').style.transform = `translate(${x}px, ${y}px)`;
    });

    // Load external story file
    async function fetchStory() {
        try {
            const r = await fetch('story-void.txt');
            const text = r.ok ? await r.text() : "The legend is missing (story-void.txt).";
            document.getElementById('story-content').innerText = text;
        } catch(e) { document.getElementById('story-content').innerText = "Error loading legend."; }
    }

    function showView(id) {
        document.querySelectorAll('.view').forEach(v => v.classList.remove('active'));
        document.getElementById('v-' + id).classList.add('active');
    }

    function startGame() {
        fetchStory();
        jumpscareSound.play().then(() => { jumpscareSound.pause(); jumpscareSound.currentTime=0; });
        lvl = 1;
        showView('game');
        runLevel();
    }

    function runLevel() {
        isTrans = false;
        const zone = document.getElementById('game-zone');
        zone.innerHTML = '';
        const d = parseInt(document.getElementById('diff-select').value);
        if(lvl < 4) startTimer(11 - (lvl * 2.5) - (d * 1.5));

        if(lvl === 1) {
            zone.innerHTML = '<p style="letter-spacing:3px">RECALIBRATE_SYSTEM</p>';
            for(let i=0; i<3; i++) {
                let div = document.createElement('div');
                div.style = "width:50px; height:50px; border:1px solid var(--fnaf-green); margin:15px; cursor:pointer; display:inline-block;";
                div.onclick = function() { if(isTrans) return; this.style.background="red"; this.classList.add('ok'); if(document.querySelectorAll('.ok').length==3) next(); };
                zone.appendChild(div);
            }
        } else if(lvl === 2) {
            zone.innerHTML = '<p>SIGNAL_STABILITY</p><div id="freq-container"><div style="width:40px; height:100%; background:rgba(255,0,0,0.4); position:absolute;"></div><div id="stab-bar" style="width:4px; height:100%; background:#fff; position:absolute; left:0; box-shadow:0 0 10px #fff;"></div></div>';
            let p = 0, dr = 1;
            let si = setInterval(() => {
                p += (2.8 + d) * dr; if(p >= 276 || p <= 0) dr *= -1;
                if(document.getElementById('stab-bar')) document.getElementById('stab-bar').style.left = p + "px";
            }, 10);
            document.getElementById('freq-container').onclick = () => {
                if(p > 110 && p < 150) { clearInterval(si); next(); } else { clearInterval(si); sc(); }
            };
        } else if(lvl === 3) {
            zone.innerHTML = '<p>FREQ_MATCH</p><input type="range" id="knob" min="0" max="100" value="0"><p id="f-val" style="margin-top:10px; font-size:12px;">SEARCHING...</p>';
            let target = Math.floor(Math.random() * 80) + 10;
            const k = document.getElementById('knob');
            k.oninput = () => {
                document.getElementById('f-val').innerText = `${k.value}Hz / TARGET: ${target}Hz`;
                if(Math.abs(k.value - target) < (4 - d)) next();
            };
        } else finale();
    }

    function startTimer(s) {
        let w = 100; clearInterval(timer);
        timer = setInterval(() => {
            w -= (100 / (s * 10));
            document.getElementById('timer-bar').style.width = w + "%";
            if(w <= 0) sc();
        }, 100);
    }

    function next() { isTrans = true; clearInterval(timer); lvl++; setTimeout(runLevel, 500); }

    function sc() {
        isTrans = true; clearInterval(timer);
        jumpscareSound.play();
        document.getElementById('jumpscare-layer').style.display='flex';
        setTimeout(() => location.reload(), 2000);
    }

    function finale() {
        clearInterval(timer); showView('boss');
        setTimeout(() => {
            document.getElementById('crt-overlay').style.opacity = "1";
            document.getElementById('monitor').style.animation = "shake-extreme 0.05s infinite";
            setTimeout(() => {
                document.getElementById('monitor').style.display = "none";
                const v = document.getElementById('scp-void');
                v.style.opacity = "1"; v.style.transform = "translate(-50%, -50%) scale(1.5)"; v.style.pointerEvents = "auto";
                v.onclick = () => {
                    document.getElementById('knife').style.display = "block";
                    v.onclick = null;
                    setTimeout(() => { document.getElementById('dialog-box').style.display = "block"; advanceDialog(); }, 600);
                };
            }, 2500);
        }, 1500);
    }

    function advanceDialog() {
        dialogStep++;
        const t = document.getElementById('dialog-text');
        if(dialogStep === 1) t.innerText = "W-why... why do you hunt me?";
        else if(dialogStep === 2) t.innerText = "I only wanted to see the light...";
        else if(dialogStep === 3) t.innerText = "You always reach for the blade first.";
        else {
            document.getElementById('dialog-box').style.display = "none";
            const v = document.getElementById('scp-void');
            v.style.transition = "all 4s";
            v.style.filter = "invert(1) blur(30px)";
            v.style.transform = "translate(-50%, -50%) scale(0)";
            setTimeout(() => { document.getElementById('ending-screen').style.display = "flex"; }, 4000);
        }
    }
</script>
</body>
</html>

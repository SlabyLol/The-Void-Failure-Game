<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>THE VOID FAILURE // FINAL_VERSION</title>
    <style>
        :root { --v-red: #8b0000; --v-neon: #ff0000; }
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; background: #000; font-family: 'Courier New', monospace; overflow: hidden; color: white; user-select: none; }

        /* CRT Filter & Visuals */
        .overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: linear-gradient(rgba(18, 16, 16, 0) 50%, rgba(0, 0, 0, 0.2) 50%); background-size: 100% 4px; pointer-events: none; z-index: 1000; }
        .ambient { position: fixed; width: 100%; height: 100%; background: radial-gradient(circle at center, #111 0%, #000 100%); display: flex; justify-content: center; align-items: center; }

        /* Monitor */
        .monitor { width: 700px; height: 500px; background: #0a0a0a; border: 6px solid #1a1a1a; border-radius: 10px; position: relative; box-shadow: 0 0 100px rgba(0,0,0,1); transition: opacity 1s, transform 0.1s; }
        .screen { width: calc(100% - 30px); height: calc(100% - 30px); margin: 15px; background: #020202; position: relative; overflow: hidden; border: 4px solid #050505; }

        /* Views */
        .view { width: 100%; height: 100%; display: none; flex-direction: column; align-items: center; justify-content: center; position: absolute; text-align: center; }
        .active { display: flex; }

        /* UI Elemente */
        .glitch-title { font-size: 50px; font-weight: bold; letter-spacing: 5px; color: #fff; text-shadow: 2px 0 var(--v-red), -2px 0 blue; animation: glitch 0.1s infinite; }
        @keyframes glitch { 0% { transform: translate(1px, 1px); } 50% { transform: translate(-1px, -1px); clip-path: inset(10% 0 20% 0); } 100% { transform: translate(0); } }

        .btn { background: none; border: 1px solid #444; color: #888; padding: 15px 40px; margin-top: 40px; cursor: pointer; font-family: inherit; letter-spacing: 3px; transition: 0.2s; text-transform: uppercase; font-size: 16px; }
        .btn:hover { color: #f00; border-color: #f00; box-shadow: 0 0 15px #f00; background: rgba(50,0,0,0.2); }

        /* Game Mechanics */
        #timer-bar { position: absolute; top: 0; left: 0; width: 100%; height: 8px; background: #111; }
        #timer-fill { height: 100%; width: 100%; background: var(--v-neon); box-shadow: 0 0 10px var(--v-neon); }

        .node { width: 60px; height: 60px; border: 1px solid #333; margin: 10px; cursor: pointer; display: inline-block; background: #050505; transition: background 0.1s; }
        
        /* Nadel (Level 2) */
        .gauge { width: 350px; height: 50px; border: 2px solid #333; position: relative; background: #000; margin-bottom: 10px; }
        .safe-zone { position: absolute; width: 60px; height: 100%; background: rgba(255, 0, 0, 0.3); left: 145px; border-left: 2px solid var(--v-neon); border-right: 2px solid var(--v-neon); }
        #needle { width: 4px; height: 100%; background: #fff; position: absolute; box-shadow: 0 0 8px #fff; left: 0; }

        /* Boss Fight */
        #boss-layer { position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: 2000; display: none; justify-content: center; align-items: center; background: #000; flex-direction: column; }
        .entity { width: 700px; height: 700px; fill: #fff; filter: contrast(15) blur(1px); animation: pulse 0.05s infinite; cursor: crosshair; }
        @keyframes pulse { 0% { transform: scale(1) translate(2px, -2px); } 50% { transform: scale(1.02) translate(-2px, 2px); } }

        /* Jumpscare */
        #jumpscare { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #000; z-index: 9999; display: none; align-items: center; justify-content: center; }
        .face { width: 150%; height: 150%; fill: #050505; animation: jitter 0.04s infinite; }
        @keyframes jitter { 0% { transform: scale(1) rotate(0deg); } 50% { transform: scale(1.1) rotate(2deg); filter: invert(0.2) saturate(5); } }

        /* End Screen */
        #death-screen { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #000; z-index: 10000; display: none; flex-direction: column; align-items: center; justify-content: center; }
    </style>
</head>
<body>

<audio id="sfx-scare" src="c_jscare.mp3" preload="auto"></audio>

<div class="overlay"></div>

<div class="ambient">
    <div class="monitor" id="main-mon">
        <div class="screen">
            
            <div id="view-start" class="view active">
                <div class="glitch-title">THE VOID FAILURE</div>
                <button class="btn" onclick="startGame()">INITIALIZE</button>
            </div>

            <div id="view-game" class="view">
                <div id="timer-bar"><div id="timer-fill"></div></div>
                <div id="task-area" style="width: 100%;"></div>
            </div>

            <div id="view-breach" class="view">
                <h1 style="color: var(--v-neon); animation: glitch 0.1s infinite;">SYSTEM BREACHED</h1>
                <p>HARDWARE DISSOLVING...</p>
            </div>

        </div>
    </div>
</div>

<div id="boss-layer">
    <svg viewBox="0 0 200 200" class="entity" onclick="hitBoss()">
        <path d="M100,10 C140,40 180,20 190,80 C200,140 150,160 160,200 C100,180 40,200 20,140 C0,80 40,60 50,20 C80,40 100,10" />
        <circle cx="70" cy="80" r="14" fill="red" />
        <circle cx="130" cy="85" r="16" fill="red" />
        <circle cx="70" cy="80" r="4" fill="black" />
        <circle cx="130" cy="85" r="5" fill="black" />
        <path d="M60,150 Q100,190 140,150" stroke="black" stroke-width="3" fill="none" />
    </svg>
    <div style="width: 60%; height: 8px; background: #222; border: 1px solid #444; margin-top: 20px;">
        <div id="boss-hp" style="width: 100%; height: 100%; background: red; box-shadow: 0 0 15px red;"></div>
    </div>
</div>

<div id="jumpscare">
    <svg class="face" viewBox="0 0 200 200">
        <path d="M100,10 C40,10 10,60 15,120 C20,180 70,195 100,190 C130,195 180,180 185,120 C190,60 160,10 100,10" stroke="white" stroke-width="2"/>
        <circle cx="65" cy="80" r="12" fill="red" />
        <circle cx="135" cy="85" r="10" fill="red" />
        <path d="M40,140 L160,150 L100,195 Z" fill="black" stroke="red" />
    </svg>
</div>

<div id="death-screen">
    <h1 style="color: #600; font-size: 50px; letter-spacing: 15px;">VOID CONSUMED</h1>
    <p style="color: #333;">NOTHING REMAINS.</p>
    <button class="btn" onclick="location.reload()">RESTART</button>
</div>

<script>
    let currentLvl = 1;
    let mainTimer, actionInterval;
    let bossHealth = 100;
    const scareSound = document.getElementById('sfx-scare');

    function switchView(id) {
        document.querySelectorAll('.view').forEach(v => v.classList.remove('active'));
        document.getElementById('view-' + id).classList.add('active');
    }

    function startGame() {
        // Initiiere Audio (Browser Policy)
        scareSound.volume = 0;
        scareSound.play().then(() => { scareSound.pause(); scareSound.currentTime = 0; scareSound.volume = 1; }).catch(e => console.log(e));
        
        currentLvl = 1;
        switchView('game');
        runLevel();
    }

    function runLevel() {
        const area = document.getElementById('task-area');
        area.innerHTML = '';
        clearInterval(actionInterval);

        if (currentLvl === 5) {
            initBossPhase();
            return;
        }

        // Timer Logik: Level 3 (Tippen) bekommt 14 Sekunden, der Rest 10 Sekunden.
        let timeAllowed = (currentLvl === 3) ? 14 : 10;
        startTimer(timeAllowed);

        // LEVEL 1: NODES
        if (currentLvl === 1) {
            area.innerHTML = '<p style="color:red; margin-bottom:20px;">REBOOT NODES</p>';
            for(let i=0; i<4; i++) {
                let node = document.createElement('div');
                node.className = 'node';
                node.onclick = function() { 
                    this.style.background = 'red'; 
                    this.classList.add('active-node'); 
                    if(document.querySelectorAll('.active-node').length === 4) advance();
                };
                area.appendChild(node);
            }
        } 
        // LEVEL 2: DIE NADEL (Fair & Langsamer)
        else if (currentLvl === 2) {
            area.innerHTML = '<p style="color:red;">STABILIZE CORE</p><div class="gauge" id="gauge-box"><div class="safe-zone"></div><div id="needle"></div></div><p style="font-size:12px; color:#555;">CLICK GAUGE TO STOP</p>';
            let pos = 0; 
            let direction = 1;
            // Konstante, faire Geschwindigkeit (3.5 Pixel pro Tick)
            actionInterval = setInterval(() => {
                pos += 3.5 * direction;
                if(pos >= 346 || pos <= 0) direction *= -1;
                document.getElementById('needle').style.left = pos + 'px';
            }, 15);

            document.getElementById('gauge-box').onclick = () => {
                clearInterval(actionInterval);
                // Safe Zone ist zwischen 145px und 205px
                if(pos >= 135 && pos <= 215) advance(); 
                else killPlayer();
            };
        }
        // LEVEL 3: DECRYPT (Tippen)
        else if (currentLvl === 3) {
            let code = Math.floor(Math.random() * 8999) + 1000;
            area.innerHTML = `<p style="color:red;">DECRYPT KEY</p><h1 style="color:white; font-size:40px; letter-spacing:10px;">${code}</h1><input type="text" id="codeInput" autocomplete="off" style="background:black; color:red; border:2px solid red; text-align:center; font-family:inherit; font-size:24px; outline:none; padding:5px; width:150px;">`;
            const inputField = document.getElementById('codeInput');
            setTimeout(() => inputField.focus(), 50);
            inputField.oninput = () => { if(inputField.value == code) advance(); };
        }
        // LEVEL 4: SYNC
        else if (currentLvl === 4) {
            area.innerHTML = '<p style="color:red;">SYNC FREQUENCY</p><input type="range" id="freqSlider" min="0" max="100" style="width:250px; cursor:pointer; margin: 20px 0;"><h2 id="freqVal" style="color:white;">SCANNING...</h2>';
            let targetNum = Math.floor(Math.random() * 80) + 10;
            const slider = document.getElementById('freqSlider');
            slider.oninput = () => {
                document.getElementById('freqVal').innerText = slider.value + " / " + targetNum;
                if(Math.abs(slider.value - targetNum) <= 2) advance();
            };
        }
    }

    function startTimer(seconds) {
        let width = 100;
        clearInterval(mainTimer);
        const fill = document.getElementById('timer-fill');
        mainTimer = setInterval(() => {
            width -= (100 / (seconds * 10));
            fill.style.width = width + "%";
            if(width <= 0) killPlayer();
        }, 100);
    }

    function advance() {
        clearInterval(mainTimer);
        clearInterval(actionInterval);
        currentLvl++;
        setTimeout(runLevel, 300);
    }

    function killPlayer() {
        clearInterval(mainTimer);
        clearInterval(actionInterval);
        
        // Jumpscare auslösen
        scareSound.currentTime = 0;
        scareSound.play().catch(e => console.log("Audio play failed:", e));
        
        document.getElementById('jumpscare').style.display = 'flex';
        document.getElementById('main-mon').style.transform = 'scale(1.2) rotate(3deg)';
        
        // Reload nach 1.5 Sekunden
        setTimeout(() => location.reload(), 1500);
    }

    function initBossPhase() {
        clearInterval(mainTimer);
        switchView('breach');
        
        setTimeout(() => {
            // Monitor verschwindet
            document.getElementById('main-mon').style.opacity = "0";
            
            setTimeout(() => {
                document.getElementById('main-mon').style.display = "none";
                document.getElementById('boss-layer').style.display = 'flex';
                
                // Du hast 12 Sekunden Zeit, den Boss zu besiegen, sonst Jumpscare
                mainTimer = setTimeout(killPlayer, 12000);
            }, 1000);
        }, 2000);
    }

    function hitBoss() {
        bossHealth -= 5;
        document.getElementById('boss-hp').style.width = bossHealth + "%";
        
        // Visuelles Feedback beim Klicken
        document.body.style.background = "#300";
        setTimeout(() => document.body.style.background = "#000", 50);

        if(bossHealth <= 0) {
            clearTimeout(mainTimer);
            document.getElementById('boss-layer').style.display = 'none';
            document.getElementById('death-screen').style.display = 'flex';
        }
    }
</script>

</body>
</html>

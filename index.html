<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VOID_BREACH_ULTIMATE_OFFICE</title>
    <style>
        :root {
            --red: #ff0000;
            --green: #00ff41;
            --case: #1a1a1a;
            --glow: rgba(0, 255, 65, 0.1);
        }

        body, html {
            margin: 0; padding: 0; width: 100%; height: 100%;
            background: #000; font-family: 'Courier New', monospace;
            overflow: hidden; color: #fff;
        }

        /* --- BÜRO ATMOSPHÄRE --- */
        .office {
            position: relative; width: 100vw; height: 100vh;
            background: radial-gradient(circle at 50% 40%, #111 0%, #000 85%);
            display: flex; justify-content: center; align-items: center;
        }

        /* Schreibtisch */
        .desk {
            position: absolute; bottom: 0; width: 100%; height: 280px;
            background: linear-gradient(to bottom, #0a0a0a 0%, #000 100%);
            border-top: 3px solid #1a1a1a; z-index: 5;
        }

        .keyboard {
            position: absolute; bottom: 60px; left: 50%; transform: translateX(-50%);
            width: 500px; height: 140px; background: #080808; border-radius: 5px;
            border: 1px solid #222; opacity: 0.5; box-shadow: 0 0 20px #000;
        }

        .mouse {
            position: absolute; bottom: 80px; right: 15%;
            width: 70px; height: 110px; background: #080808;
            border-radius: 35px; border: 1px solid #222; opacity: 0.5;
        }

        /* Lichtschein an der Wand */
        .monitor-light {
            position: absolute; width: 700px; height: 500px;
            background: var(--glow); filter: blur(100px);
            z-index: 1; pointer-events: none;
        }

        /* --- DER STALKER (Hinter dem PC) --- */
        #stalker {
            position: absolute;
            top: 500px; /* Versteckt */
            left: 50%; transform: translateX(-50%);
            width: 360px; z-index: 2;
            filter: brightness(0.2) blur(1px);
            transition: top 0.1s linear;
        }

        /* --- DER MONITOR --- */
        .monitor-frame {
            width: 760px; height: 560px; background: var(--case);
            border-radius: 45px; border: 15px solid #282828;
            position: relative; z-index: 10;
            box-shadow: 0 30px 100px #000, inset 0 0 50px #000;
            display: flex; justify-content: center; align-items: center;
        }

        .bezel {
            width: 90%; height: 86%; background: #0f0f0f;
            border-radius: 25px; padding: 15px; box-shadow: inset 0 0 40px #000;
        }

        .screen {
            width: 100%; height: 100%; background: #050505;
            position: relative; overflow: hidden; border-radius: 15px;
            border: 4px solid #000;
        }

        /* Scanlines */
        .screen::after {
            content: ""; position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background: linear-gradient(rgba(18, 16, 16, 0) 50%, rgba(0, 0, 0, 0.2) 50%);
            background-size: 100% 4px; pointer-events: none; z-index: 50;
        }

        /* --- GAMEPLAY --- */
        .view {
            width: 100%; height: 100%; display: none;
            flex-direction: column; align-items: center; justify-content: center;
            position: absolute; padding: 30px; text-align: center; box-sizing: border-box;
        }
        .active { display: flex; }

        #timer-wrap { position: absolute; top: 0; left: 0; width: 100%; height: 10px; background: #111; }
        #timer-fill { height: 100%; width: 100%; background: var(--red); box-shadow: 0 0 10px var(--red); }

        .node { width: 70px; height: 70px; border: 2px solid #333; margin: 15px; cursor: pointer; display: inline-block; background: #080808; }
        .node:hover { border-color: #666; }

        .gauge { width: 300px; height: 40px; border: 2px solid #444; position: relative; background: #0a0a0a; }
        .target { position: absolute; width: 50px; height: 100%; background: rgba(255,0,0,0.4); left: 125px; border-left: 2px solid var(--red); border-right: 2px solid var(--red); }
        #needle { width: 4px; height: 100%; background: #fff; position: absolute; }

        /* Story */
        #story-box { width: 100%; height: 220px; overflow: hidden; position: relative; border-top: 1px solid #222; margin-top: 20px; }
        #story-text { position: absolute; width: 100%; top: 220px; color: var(--green); line-height: 2; font-size: 14px; text-align: left; }

        .btn { background: transparent; border: 1px solid #444; color: #888; padding: 12px 28px; cursor: pointer; font-family: inherit; margin-top: 25px; text-transform: uppercase; letter-spacing: 2px; }
        .btn:hover { color: #fff; border-color: #fff; background: rgba(255,255,255,0.05); }

        /* JUMPSCARE */
        #jumpscare { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #000; z-index: 100000; display: none; align-items: center; justify-content: center; }
        .scare-img { width: 140%; height: 140%; animation: gltch 0.05s infinite; }
        @keyframes gltch { 0% { filter: invert(0); transform: scale(1); } 50% { filter: invert(1) brightness(2); transform: scale(1.1); } 100% { filter: invert(0); transform: scale(1.05); } }
    </style>
</head>
<body>

<audio id="sfx" src="c_jscare.mp3"></audio>

<div class="office">
    <div class="monitor-light"></div>

    <div id="stalker">
        <svg viewBox="0 0 200 200">
            <path d="M100,20 C60,20 20,65 25,125 C30,185 80,200 110,195 C140,200 180,185 185,125 C190,65 140,20 100,20" fill="white" />
            <circle cx="70" cy="90" r="22" fill="black" /><circle cx="130" cy="90" r="22" fill="black" />
            <circle cx="70" cy="90" r="7" fill="red" /><circle cx="130" cy="90" r="7" fill="red" />
            <path d="M60,150 Q100,175 140,150" stroke="black" stroke-width="6" fill="none" />
        </svg>
    </div>

    <div class="monitor-frame">
        <div class="bezel">
            <div class="screen">
                <div id="v-start" class="view active">
                    <h1 style="color:var(--green); letter-spacing: 5px;">VOID_OS</h1>
                    <button class="btn" onclick="initLevel()">ACCESS story-void.txt</button>
                </div>

                <div id="v-game" class="view">
                    <div id="timer-wrap"><div id="timer-fill"></div></div>
                    <div id="task-area"></div>
                    <p id="hint" style="font-size: 11px; margin-top: 15px; color: #444;"></p>
                </div>

                <div id="v-boss" class="view">
                    <h2 style="color:red; letter-spacing: 3px;">CRITICAL BREACH</h2>
                    <div onclick="damageBoss()" style="cursor: crosshair; margin: 20px;">
                        <svg width="130" height="130" viewBox="0 0 100 100">
                            <circle cx="50" cy="50" r="45" fill="white" />
                            <circle cx="35" cy="40" r="8" fill="red" /><circle cx="65" cy="40" r="8" fill="red" />
                        </svg>
                    </div>
                    <div style="width: 200px; height: 10px; border: 1px solid red;">
                        <div id="hp-bar" style="width: 100%; height: 100%; background: red;"></div>
                    </div>
                </div>

                <div id="v-story" class="view">
                    <div id="story-box"><div id="story-text">Loading...</div></div>
                    <button id="re-btn" class="btn" style="display:none; color: red;" onclick="rebootSequence()">REBOOT SYSTEM</button>
                </div>

                <div id="v-final" class="view">
                    <h3>REINSTALLING KERNEL...</h3>
                    <div style="width: 250px; height: 12px; border: 1px solid #333; margin-top: 25px;">
                        <div id="final-fill" style="width: 0%; height: 100%; background: var(--red);"></div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <div class="desk"></div>
    <div class="keyboard"></div>
    <div class="mouse"></div>
</div>

<div id="jumpscare">
    <svg class="scare-img" viewBox="0 0 200 200">
        <path d="M100,20 C50,20 15,70 20,135 C25,200 80,210 110,205 C140,210 195,200 200,135 C205,70 150,20 100,20" fill="white" />
        <circle cx="60" cy="90" r="38" fill="red" /><circle cx="140" cy="90" r="38" fill="red" />
        <path d="M40,160 Q100,210 160,160" stroke="black" stroke-width="12" fill="none" />
    </svg>
</div>

<script>
    let stage = 1, bossHP = 15, timer, needleInt;
    const scareSnd = document.getElementById('sfx');

    function show(id) {
        document.querySelectorAll('.view').forEach(v => v.classList.remove('active'));
        document.getElementById(id).classList.add('active');
    }

    // FIX: Die Funktion wird jetzt korrekt vom Button aufgerufen
    function initLevel() {
        // Zuerst alle alten Intervalle löschen
        clearInterval(timer);
        clearInterval(needleInt);

        show('v-game');
        const area = document.getElementById('task-area');
        area.innerHTML = '';

        if(stage === 1) {
            document.getElementById('hint').innerText = "STABILIZE CORRUPTED DATA SECTORS";
            startTimer(8);
            for(let i=0; i<4; i++) {
                let n = document.createElement('div'); n.className='node';
                n.onclick = function() { 
                    this.style.background='red'; this.classList.add('done');
                    if(document.querySelectorAll('.done').length == 4) {
                        clearInterval(timer); // Timer stoppen bevor Jumpscare kommt
                        stage++; 
                        setTimeout(initLevel, 500); 
                    }
                };
                area.appendChild(n);
            }
        } else if(stage === 2) {
            document.getElementById('hint').innerText = "CALIBRATE FREQUENCY";
            area.innerHTML = '<div class="gauge"><div class="target"></div><div id="needle"></div></div>';
            startTimer(6);
            let pos = 0, dir = 1;
            needleInt = setInterval(() => {
                pos += 5*dir; if(pos >= 296 || pos <= 0) dir *= -1;
                document.getElementById('needle').style.left = pos + 'px';
            }, 16);
            area.onclick = () => {
                if(pos >= 125 && pos <= 175) {
                    clearInterval(timer);
                    clearInterval(needleInt);
                    show('v-boss');
                } else {
                    triggerScare();
                }
            };
        }
    }

    function startTimer(sec) {
        let w = 100;
        clearInterval(timer);
        timer = setInterval(() => {
            w -= (100 / (sec * 10));
            document.getElementById('timer-fill').style.width = w + "%";
            if(w <= 0) triggerScare();
        }, 100);
    }

    function damageBoss() {
        bossHP--;
        document.getElementById('hp-bar').style.width = (bossHP * 6.7) + "%";
        if(bossHP <= 0) { show('v-story'); fetchStory(); }
    }

    async function fetchStory() {
        try {
            const r = await fetch('story-void.txt');
            const d = await r.text();
            document.getElementById('story-text').innerText = d;
        } catch(e) {
            document.getElementById('story-text').innerText = "ERROR: File missing. But I found you.";
        }
        scrollText();
    }

    function scrollText() {
        const el = document.getElementById('story-text');
        let y = 220;
        const si = setInterval(() => {
            y -= 0.6; el.style.top = y + "px";
            if(y < -350) { clearInterval(si); document.getElementById('re-btn').style.display='block'; }
        }, 30);
    }

    function rebootSequence() {
        show('v-final');
        let p = 0;
        const stalker = document.getElementById('stalker');
        const fill = document.getElementById('final-fill');
        const fi = setInterval(() => {
            p += 0.35; fill.style.width = p + "%";
            stalker.style.top = (500 - (p * 4.2)) + "px"; // Kopf steigt langsam hoch
            if(p >= 100) { clearInterval(fi); setTimeout(triggerScare, 1000); }
        }, 50);
    }

    function triggerScare() {
        clearInterval(timer);
        clearInterval(needleInt);
        scareSnd.play();
        document.getElementById('jumpscare').style.display = 'flex';
        setTimeout(() => location.reload(), 3500);
    }
</script>
</body>
</html>

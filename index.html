<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>THE VOID FAILURE // SYSTEM_TERMINATED</title>
    <style>
        :root { --void-red: #660000; --glitch-blue: #00ffff; }
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; background: #000; font-family: 'Courier New', monospace; overflow: hidden; color: white; }

        /* Hintergrund-Atmosphäre */
        .void-bg { 
            position: fixed; width: 100%; height: 100%; 
            background: radial-gradient(circle, #0a0a0a 0%, #000 100%); 
            display: flex; justify-content: center; align-items: center; 
        }

        .scanlines {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: linear-gradient(rgba(18, 16, 16, 0) 50%, rgba(0, 0, 0, 0.2) 50%);
            background-size: 100% 4px; pointer-events: none; z-index: 1000;
        }

        /* Monitor-Hardware */
        .monitor { 
            width: 660px; height: 500px; background: #050505; border: 4px solid #111;
            position: relative; box-shadow: 0 0 100px #000; transition: transform 0.1s, opacity 1s;
        }

        .screen { 
            width: 100%; height: 100%; background: #010101; 
            position: relative; overflow: hidden; border: 15px solid #080808;
        }

        /* UI-Elemente */
        .view { width: 100%; height: 100%; display: none; flex-direction: column; align-items: center; justify-content: center; text-align: center; }
        .active { display: flex; }

        .glitch-text { 
            font-size: 45px; font-weight: bold; text-shadow: 2px 0 red, -2px 0 blue;
            animation: glitch 0.1s infinite; letter-spacing: 5px;
        }

        @keyframes glitch {
            0% { transform: translate(1px, -1px); }
            50% { transform: translate(-1px, 1px); clip-path: inset(10% 0 30% 0); }
            100% { transform: translate(0); }
        }

        .btn { 
            background: none; border: 1px solid #333; color: #555; padding: 15px 40px; 
            margin-top: 50px; cursor: pointer; font-family: inherit; letter-spacing: 3px;
            text-transform: uppercase; transition: 0.3s;
        }
        .btn:hover { color: #f00; border-color: #f00; box-shadow: 0 0 15px #f00; }

        /* Gameplay */
        #timer-bar { width: 100%; height: 10px; background: var(--void-red); position: absolute; top: 0; box-shadow: 0 0 10px red; }
        .node { width: 50px; height: 50px; border: 1px solid #1a1a1a; margin: 10px; cursor: pointer; display: inline-block; }
        .target-zone { position: absolute; width: 40px; height: 100%; background: rgba(255,0,0,0.3); left: 130px; border-inline: 1px solid red; }
        #stab-bar { width: 3px; height: 100%; background: #fff; position: absolute; }

        /* BOSS: THE VOID FAILURE ENTITY */
        #boss-layer { 
            position: fixed; width: 100%; height: 100%; top:0; left:0; 
            display: none; justify-content: center; align-items: center; z-index: 2000;
        }
        .entity { 
            width: 750px; height: 750px; fill: white; filter: contrast(12) blur(1px);
            animation: spasm 0.05s infinite; cursor: crosshair;
        }
        @keyframes spasm { 0% { transform: translate(2px, -2px) scale(1); } 50% { transform: translate(-3px, 3px) scale(1.02); } }

        /* JUMPSCARE */
        #jumpscare { 
            position: fixed; top: 0; left: 0; width: 100%; height: 100%; 
            background: #000; z-index: 9999; display: none; 
            align-items: center; justify-content: center; 
        }
        .scare-svg { width: 150%; height: 150%; filter: invert(0.1) saturate(5); animation: zoomScare 0.04s infinite; }
        @keyframes zoomScare { 0% { transform: scale(1); } 50% { transform: scale(1.2) rotate(2deg); } }

        /* ENDE */
        #death-screen { 
            position: fixed; top:0; left:0; width:100%; height:100%; 
            background:#000; z-index: 10001; display:none; flex-direction:column; 
            align-items:center; justify-content:center; color: #600;
        }
    </style>
</head>
<body>

<audio id="sfx" src="c_jscare.mp3"></audio>
<div class="scanlines"></div>

<div class="void-bg">
    <div class="monitor" id="mon-box">
        <div class="screen">
            <div id="v-start" class="view active">
                <div class="glitch-text">THE VOID FAILURE</div>
                <button class="btn" onclick="startGame()">INITIALIZE</button>
            </div>
            <div id="v-game" class="view">
                <div id="timer-bar"></div>
                <div id="game-content" style="width: 100%;"></div>
            </div>
            <div id="v-fail" class="view">
                <h1 style="color: red; animation: glitch 0.1s infinite;">CRITICAL_FAILURE</h1>
                <p>SUBJECT BREACHED REALITY</p>
            </div>
        </div>
    </div>
</div>

<div id="boss-layer">
    <svg viewBox="0 0 200 200" class="entity" id="boss-svg" onclick="hitBoss()">
        <path d="M100,10 C140,40 180,20 190,80 C200,140 150,160 160,200 C100,180 40,200 20,140 C0,80 40,60 50,20 C80,40 100,10" />
        <circle cx="70" cy="80" r="15" fill="red" />
        <circle cx="130" cy="85" r="18" fill="red" />
        <circle cx="70" cy="80" r="5" fill="black" />
        <circle cx="130" cy="85" r="6" fill="black" />
        <path d="M60,150 Q100,185 140,150" stroke="black" stroke-width="3" fill="none" />
    </svg>
    <div style="position: absolute; bottom: 40px; width: 50%; height: 6px; background: #200; border: 1px solid red;">
        <div id="hp-bar" style="width: 100%; height: 100%; background: red; box-shadow: 0 0 10px red;"></div>
    </div>
</div>

<div id="jumpscare">
    <svg class="scare-svg" viewBox="0 0 200 200">
        <path d="M100,10 C40,10 10,60 15,120 C20,180 70,195 100,190 C130,195 180,180 185,120 C190,60 160,10 100,10" fill="#050505" stroke="white" stroke-width="2"/>
        <circle cx="60" cy="80" r="10" fill="red" />
        <circle cx="140" cy="85" r="8" fill="red" />
        <path d="M40,140 L160,150 L100,190 Z" fill="black" stroke="red" />
    </svg>
</div>

<div id="death-screen">
    <h1 style="letter-spacing: 15px; font-size: 50px;">VOID CONSUMED YOU</h1>
    <p>THE FAILURE IS COMPLETE.</p>
    <button class="btn" onclick="location.reload()">RE-INITIALIZE</button>
</div>

<script>
    let lvl = 1, timer, moveInterval, hp = 100;
    const sfx = document.getElementById('sfx');

    function showView(id) {
        document.querySelectorAll('.view').forEach(v => v.classList.remove('active'));
        document.getElementById('v-' + id).classList.add('active');
    }

    function startGame() {
        sfx.play().then(() => { sfx.pause(); sfx.currentTime = 0; });
        lvl = 1; showView('game'); runLevel();
    }

    function runLevel() {
        const content = document.getElementById('game-content');
        content.innerHTML = '';
        if (lvl === 5) { triggerBoss(); return; }

        startTimer(10 - (lvl * 1.5));

        if(lvl === 1) {
            content.innerHTML = '<p>REBOOT_NODES</p>';
            for(let i=0; i<4; i++) {
                let d = document.createElement('div'); d.className = 'node';
                d.onclick = function() { this.style.background="red"; this.classList.add('ok'); if(document.querySelectorAll('.ok').length==4) next(); };
                content.appendChild(d);
            }
        } else if(lvl === 2) {
            content.innerHTML = '<p>STABILIZE_CORE</p><div style="width:300px; height:40px; border:1px solid #333; position:relative; margin:auto;" id="c"><div class="target-zone"></div><div id="stab-bar"></div></div>';
            let p = 0, dr = 1;
            moveInterval = setInterval(() => {
                p += (5 + lvl) * dr; if(p >= 297 || p <= 0) dr *= -1;
                document.getElementById('stab-bar').style.left = p + "px";
                if(Math.random() > 0.9) document.getElementById('mon-box').style.transform = `rotate(${Math.random()*2-1}deg)`;
            }, 10);
            document.getElementById('c').onclick = () => { clearInterval(moveInterval); if(p >= 130 && p <= 170) next(); else sc(); };
        } else if(lvl === 3) {
            content.innerHTML = '<p>DECRYPT_KEY</p>';
            let target = Math.floor(Math.random() * 8000) + 1000;
            content.innerHTML += `<h2 style="color:red; letter-spacing:10px;">${target}</h2><input type="text" id="code" style="background:black; color:white; border:1px solid red; text-align:center; font-family:inherit;">`;
            const inp = document.getElementById('code'); inp.focus();
            inp.oninput = (e) => { if(e.target.value == target) next(); };
        } else if(lvl === 4) {
            content.innerHTML = '<p>SYNC_FREQ</p><input type="range" id="k" min="0" max="100" style="width:200px;"><p id="v">SEARCHING...</p>';
            let t = Math.floor(Math.random() * 80) + 10;
            document.getElementById('k').oninput = (e) => { 
                document.getElementById('v').innerText = e.target.value + " / " + t;
                if(Math.abs(e.target.value - t) < 3) next(); 
            };
        }
    }

    function startTimer(s) {
        let w = 100; clearInterval(timer);
        timer = setInterval(() => {
            w -= (100 / (s * 10));
            document.getElementById('timer-bar').style.width = w + "%";
            if(w <= 0) sc();
        }, 100);
    }

    function next() { clearInterval(timer); lvl++; setTimeout(runLevel, 300); }

    function sc() {
        clearInterval(timer); clearInterval(moveInterval);
        sfx.play();
        document.getElementById('jumpscare').style.display = 'flex';
        setTimeout(() => location.reload(), 1500);
    }

    function triggerBoss() {
        clearInterval(timer);
        showView('fail');
        setTimeout(() => {
            document.getElementById('mon-box').style.opacity = "0";
            setTimeout(() => {
                document.getElementById('mon-box').style.display = "none";
                document.getElementById('boss-layer').style.display = 'flex';
                // Boss attack timer
                timer = setTimeout(sc, 10000);
            }, 1000);
        }, 2000);
    }

    function hitBoss() {
        hp -= 5;
        document.getElementById('hp-bar').style.width = hp + "%";
        document.body.style.background = "#200";
        setTimeout(() => document.body.style.background = "#000", 50);
        if(hp <= 0) {
            clearTimeout(timer);
            document.getElementById('boss-layer').style.display = 'none';
            document.getElementById('death-screen').style.display = 'flex';
        }
    }
</script>
</body>
</html>

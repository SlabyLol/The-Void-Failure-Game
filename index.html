<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>The Void Failure</title>
    <style>
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; background: #000; overflow: hidden; color: #fff; font-family: 'Courier New', monospace; user-select: none; }
        
        /* UI */
        #game-container { position: relative; width: 100%; height: 100%; display: flex; flex-direction: column; align-items: center; justify-content: center; }
        #ui-top { position: absolute; top: 30px; text-align: center; z-index: 5; }
        #timer-bar { width: 220px; height: 10px; background: #100; margin-top: 10px; border: 1px solid #300; border-radius: 5px; overflow: hidden; }
        #timer-fill { width: 100%; height: 100%; background: #f00; }

        /* Windows */
        #task-window, #fnaf-panel, #boss-battle { 
            width: 320px; height: 400px; border: 3px solid #1a1a1a; background: #050505; 
            display: none; flex-direction: column; align-items: center; justify-content: center;
            padding: 20px; box-sizing: border-box; z-index: 10;
        }

        /* FNAF Panel */
        .fnaf-text { color: #0f0; font-size: 0.8rem; margin: 5px 0; text-transform: uppercase; }
        #loading-fill { height: 100%; width: 0%; background: #0f0; box-shadow: 0 0 15px #0f0; transition: width 0.1s; }

        /* Boss Battle */
        #knife { width: 80px; height: auto; filter: drop-shadow(0 0 10px #fff); margin-top: 50px; transition: 0.1s; }
        #boss-target { width: 100px; height: 100px; border: 2px dashed red; border-radius: 50%; position: absolute; display: flex; align-items: center; justify-content: center; }
        #approaching-creature { width: 20px; height: 20px; background: #fff; border-radius: 50%; filter: blur(5px); position: absolute; }

        /* Animations */
        .glitch-win { animation: glitch 0.1s infinite; color: cyan !important; }
        @keyframes glitch { 0% { transform: translate(2px,0); filter: hue-rotate(90deg); } 50% { transform: translate(-2px,0); } 100% { transform: translate(0,0); } }
        .failed-anim { animation: system-crash 0.1s infinite; color: red !important; }
        @keyframes system-crash { 0% { opacity: 1; } 50% { opacity: 0.5; } 100% { opacity: 1; } }

        /* Screens */
        .screen { position: fixed; top:0; left:0; width:100%; height:100%; background:#000; display:flex; flex-direction:column; align-items:center; justify-content:center; z-index:2000; }
        .btn { padding: 15px 40px; background:transparent; border: 2px solid #300; color:#500; cursor:pointer; font-family:inherit; }
        #jumpscare { position: fixed; top:0; left:0; width:100%; height:100%; background:#000; display:none; z-index:3000; align-items:center; justify-content:center; }
        #final-screen { position: fixed; top:0; left:0; width:100%; height:100%; background:#000; color:#f00; display:none; z-index:4000; word-break:break-all; text-align: center; font-size: 1.2rem; }
        #win-screen { position: fixed; top:0; left:0; width:100%; height:100%; background:#000; color:cyan; display:none; z-index:5000; flex-direction:column; align-items:center; justify-content:center; text-shadow: 0 0 20px cyan; }

        /* Task Styles */
        .wire-dot { width: 40px; height: 40px; border-radius: 50%; background: #200; margin: 10px; border: 2px solid #300; }
        .wire-dot.active { background: red; box-shadow: 0 0 15px red; }
        .num-btn { width: 70px; height: 70px; background: #111; border: 1px solid #333; color: #600; font-size: 1.5rem; margin: 5px; }
        .num-btn.done { opacity: 0.2; border-color: red; }
    </style>
</head>
<body>

    <div id="start-screen" class="screen">
        <h1 style="color:#200; letter-spacing:10px;">THE VOID FAILURE</h1>
        <button class="btn" onclick="startGame()">START SYSTEM</button>
    </div>

    <div id="game-container">
        <div id="ui-top">
            <div id="lvl-txt" style="color:#400">DEPTH: 1</div>
            <div id="timer-bar"><div id="timer-fill"></div></div>
        </div>

        <div id="task-window"></div>

        <div id="fnaf-panel">
            <div class="fnaf-text">REBOOTING CORE...</div>
            <div id="loading-bar" style="width:100%; height:20px; border:1px solid #0f0; margin:20px 0;"><div id="loading-fill"></div></div>
            <div id="p-logs" style="font-size:0.6rem; color:#0f0; height:100px; opacity:0.5"></div>
            <div class="fnaf-text" style="color:yellow; font-size:0.6rem">MIC SENSOR: ON</div>
        </div>

        <div id="boss-battle">
            <div style="color:white; font-size:0.7rem; position:absolute; top:20px;">MESSER BEREIT...</div>
            <div id="boss-target"></div>
            <div id="approaching-creature"></div>
            <svg id="knife" viewBox="0 0 50 150">
                <path d="M25,10 L40,80 L25,140 L10,80 Z" fill="#888" stroke="#fff" />
                <rect x="20" y="110" width="10" height="30" fill="#422" />
            </svg>
            <div style="color:red; font-size:0.6rem; margin-top:20px;">TIMING: JETZT!</div>
        </div>
    </div>

    <div id="jumpscare">
        <svg style="width:140%; height:140%; fill:#200; filter:drop-shadow(0 0 30px red);" viewBox="0 0 200 200">
            <circle cx="60" cy="80" r="15" fill="red" />
            <circle cx="140" cy="80" r="15" fill="red" />
            <path d="M 40 140 Q 100 220 160 140" stroke="red" fill="none" stroke-width="8" />
        </svg>
    </div>

    <div id="final-screen"></div>
    <div id="win-screen">
        <h1 class="glitch-win">SYSTEM SAVED</h1>
        <p>Thx for playing</p>
        <button class="btn" onclick="location.reload()" style="color:cyan; border-color:cyan">RESTART</button>
    </div>

    <audio id="snd-jscare" src="c_jscare.mp3"></audio>
    <audio id="snd-loop" src="ncb_loop.mp3" loop></audio>

    <script>
        let level = 1;
        let timeLeft = 10;
        let timerInterval;
        let bossInterval;
        
        const sndJscare = document.getElementById('snd-jscare');
        const sndLoop = document.getElementById('snd-loop');

        function startGame() {
            sndJscare.play().then(() => { sndJscare.pause(); sndJscare.currentTime=0; });
            document.getElementById('start-screen').style.display = 'none';
            loadLevel();
        }

        function loadLevel() {
            const tw = document.getElementById('task-window');
            tw.style.display = 'flex';
            tw.innerHTML = '';
            document.getElementById('lvl-txt').innerText = "DEPTH: " + level;
            
            if(level === 1) {
                for(let i=0; i<3; i++){
                    let d = document.createElement('div'); d.className='wire-dot';
                    d.onclick = function(){ this.classList.add('active'); if(document.querySelectorAll('.wire-dot.active').length===3) nextLevel(); };
                    tw.appendChild(d);
                }
            } else if(level === 2) {
                let cur = 1;
                [1,2,3,4].sort(()=>Math.random()-0.5).forEach(n => {
                    let b = document.createElement('button'); b.className='num-btn'; b.innerText=n;
                    b.onclick = function(){ if(parseInt(this.innerText)===cur){ this.classList.add('done'); cur++; if(cur>4) nextLevel(); } else fail(); };
                    tw.appendChild(b);
                });
            } else if(level === 3 || level === 4) { // Vereinfacht für Demo
                let b = document.createElement('button'); b.className='btn'; b.innerText="FIX CORE";
                b.onclick = () => nextLevel();
                tw.appendChild(b);
            } else if(level === 5) {
                startLevel5();
                return;
            }

            timeLeft = 10;
            clearInterval(timerInterval);
            timerInterval = setInterval(() => {
                timeLeft -= 0.1;
                document.getElementById('timer-fill').style.width = (timeLeft * 10) + "%";
                if(timeLeft <= 0) fail();
            }, 100);
        }

        async function startLevel5() {
            clearInterval(timerInterval);
            document.getElementById('task-window').style.display = 'none';
            document.getElementById('fnaf-panel').style.display = 'flex';
            
            try {
                const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
                const audioCtx = new AudioContext();
                const analyser = audioCtx.createAnalyser();
                const source = audioCtx.createMediaStreamSource(stream);
                source.connect(analyser);
                const data = new Uint8Array(analyser.frequencyBinCount);

                let progress = 0;
                const loop = setInterval(() => {
                    progress += 0.5;
                    document.getElementById('loading-fill').style.width = progress + "%";
                    
                    analyser.getByteFrequencyData(data);
                    let avg = data.reduce((a,b)=>a+b)/data.length;
                    if(avg > 45) {
                        clearInterval(loop);
                        stream.getTracks().forEach(t=>t.stop());
                        systemCrash();
                    }

                    if(progress >= 100) {
                        clearInterval(loop);
                        stream.getTracks().forEach(t=>t.stop());
                        startBossBattle();
                    }
                }, 50);
            } catch(e) { systemCrash(); }
        }

        function systemCrash() {
            document.getElementById('fnaf-panel').classList.add('failed-anim');
            setTimeout(fail, 1500);
        }

        function startBossBattle() {
            document.getElementById('fnaf-panel').style.display = 'none';
            document.getElementById('boss-battle').style.display = 'flex';
            const cre = document.getElementById('approaching-creature');
            let size = 10;

            bossInterval = setInterval(() => {
                size += 2;
                cre.style.width = size + "px";
                cre.style.height = size + "px";
                if(size > 300) {
                    clearInterval(bossInterval);
                    fail();
                }
            }, 30);

            document.getElementById('boss-battle').onclick = () => {
                clearInterval(bossInterval);
                // Perfektes Timing Fenster
                if(size > 80 && size < 130) {
                    win();
                } else {
                    fail();
                }
            };
        }

        function win() {
            document.getElementById('boss-battle').classList.add('glitch-win');
            setTimeout(() => {
                document.getElementById('boss-battle').style.display = 'none';
                document.getElementById('win-screen').style.display = 'flex';
            }, 1000);
        }

        function nextLevel() { level++; loadLevel(); }

        function fail() {
            clearInterval(timerInterval);
            clearInterval(bossInterval);
            document.getElementById('game-container').style.display = 'none';
            document.getElementById('jumpscare').style.display = 'flex';
            sndJscare.play();
            setTimeout(() => {
                document.getElementById('jumpscare').style.display = 'none';
                showFinal();
            }, 1500);
        }

        function showFinal() {
            const fs = document.getElementById('final-screen');
            fs.style.display = 'block';
            sndLoop.play();
            let s = ""; for(let i=0; i<3000; i++) s += "NEVER COME BACK ";
            fs.innerText = s;
        }
    </script>
</body>
</html>

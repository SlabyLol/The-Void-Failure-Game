<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>THE VOID FAILURE - FINAL</title>
    <style>
        :root { --void-red: #600; --neon-red: #ff0000; --terminal-green: #00ff41; }
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; background: #000; overflow: hidden; color: #fff; font-family: 'Courier New', monospace; }
        
        /* CRT Scanline Effekt */
        body::before { content: " "; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: linear-gradient(rgba(18, 16, 16, 0) 50%, rgba(0, 0, 0, 0.25) 50%), linear-gradient(90deg, rgba(255, 0, 0, 0.06), rgba(0, 255, 0, 0.02), rgba(0, 0, 255, 0.06)); z-index: 5000; background-size: 100% 2px, 3px 100%; pointer-events: none; }

        #game-viewport { position: relative; width: 100%; height: 100%; display: flex; align-items: center; justify-content: center; background: radial-gradient(circle, #0a0a0a 0%, #000 100%); }

        /* UI */
        #ui-layer { position: absolute; top: 20px; width: 100%; text-align: center; z-index: 10; }
        .stat-label { font-size: 0.7rem; color: #444; letter-spacing: 3px; }
        #timer-box { width: 250px; height: 4px; background: #111; margin: 10px auto; border: 1px solid #222; }
        #timer-bar { width: 100%; height: 100%; background: var(--void-red); box-shadow: 0 0 10px var(--void-red); }

        /* Panels */
        .panel { width: 320px; height: 400px; border: 2px solid #1a1a1a; background: rgba(5, 5, 5, 0.95); display: none; flex-direction: column; align-items: center; justify-content: space-around; padding: 20px; box-sizing: border-box; position: relative; }
        
        /* Level 5 Panel */
        #fnaf-panel { border-color: var(--terminal-green); }
        .fnaf-text { color: var(--terminal-green); font-size: 0.8rem; text-shadow: 0 0 5px var(--terminal-green); }
        #load-wrap { width: 100%; height: 20px; border: 1px solid var(--terminal-green); }
        #load-bar { width: 0%; height: 100%; background: var(--terminal-green); }

        /* BOSS BATTLE */
        #boss-battle { background: url('https://www.transparenttextures.com/patterns/dark-matter.png'); }
        #creature-sprite { width: 50px; height: 50px; position: absolute; opacity: 0; filter: blur(10px) brightness(0.2); }
        #knife-container { position: absolute; bottom: -20px; width: 120px; transition: transform 0.1s; }
        #target-ring { width: 100px; height: 100px; border: 2px solid rgba(255,0,0,0.5); border-radius: 50%; position: absolute; display: none; }

        /* Jumpscare */
        #jumpscare { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #000; display: none; z-index: 9999; align-items: center; justify-content: center; }
        .monster { width: 150%; height: 150%; fill: #200; animation: shake 0.05s infinite; filter: drop-shadow(0 0 50px red); }

        /* End Screens */
        .full-screen { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #000; display: none; z-index: 10000; flex-direction: column; align-items: center; justify-content: center; }
        .btn { padding: 15px 40px; background: transparent; border: 1px solid #333; color: #555; cursor: pointer; font-family: inherit; font-size: 1.2rem; margin-top: 20px; }
        .btn:hover { border-color: #fff; color: #fff; }

        /* Keyframes */
        @keyframes shake { 0%{transform: translate(5px,5px);} 50%{transform: translate(-5px,-10px);} 100%{transform: translate(0,0);} }
        @keyframes glitch-win { 0%{filter: invert(0);} 20%{filter: invert(1) hue-rotate(90deg);} 40%{filter: contrast(200%);} 100%{filter: invert(0);} }
        .glitching { animation: glitch-win 0.1s infinite !important; }

        /* Task Elements */
        .wire { width: 50px; height: 50px; border-radius: 50%; background: #111; border: 2px solid #333; margin: 10px; cursor: pointer; }
        .wire.active { background: #f00; box-shadow: 0 0 20px red; border-color: #fff; }
    </style>
</head>
<body>

    <div id="game-viewport">
        <div id="ui-layer">
            <div class="stat-label" id="depth-txt">DEPTH: 01</div>
            <div id="timer-box"><div id="timer-bar"></div></div>
        </div>

        <div id="task-panel" class="panel"></div>

        <div id="fnaf-panel" class="panel">
            <div class="fnaf-text">SYSTEM RECOVERY IN PROGRESS</div>
            <div id="load-wrap"><div id="load-bar"></div></div>
            <div id="logs" style="color: var(--terminal-green); font-size: 0.6rem; width: 100%; height: 100px; overflow: hidden; opacity: 0.6;"></div>
            <div class="fnaf-text" style="font-size: 0.5rem; color: #f00;">WARNING: PROXIMITY SENSOR TRIGGERED</div>
        </div>

        <div id="boss-panel" class="panel">
            <div id="target-ring"></div>
            <div id="creature-sprite">
                <svg viewBox="0 0 100 100"><path d="M50 0 L100 50 L50 100 L0 50 Z" fill="white"/></svg>
            </div>
            <div id="knife-container">
                <svg viewBox="0 0 50 150">
                    <path d="M25 0 L45 80 L35 150 L15 150 L5 80 Z" fill="#666" stroke="#fff"/>
                    <rect x="15" y="100" width="20" height="50" fill="#322"/>
                </svg>
            </div>
            <div style="position: absolute; bottom: 20px; font-size: 0.7rem; color: #444;">KLICKEN ZUM ZUSTECHEN</div>
        </div>
    </div>

    <div id="start-screen" class="full-screen" style="display: flex;">
        <h1 style="letter-spacing: 15px; color: #300;">VOID FAILURE</h1>
        <button class="btn" onclick="initGame()">VERBINDUNG HERSTELLEN</button>
    </div>

    <div id="jumpscare">
        <svg class="monster" viewBox="0 0 200 200">
            <circle cx="60" cy="80" r="20" fill="red"/>
            <circle cx="140" cy="80" r="20" fill="red"/>
            <path d="M 30 150 Q 100 230 170 150" stroke="red" fill="none" stroke-width="10"/>
        </svg>
    </div>

    <div id="fail-screen" class="full-screen">
        <div id="never-back" style="color: red; font-size: 1rem; text-align: center; line-height: 0.8; word-break: break-all;"></div>
    </div>

    <div id="win-screen" class="full-screen">
        <h1 style="color: cyan; text-shadow: 0 0 20px cyan;">SYSTEM CLEANSED</h1>
        <p style="letter-spacing: 3px;">Thx for playing</p>
        <button class="btn" onclick="location.reload()">REBOOT</button>
    </div>

    <audio id="snd-jscare" src="c_jscare.mp3"></audio>
    <audio id="snd-loop" src="ncb_loop.mp3" loop></audio>

    <script>
        let level = 1;
        let timeLeft = 100;
        let timerInt, bossInt;
        const sndJscare = document.getElementById('snd-jscare');
        const sndLoop = document.getElementById('snd-loop');

        function initGame() {
            // Audio unlock
            sndJscare.play().then(() => { sndJscare.pause(); sndJscare.currentTime = 0; });
            document.getElementById('start-screen').style.display = 'none';
            startLevel();
        }

        function startLevel() {
            const tp = document.getElementById('task-panel');
            tp.style.display = 'flex';
            tp.innerHTML = '';
            document.getElementById('depth-txt').innerText = "DEPTH: 0" + level;
            
            if(level <= 4) {
                // Task: Wiring
                for(let i=0; i<3; i++) {
                    let w = document.createElement('div'); w.className = 'wire';
                    w.onclick = function() {
                        this.classList.add('active');
                        if(document.querySelectorAll('.wire.active').length === 3) nextLevel();
                    };
                    tp.appendChild(w);
                }
                resetTimer(10 - level);
            } else if(level === 5) {
                tp.style.display = 'none';
                runLevel5();
            }
        }

        function resetTimer(sec) {
            timeLeft = 100;
            clearInterval(timerInt);
            timerInt = setInterval(() => {
                timeLeft -= (1 / sec);
                document.getElementById('timer-bar').style.width = timeLeft + "%";
                if(timeLeft <= 0) triggerFail();
            }, 10);
        }

        function nextLevel() {
            level++;
            startLevel();
        }

        async function runLevel5() {
            document.getElementById('fnaf-panel').style.display = 'flex';
            document.getElementById('ui-layer').style.display = 'none';
            let prog = 0;
            const logBox = document.getElementById('logs');
            const logLines = ["> Check data...", "> Soul.dat found", "> Bypassing...", "> Almost there..."];

            try {
                const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
                const audioCtx = new AudioContext();
                const analyser = audioCtx.createAnalyser();
                const source = audioCtx.createMediaStreamSource(stream);
                source.connect(analyser);
                const mData = new Uint8Array(analyser.frequencyBinCount);

                const l5Loop = setInterval(() => {
                    prog += 0.3;
                    document.getElementById('load-bar').style.width = prog + "%";
                    if(Math.floor(prog) % 25 === 0) logBox.innerHTML += logLines[Math.floor(prog/26)] + "<br>";

                    analyser.getByteFrequencyData(mData);
                    let vol = mData.reduce((a,b)=>a+b)/mData.length;
                    if(vol > 50) {
                        clearInterval(l5Loop);
                        stream.getTracks().forEach(t=>t.stop());
                        triggerFail();
                    }

                    if(prog >= 100) {
                        clearInterval(l5Loop);
                        stream.getTracks().forEach(t=>t.stop());
                        runBoss();
                    }
                }, 50);
            } catch(e) { triggerFail(); }
        }

        function runBoss() {
            document.getElementById('fnaf-panel').style.display = 'none';
            document.getElementById('boss-panel').style.display = 'flex';
            const cre = document.getElementById('creature-sprite');
            const ring = document.getElementById('target-ring');
            let size = 20;
            ring.style.display = 'block';

            bossInt = setInterval(() => {
                size += 3;
                cre.style.width = size + "px";
                cre.style.height = size + "px";
                cre.style.opacity = size / 200;
                if(size > 350) { clearInterval(bossInt); triggerFail(); }
            }, 30);

            document.getElementById('boss-panel').onclick = () => {
                clearInterval(bossInt);
                // Knife stab animation
                document.getElementById('knife-container').style.transform = "translateY(-100px) rotate(-10deg)";
                
                // Timing Check: Ist die Kreatur im Ring? (Größe ca. 80-150)
                if(size > 70 && size < 160) {
                    triggerWin();
                } else {
                    setTimeout(triggerFail, 200);
                }
            };
        }

        function triggerWin() {
            document.getElementById('boss-panel').classList.add('glitching');
            setTimeout(() => {
                document.getElementById('boss-panel').style.display = 'none';
                document.getElementById('win-screen').style.display = 'flex';
            }, 1000);
        }

        function triggerFail() {
            clearInterval(timerInt);
            clearInterval(bossInt);
            document.getElementById('jumpscare').style.display = 'flex';
            sndJscare.play().catch(()=>{});
            setTimeout(() => {
                document.getElementById('jumpscare').style.display = 'none';
                const fs = document.getElementById('fail-screen');
                fs.style.display = 'flex';
                sndLoop.play();
                let txt = ""; for(let i=0; i<2000; i++) txt += "NEVER COME BACK ";
                document.getElementById('never-back').innerText = txt;
            }, 1500);
        }
    </script>
</body>
</html>

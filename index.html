<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The Void Failure - The last update</title>
    <style>
        :root { --fnaf-green: #24ff15; --fnaf-red: #ff0000; }
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; background: #000; color: var(--fnaf-green); font-family: 'Courier New', monospace; overflow: hidden; user-select: none; }
        
        /* 3D Büro */
        .office { width: 100%; height: 100%; background: radial-gradient(circle at 50% 40%, #1a1a1a 0%, #050505 70%, #000 100%); display: flex; justify-content: center; align-items: center; perspective: 1200px; }
        .desk { width: 800px; height: 500px; background: #121212; position: relative; transform: rotateX(15deg); border-top: 10px solid #0a0a0a; box-shadow: 0 60px 150px #000; display: flex; justify-content: center; align-items: center; }
        .monitor { width: 480px; height: 360px; background: #1a1a1a; border-radius: 12px; padding: 15px; position: relative; box-shadow: 0 0 50px #000; transform: translateZ(50px); transition: all 0.5s cubic-bezier(0.4, 0, 0.2, 1); }
        .screen { width: 100%; height: 100%; background: #040604; position: relative; overflow: hidden; border: 4px solid #000; }
        
        /* Jumpscare & Effekte */
        #jumpscare-layer { position: fixed; top:0; left:0; width:100%; height:100%; background: #000; z-index: 9999; display: none; align-items: center; justify-content: center; }
        .scary-face { width: 140%; height: 140%; fill: #600; animation: tremor 0.04s infinite; }
        .crack-overlay { position: absolute; top:0; left:0; width:100%; height:100%; background: url('https://i.imgur.com/7S8zH4B.png'); background-size: cover; opacity: 0; z-index: 150; pointer-events: none; filter: invert(1); }
        
        /* SCP Void & Messer */
        #scp-void { position: absolute; width: 350px; height: 350px; top: 50%; left: 50%; transform: translate(-50%, -50%) scale(0); opacity: 0; z-index: 5; pointer-events: none; transition: all 0.6s cubic-bezier(0.175, 0.885, 0.32, 1.275); }
        #knife-in-void { position: absolute; width: 80px; top: 35%; left: 55%; transform: rotate(45deg); display: none; filter: drop-shadow(0 0 5px red); z-index: 10; }

        /* UI */
        .view { width: 100%; height: 100%; display: none; flex-direction: column; align-items: center; justify-content: center; text-align: center; }
        .active { display: flex; }
        .btn { background: transparent; border: 1px solid var(--fnaf-green); color: var(--fnaf-green); padding: 8px 15px; margin: 10px; cursor: pointer; font-family: inherit; font-size: 12px; }
        .btn:hover { background: var(--fnaf-green); color: #000; }
        
        /* Level 3 Balken */
        #stab-container { width: 200px; height: 35px; border: 2px solid var(--fnaf-green); position: relative; margin-top: 10px; cursor: pointer; background: #080808; }
        #stab-target { width: 40px; height: 100%; background: rgba(255,0,0,0.5); position: absolute; left: 80px; }
        #stab-bar { width: 10px; height: 100%; background: #fff; position: absolute; left: 0; pointer-events: none; }

        /* Dialog Box */
        #dialog-box { position: fixed; bottom: 30px; left: 50%; transform: translateX(-50%); width: 70%; background: rgba(0,0,0,0.95); border: 2px solid white; padding: 20px; color: white; display: none; z-index: 2000; cursor: pointer; text-align: left; }
        #dialog-name { color: red; margin-bottom: 5px; font-weight: bold; }

        /* Ending */
        #ending-screen { position: fixed; top:0; left:0; width:100%; height:100%; background: #000; z-index: 9000; display: none; flex-direction: column; align-items: center; justify-content: center; }

        @keyframes tremor { 0% { transform: scale(1); } 50% { transform: scale(1.05) translate(5px, 5px); } }
        @keyframes monitor-shake { 0% { transform: translateZ(50px) translate(4px,4px); } 50% { transform: translateZ(50px) translate(-4px,-4px); } }
    </style>
</head>
<body>

<div id="jumpscare-layer">
    <svg class="scary-face" viewBox="0 0 200 200"><circle cx="60" cy="70" r="25" fill="red" /><circle cx="140" cy="70" r="25" fill="red" /><path d="M 30 140 Q 100 240 170 140" stroke="white" stroke-width="12" fill="none" /></svg>
</div>

<div class="office">
    <div id="scp-void">
        <svg viewBox="0 0 200 200"><path d="M100 0 L140 70 L200 100 L140 130 L100 200 L60 130 L0 100 L60 70 Z" fill="white" /><circle cx="75" cy="100" r="15" fill="red" /><circle cx="125" cy="100" r="15" fill="red" /></svg>
        <svg id="knife-in-void" viewBox="0 0 50 150"><path d="M25 0 L45 80 L30 150 L20 150 L5 80 Z" fill="silver" stroke="black"/></svg>
    </div>
    
    <div class="desk">
        <div class="monitor" id="monitor">
            <div class="screen">
                <div class="crack-overlay" id="crack"></div>
                
                <div id="v-start" class="view active">
                    <h1>VOID_FAILURE</h1>
                    <button class="btn" onclick="showView('game'); runLevel();">REPAIR</button>
                    <button class="btn" onclick="showView('settings')">SETTINGS</button>
                </div>

                <div id="v-settings" class="view">
                    <h3>CONFIG</h3>
                    <label>DIFF:</label>
                    <select id="diff" class="btn"><option value="1">EASY</option><option value="2" selected>NORMAL</option><option value="3">HARD</option></select>
                    <button class="btn" onclick="showView('start')">BACK</button>
                </div>

                <div id="v-game" class="view">
                    <div id="timer-bar" style="width:100%; height:5px; background:var(--fnaf-green); position:absolute; top:0;"></div>
                    <div id="game-zone"></div>
                </div>

                <div id="v-boss" class="view"><h3>REPAIRING... 99%</h3></div>
            </div>
        </div>
    </div>
</div>

<div id="dialog-box" onclick="advanceDialog()">
    <div id="dialog-name">SCP Void</div>
    <div id="dialog-text">W-W-hy...</div>
</div>

<div id="ending-screen">
    <h2 style="color:#444">Why....</h2>
    <button class="btn" onclick="location.reload()">NEXT</button>
</div>

<script>
    let lvl = 1;
    let timer;
    let isTrans = false;
    let stabInt;
    let dialogStep = 0;

    function showView(id) {
        document.querySelectorAll('.view').forEach(v => v.classList.remove('active'));
        document.getElementById('v-' + id).classList.add('active');
    }

    function runLevel() {
        isTrans = false;
        const zone = document.getElementById('game-zone');
        zone.innerHTML = '';
        const d = parseInt(document.getElementById('diff').value);
        if (lvl < 5) startTimer(10 - (lvl * 1.2) - (d * 0.5));

        if (lvl === 1) { // Kabel
            zone.innerHTML = '<p>CONNECT WIRES</p>';
            for(let i=0; i<3; i++) {
                let w = document.createElement('div');
                w.style = "width:45px;height:45px;border:2px solid #222;margin:10px;cursor:pointer";
                w.onclick = function() { if(isTrans) return; this.style.background="red"; this.classList.add('ok'); if(document.querySelectorAll('.ok').length==3) next(); };
                zone.appendChild(w);
            }
        } else if (lvl === 2) { // 1-2-3
            zone.innerHTML = '<p>SEQUENCE 1-2-3</p>';
            let c = 0;
            [1,2,3].sort(()=>Math.random()-0.5).forEach(n => {
                let b = document.createElement('button'); b.className="btn"; b.innerText=n;
                b.onclick = function() { 
                    if(isTrans) return;
                    if(parseInt(this.innerText) === c + 1) { c++; this.style.opacity=0.2; if(c === 3) next(); } else sc(); 
                };
                zone.appendChild(b);
            });
        } else if (lvl === 3) { // Block
            zone.innerHTML = '<p>STABILIZE</p><div id="stab-container"><div id="stab-target"></div><div id="stab-bar"></div></div>';
            let p = 0; let dr = 1;
            stabInt = setInterval(() => { 
                p += (1.5 * d) * dr;
                if(p >= 190 || p <= 0) dr *= -1;
                if(document.getElementById('stab-bar')) document.getElementById('stab-bar').style.left = p + "px";
            }, 15);
            document.getElementById('stab-container').onclick = () => {
                if(isTrans) return;
                if(p >= 80 && p <= 120) { clearInterval(stabInt); next(); } else { clearInterval(stabInt); sc(); }
            };
        } else if (lvl === 4) { // Clicks
            let cl=0; let b = document.createElement('button'); b.className="btn"; b.innerText="CLICK 15x";
            b.onclick = () => { if(isTrans) return; cl++; b.innerText=15-cl; if(cl>=15) next(); };
            zone.appendChild(b);
        } else finale();
    }

    function startTimer(s) {
        let w = 100; clearInterval(timer);
        timer = setInterval(() => {
            w -= (100 / (s * 10));
            document.getElementById('timer-bar').style.width = w + "%";
            if(w <= 0) sc();
        }, 100);
    }

    function next() { isTrans = true; clearInterval(timer); lvl++; setTimeout(runLevel, 300); }
    function sc() { isTrans = true; clearInterval(timer); clearInterval(stabInt); document.getElementById('jumpscare-layer').style.display='flex'; setTimeout(()=>location.reload(), 1500); }

    function finale() {
        clearInterval(timer); showView('boss');
        setTimeout(() => {
            document.getElementById('monitor').style.animation = "monitor-shake 0.1s infinite";
            setTimeout(() => {
                document.getElementById('crack').style.opacity = "1";
                setTimeout(() => {
                    const m = document.getElementById('monitor');
                    m.style.transform = "translate(1200px, 400px) rotate(180deg)"; m.style.opacity = "0";
                    const s = document.getElementById('scp-void');
                    s.style.opacity = "1"; s.style.transform = "translate(-50%, -50%) scale(1.6)"; s.style.pointerEvents = "auto";
                    s.onclick = () => { 
                        document.getElementById('knife-in-void').style.display = "block";
                        s.onclick = null;
                        setTimeout(() => { document.getElementById('dialog-box').style.display = "block"; }, 500);
                    };
                }, 1500);
            }, 1500);
        }, 1000);
    }

    function advanceDialog() {
        dialogStep++;
        if(dialogStep === 1) {
            document.getElementById('dialog-text').innerText = "You always want to kill me!";
        } else {
            document.getElementById('dialog-box').style.display = "none";
            const s = document.getElementById('scp-void');
            s.style.transition = "all 2s";
            s.style.filter = "invert(1) contrast(5) hue-rotate(180deg)";
            s.style.transform = "translate(-50%, -50%) scale(0)";
            setTimeout(() => { document.getElementById('ending-screen').style.display = "flex"; }, 2000);
        }
    }
</script>
</body>
</html>

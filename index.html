<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The Void Failure - Original Style</title>
    <style>
        :root {
            --fnaf-green: #24ff15;
            --fnaf-red: #ff0000;
        }

        body, html {
            margin: 0; padding: 0; width: 100%; height: 100%;
            background: #000; color: var(--fnaf-green);
            font-family: 'Courier New', monospace; overflow: hidden;
            user-select: none;
        }

        /* 3D Büro & Monitor */
        .office {
            width: 100%; height: 100%;
            background: radial-gradient(circle at 50% 40%, #1a1a1a 0%, #050505 70%, #000 100%);
            display: flex; justify-content: center; align-items: center;
            perspective: 1200px;
        }

        .desk {
            width: 800px; height: 500px; background: #121212;
            position: relative; transform: rotateX(15deg);
            border-top: 10px solid #0a0a0a; box-shadow: 0 60px 150px #000;
            display: flex; justify-content: center; align-items: center;
        }

        .monitor {
            width: 480px; height: 360px; background: #1a1a1a;
            border-radius: 12px; padding: 15px; position: relative;
            box-shadow: 0 0 50px #000; transform: translateZ(50px);
            transition: transform 0.1s, opacity 0.5s;
        }

        .screen {
            width: 100%; height: 100%; background: #040604;
            position: relative; overflow: hidden; border: 4px solid #000;
        }

        /* Settings Button */
        #settings-btn {
            position: absolute; top: 10px; right: 10px;
            font-size: 10px; cursor: pointer; border: 1px solid var(--fnaf-green);
            padding: 2px 5px; z-index: 200;
        }

        /* Jumpscare */
        #jumpscare-layer {
            position: fixed; top:0; left:0; width:100%; height:100%;
            background: #000; z-index: 9999; display: none;
            align-items: center; justify-content: center;
        }

        .scary-face {
            width: 140%; height: 140%; fill: #600;
            animation: tremor 0.04s infinite;
        }

        .crack-overlay {
            position: absolute; top:0; left:0; width:100%; height:100%;
            background: rgba(255,255,255,0.1); opacity: 0; z-index: 150;
            pointer-events: none; border: 25px solid transparent;
            border-image: url('https://i.imgur.com/7S8zH4B.png') 30 stretch;
        }

        /* SCP Void */
        #scp-void {
            position: absolute; width: 350px; height: 350px;
            top: 50%; left: 50%; transform: translate(-50%, -50%) scale(0);
            opacity: 0; z-index: 5; pointer-events: none;
            transition: transform 0.6s cubic-bezier(0.175, 0.885, 0.32, 1.275), opacity 0.5s;
        }

        /* Gameplay */
        .view { width: 100%; height: 100%; display: none; flex-direction: column; align-items: center; justify-content: center; }
        .active { display: flex; }
        .btn { background: transparent; border: 1px solid var(--fnaf-green); color: var(--fnaf-green); padding: 8px 15px; margin: 10px; cursor: pointer; font-family: inherit; }

        @keyframes tremor { 0% { transform: scale(1); } 50% { transform: scale(1.05) translate(5px, 5px); } }
        @keyframes shake-mon { 0% { transform: translateZ(50px) translate(3px, 3px); } 50% { transform: translateZ(50px) translate(-3px, -3px); } }
    </style>
</head>
<body>

<div id="jumpscare-layer">
    <svg class="scary-face" viewBox="0 0 200 200">
        <circle cx="60" cy="70" r="25" fill="red" />
        <circle cx="140" cy="70" r="25" fill="red" />
        <path d="M 30 140 Q 100 240 170 140" stroke="white" stroke-width="12" fill="none" />
    </svg>
</div>

<div class="office">
    <div id="scp-void">
        <svg viewBox="0 0 200 200">
            <path d="M100 0 L140 70 L200 100 L140 130 L100 200 L60 130 L0 100 L60 70 Z" fill="white" />
            <circle cx="75" cy="100" r="15" fill="red" />
            <circle cx="125" cy="100" r="15" fill="red" />
        </svg>
    </div>

    <div class="desk">
        <div class="monitor" id="monitor">
            <div id="settings-btn" onclick="alert('VOL: 100%\nSENS: HIGH\nMODE: VOID')">⚙ SETTINGS</div>
            <div class="screen">
                <div class="crack-overlay" id="crack"></div>
                
                <div id="v-start" class="view active">
                    <h2 style="color:white">VOID_FAILURE</h2>
                    <button class="btn" onclick="startGame()">BOOT REPAIR</button>
                </div>

                <div id="v-game" class="view">
                    <div id="timer-bar" style="width:100%; height:5px; background:var(--fnaf-green); position:absolute; top:0;"></div>
                    <div id="game-zone"></div>
                </div>

                <div id="v-boss" class="view">
                    <h3 id="boss-txt">REPAIRING... 99%</h3>
                </div>
            </div>
        </div>
    </div>
</div>

<script>
    let lvl = 1;
    let timer;

    function startGame() {
        showView('game');
        runLevel();
    }

    function showView(id) {
        document.querySelectorAll('.view').forEach(v => v.classList.remove('active'));
        document.getElementById('v-' + id).classList.add('active');
    }

    function runLevel() {
        const zone = document.getElementById('game-zone');
        zone.innerHTML = '';
        if (lvl < 5) startTimer(7 - (lvl * 0.5));

        if (lvl === 1) { // Wires
            zone.innerHTML = '<p style="font-size:12px">CONNECT WIRES</p>';
            for(let i=0; i<3; i++) {
                let w = document.createElement('div');
                w.style = "width:45px;height:45px;border:2px solid #222;margin:10px;cursor:pointer";
                w.onclick = function() { this.style.background="red"; this.classList.add('x'); if(document.querySelectorAll('.x').length==3) next(); };
                zone.appendChild(w);
            }
        } else if (lvl === 2) { // 1-2-3
            zone.innerHTML = '<p style="font-size:12px">SEQUENCE 1-2-3</p>';
            [1,2,3].sort(()=>Math.random()-0.5).forEach(n => {
                let b = document.createElement('button'); b.className="btn"; b.innerText=n;
                b.onclick = function() { 
                    if(this.innerText == (document.querySelectorAll('.y').length+1)) { 
                        this.classList.add('y'); this.style.opacity=0.2; 
                        if(document.querySelectorAll('.y').length==3) next(); 
                    } else sc(); 
                };
                zone.appendChild(b);
            });
        } else if (lvl === 3) { // Classic Stabilizer (FIXED)
            zone.innerHTML = '<div id="s" style="width:90px;height:90px;border:4px solid #333;border-radius:50%;position:relative"><div id="n" style="width:2px;height:45px;background:white;position:absolute;left:44px;bottom:50%;transform-origin:bottom"></div></div><p style="font-size:10px;margin-top:10px">STOP AT 12:00</p>';
            let d = 0;
            let r = setInterval(() => { 
                d = (d + 12) % 360; 
                if(document.getElementById('n')) document.getElementById('n').style.transform=`rotate(${d}deg)`;
            }, 20);
            document.getElementById('s').onclick = () => { if(d < 30 || d > 330) { clearInterval(r); next(); } else { clearInterval(r); sc(); } };
        } else if (lvl === 4) { // Override
            let c=0; let b=document.createElement('button'); b.className="btn"; b.innerText="OVERRIDE 15x";
            b.onclick = () => { c++; b.innerText = 15-c; if(c>=15) next(); };
            zone.appendChild(b);
        } else {
            finale();
        }
    }

    function startTimer(s) {
        let w = 100; clearInterval(timer);
        timer = setInterval(() => {
            w -= (100 / (s * 10));
            document.getElementById('timer-bar').style.width = w + "%";
            if(w <= 0) sc();
        }, 100);
    }

    function next() { lvl++; runLevel(); }
    function sc() { clearInterval(timer); document.getElementById('jumpscare-layer').style.display='flex'; setTimeout(()=>location.reload(), 1500); }

    function finale() {
        clearInterval(timer);
        showView('boss');
        setTimeout(() => {
            document.getElementById('monitor').style.animation = "shake-mon 0.1s infinite";
            setTimeout(() => {
                document.getElementById('crack').style.opacity = "1";
                document.getElementById('boss-txt').innerText = "FATAL ERROR";
                setTimeout(() => {
                    const m = document.getElementById('monitor');
                    m.style.transition = "transform 0.5s, opacity 0.3s";
                    m.style.transform = "translate(1200px, 400px) rotate(180deg)";
                    m.style.opacity = "0";

                    const s = document.getElementById('scp-void');
                    s.style.opacity = "1";
                    s.style.transform = "translate(-50%, -50%) scale(1.6)";
                    s.style.pointerEvents = "auto";
                    s.onclick = () => {
                        s.style.filter = "invert(1) contrast(10)";
                        s.style.transform = "translate(-50%, -50%) scale(0)";
                        setTimeout(() => { alert("YOU SURVIVED THE VOID"); location.reload(); }, 1000);
                    };
                }, 1500);
            }, 1500);
        }, 1000);
    }
</script>
</body>
</html>

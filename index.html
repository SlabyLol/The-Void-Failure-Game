<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The Void Failure - Final Truth</title>
    <style>
        :root { 
            --fnaf-green: #24ff15; 
            --fnaf-red: #ff0000;
            --ui-border: rgba(36, 255, 21, 0.3);
        }
        
        body, html { 
            margin: 0; padding: 0; width: 100%; height: 100%; 
            background: #000; color: var(--fnaf-green); 
            font-family: 'Courier New', monospace; overflow: hidden; user-select: none; 
        }

        /* Ambient Office */
        .office { 
            width: 100%; height: 100%; 
            background: radial-gradient(circle at 50% 40%, #111 0%, #050505 60%, #000 100%); 
            display: flex; justify-content: center; align-items: center; perspective: 1200px; 
        }

        /* Monitor Design */
        .monitor { 
            width: 520px; height: 380px; background: #1a1a1a; 
            border-radius: 20px; padding: 15px; position: relative; 
            box-shadow: 0 0 100px #000, inset 0 0 20px #000; 
            transform: translateZ(50px); transition: all 0.5s cubic-bezier(0.4, 0, 0.2, 1);
            border: 4px solid #222;
        }

        .screen { 
            width: 100%; height: 100%; background: #040604; 
            position: relative; overflow: hidden; border: 10px solid #111;
            border-radius: 10px;
        }

        /* CRT Overlay Image */
        #crt-overlay {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background: url('crtb.png'); background-size: cover;
            opacity: 0; z-index: 100; pointer-events: none; transition: opacity 0.3s;
        }

        /* UI Views */
        .view { width: 100%; height: 100%; display: none; flex-direction: column; align-items: center; justify-content: center; z-index: 10; }
        .active { display: flex; }

        .btn { 
            background: rgba(0,0,0,0.5); border: 1px solid var(--fnaf-green); 
            color: var(--fnaf-green); padding: 12px 25px; margin: 10px; 
            cursor: pointer; font-family: inherit; font-size: 14px; 
            text-transform: uppercase; letter-spacing: 2px; transition: 0.3s;
        }
        .btn:hover { background: var(--fnaf-green); color: #000; box-shadow: 0 0 20px var(--fnaf-green); }

        /* Frequency Task */
        #freq-container { width: 250px; height: 80px; border: 1px solid var(--ui-border); position: relative; display: flex; align-items: center; justify-content: center; margin-top: 20px;}
        input[type=range] { width: 80%; accent-color: var(--fnaf-green); cursor: pointer; }

        /* Dialog Box */
        #dialog-box { 
            position: fixed; bottom: 40px; left: 50%; transform: translateX(-50%); 
            width: 75%; background: rgba(0,0,0,0.95); border: 2px solid #fff; 
            padding: 25px; color: white; display: none; z-index: 2000; 
            cursor: pointer;
        }

        /* Final Entity */
        #scp-void { 
            position: absolute; width: 400px; height: 400px; top: 50%; left: 50%; 
            transform: translate(-50%, -50%) scale(0); opacity: 0; z-index: 200; 
            pointer-events: none; transition: all 0.8s;
        }
        #knife { position: absolute; width: 80px; top: 30%; left: 55%; transform: rotate(45deg); display: none; filter: drop-shadow(0 0 10px red); z-index: 210; }

        /* Ending Screen */
        #ending-screen { 
            position: fixed; top:0; left:0; width:100%; height:100%; 
            background: #000; z-index: 9000; display: none; 
            flex-direction: column; align-items: center; justify-content: center; text-align: center;
        }

        .fade-in { opacity: 0; animation: fadeInEffect 2s forwards; }

        @keyframes fadeInEffect { from { opacity: 0; } to { opacity: 1; } }
        @keyframes shake-extreme { 0% { transform: translate(5px, 5px); } 100% { transform: translate(-5px, -5px); } }
        @keyframes tremor { 0% { transform: scale(1); } 50% { transform: scale(1.05) translate(5px, 5px); } }
    </style>
</head>
<body>

<audio id="jumpscare-audio" src="c_jscare.mp3" preload="auto"></audio>

<div id="jumpscare-layer" style="position:fixed; top:0; left:0; width:100%; height:100%; background:#000; z-index:9999; display:none; align-items:center; justify-content:center;">
    <svg style="width:140%; height:140%; fill:#600; animation: tremor 0.04s infinite;" viewBox="0 0 200 200">
        <circle cx="60" cy="70" r="25" fill="red" /><circle cx="140" cy="70" r="25" fill="red" />
        <path d="M 30 140 Q 100 240 170 140" stroke="white" stroke-width="12" fill="none" />
    </svg>
</div>

<div class="office">
    <div id="scp-void">
        <svg viewBox="0 0 200 200"><path d="M100 0 L140 70 L200 100 L140 130 L100 200 L60 130 L0 100 L60 70 Z" fill="white" /><circle cx="75" cy="100" r="15" fill="red" /><circle cx="125" cy="100" r="15" fill="red" /></svg>
        <img id="knife" src="data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 50 150'><path d='M25 0 L45 80 L30 150 L20 150 L5 80 Z' fill='silver' stroke='black'/></svg>">
    </div>

    <div class="monitor" id="monitor">
        <div class="screen">
            <div id="crt-overlay"></div>
            
            <div id="v-start" class="view active">
                <h1 style="letter-spacing: 4px;">VOID_FAILURE</h1>
                <button class="btn" onclick="startGame()">REPAIR SYSTEM</button>
            </div>

            <div id="v-game" class="view">
                <div id="timer-bar" style="width:100%; height:4px; background:var(--fnaf-green); position:absolute; top:0;"></div>
                <div id="game-zone"></div>
            </div>

            <div id="v-boss" class="view">
                <h2 id="status-text">REPAIRING... 99%</h2>
            </div>
        </div>
    </div>
</div>

<div id="dialog-box" onclick="advanceDialog()">
    <div style="color:red; font-weight:bold; margin-bottom:10px;">SCP Void</div>
    <div id="dialog-text">W-W-hy...</div>
</div>

<div id="ending-screen">
    <h1 class="fade-in" style="color:white; font-size: 3rem; margin-bottom: 20px;">THE END</h1>
    <p class="fade-in" style="color:#666; font-style: italic; margin-bottom: 10px; animation-delay: 1s;">Why....</p>
    <p class="fade-in" style="color:#aaa; margin-bottom: 40px; animation-delay: 2s;">Void only searched for friendship and love...</p>
    <div class="fade-in" style="color:var(--fnaf-green); border-top: 1px solid #333; padding-top: 20px; max-width: 500px; animation-delay: 3s;">
        Lesson: Listen before you judge or destroy.
    </div>
    <button class="btn fade-in" onclick="location.reload()" style="margin-top:50px; animation-delay: 4s;">REBOOT</button>
</div>

<script>
    let lvl = 1;
    let timer;
    let isTrans = false;
    let dialogStep = 0;
    const jumpscareSound = document.getElementById('jumpscare-audio');

    function startGame() {
        // Unlock audio for the browser
        jumpscareSound.play().then(() => {
            jumpscareSound.pause();
            jumpscareSound.currentTime = 0;
        }).catch(e => console.log("Audio unlock interaction."));
        
        showView('game');
        runLevel();
    }

    function showView(id) {
        document.querySelectorAll('.view').forEach(v => v.classList.remove('active'));
        document.getElementById('v-' + id).classList.add('active');
    }

    function runLevel() {
        isTrans = false;
        const zone = document.getElementById('game-zone');
        zone.innerHTML = '';
        if(lvl < 4) startTimer(11 - (lvl * 2.5));

        if(lvl === 1) {
            zone.innerHTML = '<p>ALIGN NODES</p>';
            for(let i=0; i<3; i++) {
                let d = document.createElement('div');
                d.style = "width:40px; height:40px; border:1px solid var(--fnaf-green); margin:10px; cursor:pointer;";
                d.onclick = function() { if(isTrans) return; this.style.background="red"; this.classList.add('ok'); if(document.querySelectorAll('.ok').length==3) next(); };
                zone.appendChild(d);
            }
        } else if(lvl === 2) {
            zone.innerHTML = '<p>STABILIZE POWER</p><div id="freq-container"><div style="width:40px; height:100%; background:rgba(255,0,0,0.3); position:absolute;"></div><div id="stab-bar" style="width:4px; height:100%; background:white; position:absolute; left:0;"></div></div>';
            let p = 0, dr = 1;
            let si = setInterval(() => {
                p += 3.5 * dr; if(p >= 246 || p <= 0) dr *= -1;
                document.getElementById('stab-bar').style.left = p + "px";
            }, 10);
            document.getElementById('freq-container').onclick = () => {
                if(p > 105 && p < 145) { clearInterval(si); next(); } else { clearInterval(si); sc(); }
            };
        } else if(lvl === 3) {
            zone.innerHTML = '<p>MATCH FREQUENCY</p><input type="range" id="knob" min="0" max="100" value="0"><p id="f-val" style="margin-top:10px;">0Hz</p>';
            let target = Math.floor(Math.random() * 80) + 10;
            const k = document.getElementById('knob');
            k.oninput = () => {
                document.getElementById('f-val').innerText = k.value + "Hz (Target: " + target + "Hz)";
                if(Math.abs(k.value - target) < 2) { next(); }
            };
        } else finale();
    }

    function startTimer(s) {
        let w = 100; clearInterval(timer);
        timer = setInterval(() => {
            w -= (100 / (s * 10));
            document.getElementById('timer-bar').style.width = w + "%";
            if(w <= 0) sc();
        }, 100);
    }

    function next() { isTrans = true; clearInterval(timer); lvl++; setTimeout(runLevel, 400); }

    function sc() {
        isTrans = true; clearInterval(timer);
        jumpscareSound.play().catch(e => console.error("Sound play failed:", e));
        document.getElementById('jumpscare-layer').style.display='flex';
        setTimeout(() => location.reload(), 2000);
    }

    function finale() {
        clearInterval(timer); showView('boss');
        setTimeout(() => {
            document.getElementById('crt-overlay').style.opacity = "1";
            document.getElementById('monitor').style.animation = "shake-extreme 0.05s infinite";
            
            setTimeout(() => {
                const m = document.getElementById('monitor');
                m.style.transform = "translate(1200px, 400px) rotate(120deg)"; m.style.opacity = "0";
                
                const v = document.getElementById('scp-void');
                v.style.opacity = "1"; v.style.transform = "translate(-50%, -50%) scale(1.6)"; v.style.pointerEvents = "auto";
                
                v.onclick = () => {
                    document.getElementById('knife').style.display = "block";
                    v.onclick = null;
                    setTimeout(() => { document.getElementById('dialog-box').style.display = "block"; }, 600);
                };
            }, 2000);
        }, 1500);
    }

    function advanceDialog() {
        dialogStep++;
        if(dialogStep === 1) {
            document.getElementById('dialog-text').innerText = "You always want to kill me!";
        } else {
            document.getElementById('dialog-box').style.display = "none";
            const v = document.getElementById('scp-void');
            v.style.transition = "all 2.5s ease-in";
            v.style.filter = "invert(1) blur(15px) contrast(3)";
            v.style.transform = "translate(-50%, -50%) scale(0)";
            setTimeout(() => { document.getElementById('ending-screen').style.display = "flex"; }, 3000);
        }
    }
</script>
</body>
</html>

<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>The Void Failure Game</title>
    <style>
        :root { --fnaf-green: #24ff15; --fnaf-red: #ff0000; --bg-dark: #050505; }
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; background: #000; color: var(--fnaf-green); font-family: 'Courier New', monospace; overflow: hidden; user-select: none; }

        /* CRT Filter & Rauschen */
        .crt-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: linear-gradient(rgba(18, 16, 16, 0) 50%, rgba(0, 0, 0, 0.1) 50%), linear-gradient(90deg, rgba(255, 0, 0, 0.02), rgba(0, 255, 0, 0.01), rgba(0, 0, 255, 0.02)); z-index: 5000; pointer-events: none; background-size: 100% 3px, 3px 100%; opacity: 0.8; }
        .vignette { position: fixed; top: 0; left: 0; width: 100%; height: 100%; box-shadow: inset 0 0 150px #000; z-index: 5001; pointer-events: none; }

        #main-viewport { position: relative; width: 100%; height: 100%; display: flex; flex-direction: column; align-items: center; justify-content: center; }

        /* UI */
        #ui-top { position: absolute; top: 30px; text-align: center; width: 100%; z-index: 100; }
        #timer-box { width: 280px; height: 12px; border: 1px solid #222; margin: 10px auto; background: #100; overflow: hidden; }
        #timer-fill { width: 100%; height: 100%; background: var(--fnaf-green); box-shadow: 0 0 15px var(--fnaf-green); transition: width 0.1s linear; }

        /* Panels */
        .panel { width: 360px; height: 460px; border: 3px solid #1a1a1a; background: var(--bg-dark); display: none; flex-direction: column; align-items: center; justify-content: center; position: relative; box-shadow: inset 0 0 50px #000; }

        /* Level 3: Stabilizer Fix */
        #stab-disk { width: 240px; height: 240px; border: 8px solid #111; border-radius: 50%; position: relative; background: #020202; cursor: pointer; }
        #stab-target { width: 60px; height: 35px; background: rgba(255, 0, 0, 0.3); border: 2px solid red; position: absolute; top: -5px; left: 90px; border-radius: 5px; box-shadow: 0 0 15px red; }
        #stab-needle { width: 6px; height: 110px; background: #fff; position: absolute; bottom: 50%; left: calc(50% - 3px); transform-origin: bottom center; box-shadow: 0 0 10px #fff; }

        /* Tasks General */
        .wire { width: 65px; height: 65px; border: 2px solid #333; margin: 15px; cursor: pointer; background: #0a0a0a; }
        .wire.active { background: var(--fnaf-red); border-color: #fff; box-shadow: 0 0 20px red; }
        .num-btn { width: 90px; height: 90px; background: #0a0a0a; border: 1px solid var(--fnaf-green); color: var(--fnaf-green); font-size: 2.2rem; margin: 10px; cursor: pointer; transition: 0.1s; }
        .num-btn:active { background: var(--fnaf-green); color: #000; }
        .num-btn.done { opacity: 0.1; border-color: red; pointer-events: none; }

        /* Boss Battle */
        #boss-creature { width: 20px; height: 20px; background: #fff; border-radius: 50%; filter: blur(12px); position: absolute; opacity: 0; top: 40%; left: calc(50% - 10px); }
        #knife-view { width: 120px; position: absolute; bottom: 30px; filter: invert(1) brightness(2); transition: transform 0.1s; pointer-events: none; }

        /* Screens */
        .screen { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #000; z-index: 10000; display: flex; flex-direction: column; align-items: center; justify-content: center; }
        .btn { padding: 18px 50px; background: transparent; border: 2px solid #333; color: #444; cursor: pointer; font-family: inherit; font-size: 1.4rem; letter-spacing: 8px; transition: 0.3s; }
        .btn:hover { border-color: var(--fnaf-green); color: var(--fnaf-green); box-shadow: 0 0 20px var(--fnaf-green); }

        #jumpscare { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #000; display: none; z-index: 20000; align-items: center; justify-content: center; }
        #fail-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #000; color: red; display: none; z-index: 30000; word-break: break-all; overflow: hidden; font-size: 1.2rem; line-height: 0.7; opacity: 0.8; }

        @keyframes monster-move { 0% { transform: scale(1); } 50% { transform: scale(1.1) translate(5px, 5px); } 100% { transform: scale(1); } }
        .monster-shake { animation: monster-move 0.04s infinite; }
    </style>
</head>
<body>

    <div class="crt-overlay"></div>
    <div class="vignette"></div>

    <div id="main-viewport">
        <div id="ui-top">
            <div id="depth-txt" style="letter-spacing: 3px; color: #333;">DEPTH: 01</div>
            <div id="timer-box"><div id="timer-fill"></div></div>
        </div>

        <div id="task-panel" class="panel"></div>

        <div id="terminal-panel" class="panel">
            <div style="font-size: 1.2rem; margin-bottom: 25px;">RESTORE_SYSTEM... <span style="color:red">SHHH!</span></div>
            <div style="width: 80%; height: 15px; border: 1px solid var(--fnaf-green); padding: 2px;">
                <div id="load-bar" style="width:0%; height:100%; background: var(--fnaf-green);"></div>
            </div>
            <div id="logs" style="font-size: 0.7rem; margin-top: 30px; opacity: 0.4; width: 80%; line-height: 1.5;"></div>
        </div>

        <div id="boss-panel" class="panel">
            <div id="boss-creature"></div>
            <div id="knife-view">
                <svg viewBox="0 0 50 150"><path d="M25 0 L45 80 L30 150 L20 150 L5 80 Z" fill="#fff" stroke="#fff" stroke-width="2"/></svg>
            </div>
            <div style="position:absolute; bottom:15px; font-size:0.6rem; color:red; opacity:0.5;">WAIT_FOR_STRIKE</div>
        </div>
    </div>

    <div id="start-screen" class="screen">
        <h1 style="letter-spacing: 12px; color: #1a1a1a; margin-bottom: 50px;">THE VOID FAILURE</h1>
        <button class="btn" onclick="startGame()">INITIATE</button>
    </div>

    <div id="jumpscare">
        <svg class="monster-shake" style="width:130%; height:130%;" viewBox="0 0 200 200">
            <circle cx="65" cy="80" r="20" fill="red"/><circle cx="135" cy="80" r="20" fill="red"/>
            <path d="M 40 150 Q 100 240 160 150" stroke="red" fill="none" stroke-width="12"/>
        </svg>
    </div>

    <div id="fail-overlay"></div>

    <audio id="snd-jscare" src="c_jscare.mp3"></audio>
    <audio id="snd-loop" src="ncb_loop.mp3" loop></audio>

    <script>
        let level = 1;
        let timeLeft = 100;
        let timerInt, bossInt;
        const sndJscare = document.getElementById('snd-jscare');
        const sndLoop = document.getElementById('snd-loop');

        // Gehörschutz: Lautstärke limitieren
        sndJscare.volume = 0.5;
        sndLoop.volume = 0.4;

        function startGame() {
            document.getElementById('start-screen').style.display = 'none';
            // Audio-Kontext aktivieren
            sndJscare.play().then(() => { sndJscare.pause(); sndJscare.currentTime = 0; });
            loadLevel();
        }

        function loadLevel() {
            const panel = document.getElementById('task-panel');
            panel.style.display = 'flex';
            panel.innerHTML = '';
            document.getElementById('depth-txt').innerText = "DEPTH: 0" + level;

            if (level === 1) { // Wires
                for(let i=0; i<3; i++) {
                    let w = document.createElement('div'); w.className = 'wire';
                    w.onclick = function() { this.classList.add('active'); if(document.querySelectorAll('.wire.active').length === 3) next(); };
                    panel.appendChild(w);
                }
            } else if (level === 2) { // Numbers
                let goal = 1;
                [1,2,3].sort(()=>Math.random()-0.5).forEach(n => {
                    let b = document.createElement('button'); b.className = 'num-btn'; b.innerText = n;
                    b.onclick = function() { if(parseInt(this.innerText) === goal) { this.classList.add('done'); goal++; if(goal>3) next(); } else fail(); };
                    panel.appendChild(b);
                });
            } else if (level === 3) { // Stabilizer
                let disk = document.createElement('div'); disk.id = 'stab-disk';
                let target = document.createElement('div'); target.id = 'stab-target';
                let needle = document.createElement('div'); needle.id = 'stab-needle';
                let angle = 0;
                let rotate = setInterval(() => { 
                    angle = (angle + 7) % 360; 
                    needle.style.transform = `rotate(${angle}deg)`; 
                }, 20);
                disk.onclick = () => { 
                    if(angle > 340 || angle < 20) { clearInterval(rotate); next(); } 
                    else fail(); 
                };
                disk.appendChild(target); disk.appendChild(needle); panel.appendChild(disk);
            } else if (level === 4) { // Fast Tap
                let taps = 0;
                let b = document.createElement('button'); b.className = 'num-btn'; b.style.width = "220px"; b.innerText = "OVERRIDE";
                b.onclick = () => { taps++; b.innerText = 12 - taps; if(taps >= 12) next(); };
                panel.appendChild(b);
            } else {
                panel.style.display = 'none';
                runTerminal();
                return;
            }
            startTimer(12 - (level * 1.5));
        }

        function startTimer(sec) {
            timeLeft = 100;
            clearInterval(timerInt);
            timerInt = setInterval(() => {
                timeLeft -= (0.1 / sec) * 100;
                document.getElementById('timer-fill').style.width = timeLeft + "%";
                if(timeLeft <= 0) fail();
            }, 100);
        }

        function next() { level++; loadLevel(); }

        async function runTerminal() {
            document.getElementById('terminal-panel').style.display = 'flex';
            document.getElementById('ui-top').style.display = 'none';
            let prog = 0;
            const logLines = ["> Check...", "> Port 443...", "> Data found.", "> Extraction...", "> Warning..."];
            const logBox = document.getElementById('logs');
            
            try {
                const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
                const audioCtx = new AudioContext();
                const analyser = audioCtx.createAnalyser();
                const source = audioCtx.createMediaStreamSource(stream);
                source.connect(analyser);
                const data = new Uint8Array(analyser.frequencyBinCount);

                const loop = setInterval(() => {
                    prog += 0.4;
                    document.getElementById('load-bar').style.width = prog + "%";
                    if(Math.floor(prog) % 20 === 0 && prog % 1 === 0) logBox.innerHTML += logLines[Math.floor(prog/21)] + "<br>";
                    
                    analyser.getByteFrequencyData(data);
                    let vol = data.reduce((a,b)=>a+b)/data.length;
                    if(vol > 50) { clearInterval(loop); stream.getTracks().forEach(t=>t.stop()); fail(); }
                    if(prog >= 100) { clearInterval(loop); stream.getTracks().forEach(t=>t.stop()); runBoss(); }
                }, 50);
            } catch(e) { fail(); }
        }

        function runBoss() {
            document.getElementById('terminal-panel').style.display = 'none';
            document.getElementById('boss-panel').style.display = 'flex';
            let size = 15;
            const cre = document.getElementById('boss-creature');
            bossInt = setInterval(() => {
                size += 4; cre.style.width = size + "px"; cre.style.height = size + "px"; cre.style.opacity = size/180;
                if(size > 400) fail();
            }, 30);

            document.getElementById('boss-panel').onclick = () => {
                clearInterval(bossInt);
                document.getElementById('knife-view').style.transform = "translateY(-150px) rotate(-20deg)";
                if(size > 80 && size < 160) {
                    setTimeout(() => {
                        document.getElementById('boss-panel').style.display = 'none';
                        document.body.innerHTML = "<div class='screen'><h1 style='color:cyan'>SYSTEM_RESTORED</h1><p>Thx for playing</p><button class='btn' onclick='location.reload()'>RESTART</button></div>";
                    }, 800);
                } else fail();
            };
        }

        function fail() {
            clearInterval(timerInt); clearInterval(bossInt);
            document.getElementById('jumpscare').style.display = 'flex';
            sndJscare.play();
            setTimeout(() => {
                document.getElementById('jumpscare').style.display = 'none';
                const overlay = document.getElementById('fail-overlay');
                overlay.style.display = 'block';
                sndLoop.play();
                let txt = ""; for(let i=0; i<3000; i++) txt += "NEVER COME BACK ";
                overlay.innerText = txt;
            }, 1600);
        }
    </script>
</body>
</html>

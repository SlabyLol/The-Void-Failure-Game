<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>The Void Failure</title>
    <style>
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; background: #000; overflow: hidden; color: #fff; font-family: 'Courier New', monospace; user-select: none; }
        
        /* UI & Task-Overlay */
        #game-container { position: relative; width: 100%; height: 100%; display: flex; flex-direction: column; align-items: center; justify-content: center; }
        #ui-top { position: absolute; top: 20px; text-align: center; z-index: 5; }
        #timer-bar { width: 200px; height: 5px; background: #200; margin-top: 10px; border: 1px solid #400; }
        #timer-fill { width: 100%; height: 100%; background: red; transition: width 1s linear; }

        /* Task-Fenster */
        #task-window { 
            width: 320px; height: 400px; border: 4px solid #111; background: #050505; 
            display: none; flex-direction: column; align-items: center; justify-content: space-around;
            padding: 20px; box-shadow: 0 0 50px rgba(255,0,0,0.1); z-index: 10;
        }

        /* Task 1: Wiring */
        .wire-dot { width: 30px; height: 30px; border-radius: 50%; background: #400; cursor: pointer; margin: 10px; }
        .wire-dot.active { background: red; box-shadow: 0 0 10px red; }

        /* Task 2: Numbers */
        .num-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
        .num-btn { width: 60px; height: 60px; background: #111; border: 1px solid #300; color: #400; font-size: 1.5rem; cursor: pointer; }
        .num-btn.done { border-color: red; color: red; opacity: 0.3; }

        /* Task 3: Slider */
        #slider-track { width: 40px; height: 250px; background: #111; border: 1px solid #333; position: relative; }
        #slider-knob { width: 100%; height: 40px; background: #400; position: absolute; bottom: 0; cursor: pointer; }

        /* Task 5: Mic */
        #volume-meter { width: 250px; height: 20px; border: 1px solid #300; display: none; background: #000; overflow: hidden; }
        #volume-fill { height: 100%; width: 0%; background: red; }

        /* Jumpscare & Approach */
        #approach { position: fixed; top:0; left:0; width:100%; height:100%; background:#000; display:none; z-index:1000; align-items:center; justify-content:center; }
        #creature { width: 50px; height: 50px; background:#100; border-radius:50%; filter:blur(20px); transition: 1s all ease-in; }
        #jumpscare { position: fixed; top:0; left:0; width:100%; height:100%; background:#000; display:none; z-index:1001; align-items:center; justify-content:center; }
        .monster { width: 150%; height:150%; fill:#300; animation: shake 0.05s infinite; }
        @keyframes shake { 0%{transform:scale(1);} 50%{transform:scale(1.05) translate(5px,5px);} 100%{transform:scale(1);} }

        /* Start & End */
        .screen { position: fixed; top:0; left:0; width:100%; height:100%; background:#000; display:flex; flex-direction:column; align-items:center; justify-content:center; z-index:2000; }
        .btn { padding: 15px 40px; background:transparent; border:1px solid #300; color:#300; cursor:pointer; font-family:inherit; }
        .btn:hover { border-color:red; color:red; }
        #final-screen { position: fixed; top:0; left:0; width:100%; height:100%; background:#000; color:red; display:none; z-index:3000; word-break:break-all; font-weight:bold; overflow:hidden; line-height:0.8; }
    </style>
</head>
<body>

    <div id="start-screen" class="screen">
        <h1 style="color:#200; letter-spacing:10px;">THE VOID FAILURE</h1>
        <button class="btn" onclick="startGame()">SYSTEM STARTEN</button>
    </div>

    <div id="game-container">
        <div id="ui-top">
            <div id="lvl-txt" style="color:#400">STATUS: INITIALISIERUNG</div>
            <div id="task-name" style="font-size: 0.8rem; margin-top:5px;">BEREITMACHEN...</div>
            <div id="timer-bar"><div id="timer-fill"></div></div>
        </div>

        <div id="task-window">
            </div>

        <div id="volume-meter"><div id="volume-fill"></div></div>
    </div>

    <div id="approach"><div id="creature"></div></div>
    <div id="jumpscare">
        <svg class="monster" viewBox="0 0 200 200">
            <path d="M 20 60 Q 50 5 100 5 Q 150 5 180 60 Q 200 130 100 195 Q 0 130 20 60" fill="#0a0000" stroke="red" stroke-width="1"/>
            <circle cx="65" cy="70" r="15" fill="red" />
            <circle cx="135" cy="70" r="15" fill="red" />
            <path d="M 40 140 Q 100 210 160 140" stroke="red" fill="none" stroke-width="5" />
        </svg>
    </div>

    <div id="final-screen"></div>

    <audio id="snd-jscare" src="c_jscare.mp3"></audio>
    <audio id="snd-loop" src="ncb_loop.mp3" loop></audio>

    <script>
        let level = 1;
        let timeLeft = 10;
        let timerInterval;
        const taskWin = document.getElementById('task-window');
        const taskName = document.getElementById('task-name');
        const timerFill = document.getElementById('timer-fill');
        const sndJscare = document.getElementById('snd-jscare');
        const sndLoop = document.getElementById('snd-loop');

        function startGame() {
            document.getElementById('start-screen').style.display = 'none';
            loadLevel();
        }

        function loadLevel() {
            taskWin.style.display = 'flex';
            taskWin.innerHTML = '';
            document.getElementById('lvl-txt').innerText = "DEPTH: LEVEL " + level;
            timeLeft = 12 - level;
            updateTimerBar();

            if (level === 1) task1();
            if (level === 2) task2();
            if (level === 3) task3();
            if (level === 4) task4();
            if (level === 5) task5();

            if(level < 5) {
                clearInterval(timerInterval);
                timerInterval = setInterval(() => {
                    timeLeft -= 0.1;
                    updateTimerBar();
                    if(timeLeft <= 0) fail();
                }, 100);
            }
        }

        function updateTimerBar() {
            const percent = (timeLeft / (12 - level)) * 100;
            timerFill.style.width = percent + "%";
        }

        // --- TASK 1: WIRING ---
        function task1() {
            taskName.innerText = "TASK: FIX WIRING";
            for(let i=0; i<3; i++) {
                let dot = document.createElement('div');
                dot.className = 'wire-dot';
                dot.onclick = function() {
                    this.classList.add('active');
                    if(document.querySelectorAll('.wire-dot.active').length === 3) nextLevel();
                };
                taskWin.appendChild(dot);
            }
        }

        // --- TASK 2: NUMBERS ---
        function task2() {
            taskName.innerText = "TASK: UNLOCK MANIFOLD (1-4)";
            let grid = document.createElement('div');
            grid.className = 'num-grid';
            let currentNum = 1;
            [3,1,4,2].forEach(n => {
                let btn = document.createElement('button');
                btn.className = 'num-btn';
                btn.innerText = n;
                btn.onclick = function() {
                    if(parseInt(this.innerText) === currentNum) {
                        this.classList.add('done');
                        currentNum++;
                        if(currentNum > 4) nextLevel();
                    } else {
                        fail();
                    }
                };
                grid.appendChild(btn);
            });
            taskWin.appendChild(grid);
        }

        // --- TASK 3: SLIDER ---
        function task3() {
            taskName.innerText = "TASK: DIVERT POWER";
            let track = document.createElement('div');
            track.id = 'slider-track';
            let knob = document.createElement('div');
            knob.id = 'slider-knob';
            knob.onmousedown = knob.ontouchstart = function(e) {
                let move = (ev) => {
                    let y = ev.clientY || ev.touches[0].clientY;
                    let rect = track.getBoundingClientRect();
                    let pos = Math.max(0, Math.min(210, rect.bottom - y));
                    knob.style.bottom = pos + "px";
                    if(pos > 200) {
                        window.removeEventListener('mousemove', move);
                        nextLevel();
                    }
                };
                window.addEventListener('mousemove', move);
                window.addEventListener('touchmove', move);
                window.addEventListener('mouseup', () => window.removeEventListener('mousemove', move));
            };
            track.appendChild(knob);
            taskWin.appendChild(track);
        }

        // --- TASK 4: CALIBRATION ---
        function task4() {
            taskName.innerText = "TASK: CALIBRATE (CLICK ON RED)";
            let dial = document.createElement('div');
            dial.style.width = "200px"; dial.style.height = "200px"; dial.style.border = "5px solid #111"; dial.style.borderRadius = "50%"; dial.style.position = "relative";
            let needle = document.createElement('div');
            needle.style.width = "2px"; needle.style.height = "100px"; needle.style.background = "white"; needle.style.position = "absolute"; needle.style.left = "99px"; needle.style.transformOrigin = "bottom";
            let target = document.createElement('div');
            target.style.width = "40px"; target.style.height = "40px"; target.style.background = "red"; target.style.position = "absolute"; target.style.top = "0"; target.style.left = "80px"; target.style.opacity = "0.5";
            
            let angle = 0;
            let rot = setInterval(() => {
                angle += 5;
                needle.style.transform = `rotate(${angle}deg)`;
            }, 20);

            dial.onclick = () => {
                let normalizedAngle = angle % 360;
                if(normalizedAngle > 340 || normalizedAngle < 20) {
                    clearInterval(rot);
                    nextLevel();
                } else {
                    fail();
                }
            };
            dial.appendChild(target); dial.appendChild(needle); taskWin.appendChild(dial);
        }

        // --- TASK 5: MIC ---
        async function task5() {
            clearInterval(timerInterval);
            taskWin.style.display = 'none';
            document.getElementById('volume-meter').style.display = 'block';
            taskName.innerText = "SYSTEM REBOOT: STAY SILENT";
            
            try {
                const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
                const audioCtx = new AudioContext();
                const analyser = audioCtx.createAnalyser();
                const source = audioCtx.createMediaStreamSource(stream);
                source.connect(analyser);
                analyser.fftSize = 256;
                const data = new Uint8Array(analyser.frequencyBinCount);

                function checkMic() {
                    analyser.getByteFrequencyData(data);
                    let avg = data.reduce((a,b) => a+b) / data.length;
                    document.getElementById('volume-fill').style.width = Math.min(avg*2, 100) + "%";
                    if(avg > 45) {
                        stream.getTracks().forEach(t => t.stop());
                        triggerJumpscare();
                    } else {
                        requestAnimationFrame(checkMic);
                    }
                }
                checkMic();
            } catch(e) {
                triggerJumpscare();
            }
        }

        function nextLevel() {
            clearInterval(timerInterval);
            level++;
            if(level <= 5) loadLevel();
        }

        function fail() {
            clearInterval(timerInterval);
            taskWin.style.display = 'none';
            const app = document.getElementById('approach');
            const cre = document.getElementById('creature');
            app.style.display = 'flex';
            setTimeout(() => {
                cre.style.width = "2000px";
                cre.style.height = "2000px";
                cre.style.background = "#200";
            }, 100);
            setTimeout(triggerJumpscare, 1100);
        }

        function triggerJumpscare() {
            document.getElementById('approach').style.display = 'none';
            document.getElementById('jumpscare').style.display = 'flex';
            sndJscare.play().catch(e => {});
            setTimeout(() => {
                document.getElementById('jumpscare').style.display = 'none';
                showFinal();
            }, 1500);
        }

        function showFinal() {
            const fin = document.getElementById('final-screen');
            fin.style.display = 'block';
            sndLoop.play().catch(e => {});
            let t = "";
            for(let i=0; i<5000; i++) t += "NEVER COME BACK ";
            fin.innerText = t;
        }
    </script>
</body>
</html>

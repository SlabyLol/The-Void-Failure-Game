<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>The Void Failure</title>
    <style>
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; background: #000; overflow: hidden; color: #fff; font-family: 'Courier New', monospace; user-select: none; }
        canvas { display: block; touch-action: none; cursor: none; }

        /* UI */
        #game-ui { position: fixed; top: 20px; left: 20px; z-index: 10; pointer-events: none; }
        #level-display { font-size: 1.5rem; color: #600; font-weight: bold; text-shadow: 2px 2px #000; }
        #task-desc { font-size: 1rem; color: #aaa; margin-top: 5px; text-transform: uppercase; }
        
        /* Volume Bar für Level 5 */
        #volume-container { width: 250px; height: 15px; border: 1px solid #444; margin-top: 15px; display: none; background: #111; position: relative; }
        #volume-bar { width: 0%; height: 100%; background: linear-gradient(90deg, #500, #f00); transition: width 0.1s; }

        /* Start Screen */
        .screen { position: fixed; top: 0; left: 0; width: 100%; height: 100%; display: flex; flex-direction: column; justify-content: center; align-items: center; z-index: 100; background: #000; }
        #start-btn { padding: 15px 50px; background: transparent; border: 2px solid #300; color: #500; font-size: 1.5rem; cursor: pointer; transition: 0.3s; font-family: inherit; }
        #start-btn:hover { border-color: red; color: red; box-shadow: 0 0 20px red; }

        /* Die Kreatur kommt (Approach) */
        #approach-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: black; display: none; z-index: 9998; justify-content: center; align-items: center; pointer-events: none; }
        #creature-silhouette { width: 20px; height: 20px; background: #111; border-radius: 50%; filter: blur(10px); }
        .run-at-player { animation: runForward 1.2s forwards; }
        @keyframes runForward {
            0% { transform: scale(1); filter: blur(10px); background: #111; }
            100% { transform: scale(100); filter: blur(2px); background: #300; }
        }

        /* Jumpscare */
        #jumpscare { position: fixed; top: 0; left: 0; width: 100%; height: 100%; display: none; background: #000; z-index: 9999; justify-content: center; align-items: center; }
        .monster-svg { width: 140%; height: 140%; fill: #200; filter: drop-shadow(0 0 50px red); animation: tremor 0.05s infinite; }
        @keyframes tremor { 0% { transform: translate(5px, 5px); } 50% { transform: translate(-5px, -10px); } 100% { transform: translate(2px, 8px); } }

        /* "ToO bAd :)" */
        #bad-msg { color: red; font-size: 4rem; font-weight: bold; display: none; z-index: 10001; text-align: center; }

        /* Finaler Screen */
        #final-screen { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #000; color: #f00; display: none; z-index: 10002; overflow: hidden; font-size: 1.3rem; line-height: 0.7; word-break: break-all; text-align: center; }
    </style>
</head>
<body>

    <div id="game-ui">
        <div id="level-display">DEPTH: LEVEL 1</div>
        <div id="task-desc">FINDE DAS FRAGMENT IN DER DUNKELHEIT</div>
        <div id="volume-container"><div id="volume-bar"></div></div>
    </div>

    <div id="start-screen" class="screen">
        <h1 style="color: #200; font-size: 2.5rem; letter-spacing: 10px; margin-bottom: 30px;">THE VOID FAILURE</h1>
        <button id="start-btn">SYSTEM STARTEN</button>
    </div>

    <div id="approach-overlay">
        <div id="creature-silhouette"></div>
    </div>

    <div id="jumpscare">
        <svg class="monster-svg" viewBox="0 0 200 200">
            <path d="M 20 60 Q 50 5 100 5 Q 150 5 180 60 Q 200 130 100 195 Q 0 130 20 60" fill="#080000" stroke="red" stroke-width="1"/>
            <circle cx="65" cy="70" r="18" fill="red" />
            <circle cx="135" cy="70" r="18" fill="red" />
            <path d="M 30 140 Q 100 230 170 140 L 160 150 Q 100 210 40 150 Z" fill="red" />
        </svg>
    </div>

    <div id="bad-msg" class="screen">ToO bAd :)</div>
    <div id="final-screen"></div>

    <canvas id="gameCanvas"></canvas>

    <audio id="snd-jscare" src="c_jscare.mp3" preload="auto"></audio>
    <audio id="snd-loop" src="ncb_loop.mp3" loop preload="auto"></audio>

    <script>
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        const startBtn = document.getElementById('start-btn');
        const lvlDisplay = document.getElementById('level-display');
        const taskDisplay = document.getElementById('task-desc');
        
        const sndJscare = document.getElementById('snd-jscare');
        const sndLoop = document.getElementById('snd-loop');

        let level = 1;
        let gameActive = false;
        let mouse = { x: -1000, y: -1000 };
        let target = { x: 0, y: 0, size: 15 };
        let timer;
        let timeLeft = 12;

        const levelConfigs = [
            { t: "Suche nach dem Signal...", time: 12 },
            { t: "Finde den Systemfehler...", time: 10 },
            { t: "Lokalisiere das Fragment...", time: 8 },
            { t: "Letzte Synchronisation...", time: 6 },
            { t: "STILLE BEWAHREN.", time: 0 }
        ];

        function initLevel() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
            // Zufällige Position des Ziels
            target.x = 100 + Math.random() * (canvas.width - 200);
            target.y = 100 + Math.random() * (canvas.height - 200);
            
            lvlDisplay.innerText = `DEPTH: LEVEL ${level}`;
            taskDisplay.innerText = levelConfigs[level-1].t;
            timeLeft = levelConfigs[level-1].time;
            
            if (level < 5) startTimer();
        }

        function startTimer() {
            clearInterval(timer);
            timer = setInterval(() => {
                timeLeft--;
                if (timeLeft <= 0) failGame();
            }, 1000);
        }

        function failGame() {
            clearInterval(timer);
            gameActive = false;
            const overlay = document.getElementById('approach-overlay');
            const silhouette = document.getElementById('creature-silhouette');
            overlay.style.display = 'flex';
            silhouette.classList.add('run-at-player');

            setTimeout(() => {
                triggerJumpscare();
            }, 1200);
        }

        startBtn.addEventListener('click', () => {
            document.getElementById('start-screen').style.display = 'none';
            gameActive = true;
            initLevel();
            draw();
        });

        // Steuerung
        const updateMouse = (e) => {
            mouse.x = e.clientX || e.touches[0].clientX;
            mouse.y = e.clientY || e.touches[0].clientY;
        };
        window.addEventListener('mousemove', updateMouse);
        window.addEventListener('touchmove', updateMouse);

        // Klick-Erkennung
        const checkTarget = () => {
            if (!gameActive || level >= 5) return;
            const dist = Math.hypot(mouse.x - target.x, mouse.y - target.y);
            // Radius für Klick ist 60 Pixel (sehr großzügig)
            if (dist < 60) {
                if (level < 4) {
                    level++;
                    initLevel();
                } else {
                    level = 5;
                    startLevel5();
                }
            }
        };
        window.addEventListener('mousedown', checkTarget);
        window.addEventListener('touchstart', checkTarget);

        function draw() {
            if (!gameActive) return;
            ctx.fillStyle = '#000';
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            // Lichtkegel zeichnen
            ctx.save();
            ctx.beginPath();
            ctx.arc(mouse.x, mouse.y, 140, 0, Math.PI * 2);
            ctx.clip();

            // Das Ziel (Fragment)
            const pulse = 0.5 + Math.sin(Date.now() / 200) * 0.5;
            ctx.fillStyle = `rgba(255, 255, 255, ${pulse * 0.3})`;
            ctx.beginPath();
            ctx.arc(target.x, target.y, target.size, 0, Math.PI * 2);
            ctx.fill();
            
            ctx.restore();
            requestAnimationFrame(draw);
        }

        async function startLevel5() {
            clearInterval(timer);
            gameActive = false;
            lvlDisplay.innerText = "DEPTH: LEVEL 5";
            taskDisplay.innerText = "AUTHENTIFIZIERUNG LÄUFT...";

            setTimeout(async () => {
                try {
                    const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
                    document.getElementById('volume-container').style.display = 'block';
                    taskDisplay.innerHTML = "<span style='color:red'>ER HÖRT DICH. KEIN LAUT!</span>";

                    const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
                    const analyser = audioCtx.createAnalyser();
                    const source = audioCtx.createMediaStreamSource(stream);
                    source.connect(analyser);
                    analyser.fftSize = 256;
                    const data = new Uint8Array(analyser.frequencyBinCount);

                    function monitor() {
                        analyser.getByteFrequencyData(data);
                        let avg = data.reduce((a, b) => a + b) / data.length;
                        document.getElementById('volume-bar').style.width = Math.min(avg * 2, 100) + "%";

                        if (avg > 48) { // Lautstärke-Limit erreicht
                            stream.getTracks().forEach(t => t.stop());
                            triggerJumpscare();
                        } else {
                            requestAnimationFrame(monitor);
                        }
                    }
                    monitor();
                } catch (err) {
                    // Mikrofon verweigert
                    document.getElementById('bad-msg').style.display = 'flex';
                    setTimeout(() => triggerJumpscare(), 1000);
                }
            }, 2000);
        }

        function triggerJumpscare() {
            document.getElementById('approach-overlay').style.display = 'none';
            document.getElementById('bad-msg').style.display = 'none';
            document.getElementById('jumpscare').style.display = 'flex';
            sndJscare.play().catch(() => {});
            if (navigator.vibrate) navigator.vibrate([1000, 500, 1000]);

            setTimeout(() => {
                document.getElementById('jumpscare').style.display = 'none';
                showFinal();
            }, 1500);
        }

        function showFinal() {
            const final = document.getElementById('final-screen');
            final.style.display = 'block';
            sndLoop.play().catch(() => {});
            let txt = "";
            for (let i = 0; i < 4000; i++) txt += "NEVER COME BACK ";
            final.innerText = txt;
        }
    </script>
</body>
</html>

<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Level 5: The End</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            background-color: #000;
            color: #fff;
            font-family: 'Courier New', Courier, monospace;
            overflow: hidden;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            user-select: none;
        }

        #game-container {
            text-align: center;
            position: relative;
            width: 100%;
            height: 100%;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
        }

        #message {
            font-size: 2rem;
            color: darkred;
            text-shadow: 2px 2px 5px #000;
            display: none;
            z-index: 10;
        }

        #start-btn {
            padding: 15px 30px;
            font-size: 1.5rem;
            background: transparent;
            color: red;
            border: 2px solid red;
            cursor: pointer;
            font-family: inherit;
            transition: 0.3s;
        }

        #start-btn:hover {
            background: red;
            color: black;
        }

        #jumpscare-container {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            display: none; /* Versteckt bis zum Jumpscare */
            background-color: black;
            z-index: 100;
        }

        #jumpscare-img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            animation: shake 0.1s infinite;
        }

        @keyframes shake {
            0% { transform: translate(2px, 1px) rotate(0deg); }
            10% { transform: translate(-1px, -2px) rotate(-1deg); }
            20% { transform: translate(-3px, 0px) rotate(1deg); }
            30% { transform: translate(0px, 2px) rotate(0deg); }
            40% { transform: translate(1px, -1px) rotate(1deg); }
            50% { transform: translate(-1px, 2px) rotate(-1deg); }
            60% { transform: translate(-3px, 1px) rotate(0deg); }
            70% { transform: translate(2px, 1px) rotate(-1deg); }
            80% { transform: translate(-1px, -1px) rotate(1deg); }
            90% { transform: translate(2px, 2px) rotate(0deg); }
            100% { transform: translate(1px, -2px) rotate(-1deg); }
        }

        #never-come-back {
            display: none;
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: black;
            color: red;
            font-size: 1.5rem;
            text-align: center;
            line-height: 1.5;
            z-index: 200;
            overflow: hidden;
            word-wrap: break-word;
        }
    </style>
</head>
<body>

    <div id="game-container">
        <h1 id="title">Level: 5 The End</h1>
        <button id="start-btn">Level betreten</button>
        <div id="message"></div>
    </div>

    <div id="jumpscare-container">
        <img id="jumpscare-img" src="https://upload.wikimedia.org/wikipedia/commons/thumb/a/a2/Schrei_der_Angst.jpg/800px-Schrei_der_Angst.jpg" alt="Scary Face">
    </div>

    <div id="never-come-back"></div>

    <audio id="jumpscare-sound" src="https://actions.google.com/sounds/v1/horror/monster_zombie_growl.ogg"></audio>

    <script>
        const startBtn = document.getElementById('start-btn');
        const title = document.getElementById('title');
        const message = document.getElementById('message');
        const jumpscareContainer = document.getElementById('jumpscare-container');
        const jumpscareSound = document.getElementById('jumpscare-sound');
        const neverComeBackScreen = document.getElementById('never-come-back');
        let audioContext;

        startBtn.addEventListener('click', () => {
            startBtn.style.display = 'none';
            title.style.display = 'none';
            requestMicAccess();
        });

        function requestMicAccess() {
            navigator.mediaDevices.getUserMedia({ audio: true })
                .then(function(stream) {
                    // MIKROFON AKZEPTIERT
                    message.innerText = "pssst... sei leise.";
                    message.style.display = "block";
                    monitorAudio(stream);
                })
                .catch(function(err) {
                    // MIKROFON ABGELEHNT
                    message.innerText = "ToO bAd :)";
                    message.style.display = "block";
                    setTimeout(() => {
                        triggerJumpscare(false);
                    }, 1000);
                });
        }

        function monitorAudio(stream) {
            audioContext = new (window.AudioContext || window.webkitAudioContext)();
            const analyser = audioContext.createAnalyser();
            const microphone = audioContext.createMediaStreamSource(stream);
            microphone.connect(analyser);
            analyser.fftSize = 256;
            const bufferLength = analyser.frequencyBinCount;
            const dataArray = new Uint8Array(bufferLength);

            function checkVolume() {
                analyser.getByteFrequencyData(dataArray);
                let sum = 0;
                for(let i = 0; i < bufferLength; i++) {
                    sum += dataArray[i];
                }
                let averageVolume = sum / bufferLength;

                // Schwellenwert für ca. "50dB" - Web Audio gibt Rohwerte (0-255) aus.
                // Ein Wert von 40-50 entspricht in etwa leisem Sprechen/Atmen ins Mikrofon.
                if (averageVolume > 45) { 
                    triggerJumpscare(true);
                    return; // Stoppt die Schleife
                }

                requestAnimationFrame(checkVolume);
            }
            checkVolume();
        }

        function triggerJumpscare(showNeverComeBack) {
            jumpscareContainer.style.display = "block";
            jumpscareSound.play();

            if (showNeverComeBack) {
                setTimeout(() => {
                    jumpscareContainer.style.display = "none";
                    showEndScreen();
                }, 1000); // 1 Sekunde Jumpscare, dann Text
            }
        }

        function showEndScreen() {
            neverComeBackScreen.style.display = "block";
            let text = "";
            // Generiert hunderte "NEVER COME BACK"
            for(let i = 0; i < 500; i++) {
                text += "NEVER COME BACK ";
            }
            neverComeBackScreen.innerText = text;
        }
    </script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VOID_FAILURE // DARKFOX CO. 2026</title>
    <style>
        :root { 
            --fnaf-green: #24ff15; 
            --fnaf-red: #ff0000;
            --ui-border: rgba(36, 255, 21, 0.4);
            --glow: 0 0 15px rgba(36, 255, 21, 0.5);
        }
        
        body, html { 
            margin: 0; padding: 0; width: 100%; height: 100%; 
            background: #000; color: var(--fnaf-green); 
            font-family: 'Courier New', monospace; overflow: hidden; 
        }

        /* Ambient Scene with Flickering Light */
        .office { 
            width: 110%; height: 110%; top: -5%; left: -5%; position: fixed;
            background: radial-gradient(circle at 50% 50%, #151515 0%, #050505 75%, #000 100%); 
            display: flex; justify-content: center; align-items: center; 
            transition: transform 0.1s ease-out;
            animation: lightFlicker 8s infinite;
        }

        @keyframes lightFlicker {
            0%, 100% { opacity: 1; }
            95% { opacity: 1; }
            96% { opacity: 0.7; }
            97% { opacity: 1; }
            98% { opacity: 0.4; }
            99% { opacity: 1; }
        }

        .scanlines {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: linear-gradient(rgba(18, 16, 16, 0) 50%, rgba(0, 0, 0, 0.2) 50%), 
                        linear-gradient(90deg, rgba(255, 0, 0, 0.03), rgba(0, 255, 0, 0.01), rgba(0, 0, 255, 0.03));
            background-size: 100% 3px, 2px 100%; pointer-events: none; z-index: 1000;
        }

        /* Monitor Layout */
        .monitor { 
            width: 580px; height: 440px; background: #111; 
            border-radius: 30px; padding: 18px; position: relative; 
            box-shadow: 0 50px 100px rgba(0,0,0,0.9), inset 0 0 30px #000; 
            border: 5px solid #222; transform-style: preserve-3d;
        }

        .screen { 
            width: 100%; height: 100%; background: #020402; 
            position: relative; overflow: hidden; border: 12px solid #0a0a0a;
            border-radius: 15px;
        }

        #crt-overlay {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background: url('crtb.png'); background-size: cover;
            opacity: 0; z-index: 100; pointer-events: none; mix-blend-mode: overlay;
        }

        /* Views */
        .view { width: 100%; height: 100%; display: none; flex-direction: column; align-items: center; justify-content: center; text-align: center; }
        .active { display: flex; }

        .btn { 
            background: transparent; border: 1px solid var(--fnaf-green); 
            color: var(--fnaf-green); padding: 10px 25px; margin: 8px; 
            cursor: pointer; font-family: inherit; font-size: 13px; 
            text-transform: uppercase; letter-spacing: 3px; transition: 0.2s;
        }
        .btn:hover { background: var(--fnaf-green); color: #000; box-shadow: var(--glow); }

        /* Stabilize Task Fix */
        #freq-container { 
            width: 280px; height: 60px; border: 2px solid var(--ui-border); 
            position: relative; margin-top: 20px; background: #050505;
            cursor: pointer;
        }
        .target-zone {
            position: absolute; width: 60px; height: 100%; 
            background: rgba(36, 255, 21, 0.3); left: 110px; /* Mittig platziert */
            border-left: 2px solid var(--fnaf-green); border-right: 2px solid var(--fnaf-green);
        }
        #stab-bar {
            width: 6px; height: 100%; background: white; 
            position: absolute; left: 0; box-shadow: 0 0 10px white;
        }

        /* Jumpscare */
        #jumpscare-layer {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #000;
            z-index: 9999; display: none; align-items: center; justify-content: center;
        }
        .blood { position: absolute; width: 100%; height: 100%; background: rgba(255, 0, 0, 0.2); pointer-events: none; }

        /* Story Ending */
        #ending-screen { 
            position: fixed; top:0; left:0; width:100%; height:100%; 
            background: #000; z-index: 9000; display: none; 
            flex-direction: column; align-items: center; justify-content: center;
        }
        #story-scroll {
            height: 350px; width: 85%; overflow: hidden; position: relative; margin: 20px 0;
            mask-image: linear-gradient(transparent, white 15%, white 85%, transparent);
        }
        #story-content {
            position: absolute; width: 100%; color: #aaa; font-size: 15px;
            line-height: 2.2; top: 100%; animation: scrollText 45s linear infinite;
            white-space: pre-wrap;
        }

        #scp-void { position: absolute; width: 450px; height: 450px; top: 50%; left: 50%; transform: translate(-50%, -50%) scale(0); opacity: 0; z-index: 200; pointer-events: none; }
        #knife { position: absolute; width: 100px; top: 25%; left: 58%; transform: rotate(35deg); display: none; }
        #dialog-box { position: fixed; bottom: 30px; left: 50%; transform: translateX(-50%); width: 70%; background: #000; border: 2px solid #fff; padding: 20px; color: white; display: none; z-index: 2000; cursor: pointer; }

        @keyframes scrollText { from { top: 100%; } to { top: -250%; } }
        @keyframes masterShake { 0% { transform: translate(10px, 10px); } 20% { transform: translate(-10px, -5px); } 40% { transform: translate(15px, 10px); } 100% { transform: translate(0, 0); } }
    </style>
</head>
<body id="main-body">

<audio id="jumpscare-audio" src="c_jscare.mp3"></audio>
<div class="scanlines"></div>

<div class="office" id="parallax-bg">
    <div id="scp-void">
        <svg viewBox="0 0 200 200"><path d="M100 0 L140 70 L200 100 L140 130 L100 200 L60 130 L0 100 L60 70 Z" fill="white" /><circle cx="75" cy="100" r="15" fill="red" /><circle cx="125" cy="100" r="15" fill="red" /></svg>
        <img id="knife" src="data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 50 150'><path d='M25 0 L45 80 L30 150 L20 150 L5 80 Z' fill='silver' stroke='black'/></svg>">
    </div>

    <div class="monitor" id="monitor">
        <div class="screen">
            <div id="crt-overlay"></div>
            
            <div id="v-start" class="view active">
                <h1 style="letter-spacing: 10px; text-shadow: var(--glow);">VOID_FAILURE</h1>
                <button class="btn" onclick="startGame()">INITIALIZE REPAIR</button>
                <button class="btn" onclick="showView('settings')">SETTINGS</button>
                <button class="btn" onclick="showView('credits')">CREDITS</button>
                <div style="font-size: 8px; margin-top: 25px; color:#222;">© DARKFOX CO. 2026</div>
            </div>

            <div id="v-settings" class="view">
                <h3>CONFIGURATION</h3>
                <select id="diff-select" class="btn" style="background: #000;">
                    <option value="1">EASY</option>
                    <option value="2" selected>NORMAL</option>
                    <option value="3">HARDCORE</option>
                </select>
                <button class="btn" onclick="showView('start')">BACK</button>
            </div>

            <div id="v-credits" class="view">
                <h3>ACCESS LOGS</h3>
                <p>DIRECTOR: DARKFOX</p>
                <button class="btn" onclick="showView('start')">BACK</button>
            </div>

            <div id="v-game" class="view">
                <div id="timer-bar" style="width:100%; height:5px; background:var(--fnaf-green); position:absolute; top:0;"></div>
                <div id="game-zone"></div>
            </div>

            <div id="v-boss" class="view">
                <h2 style="color: red;">FATAL ERROR...</h2>
            </div>
        </div>
    </div>
</div>

<div id="jumpscare-layer">
    <div class="blood"></div>
    <svg style="width:130%; height:130%; fill:red; filter: blur(1px);" viewBox="0 0 200 200">
        <circle cx="60" cy="70" r="35" /><circle cx="140" cy="70" r="35" />
        <path d="M 20 150 Q 100 280 180 150" stroke="white" stroke-width="15" fill="none" />
    </svg>
</div>

<div id="dialog-box" onclick="advanceDialog()">
    <div style="color:red; font-weight:bold; font-size: 12px;">[!] UNKNOWN_ENTITY</div>
    <div id="dialog-text" style="margin-top:8px;">...</div>
</div>

<div id="ending-screen">
    <h1 style="color:white; letter-spacing: 12px;">THE END</h1>
    <div id="story-scroll">
        <div id="story-content">Loading...</div>
    </div>
    <button class="btn" onclick="location.reload()">REBOOT</button>
</div>

<script>
    let lvl = 1, timer, isTrans = false, dialogStep = 0, moveInterval;
    const sound = document.getElementById('jumpscare-audio');

    document.addEventListener('mousemove', (e) => {
        const x = (window.innerWidth / 2 - e.pageX) / 45;
        const y = (window.innerHeight / 2 - e.pageY) / 45;
        document.getElementById('parallax-bg').style.transform = `translate(${x}px, ${y}px)`;
    });

    async function loadStory() {
        try {
            const r = await fetch('story-void.txt');
            const txt = r.ok ? await r.text() : "The legend file 'story-void.txt' was not found.";
            document.getElementById('story-content').innerText = txt;
        } catch(e) { document.getElementById('story-content').innerText = "File Error."; }
    }

    function showView(id) {
        document.querySelectorAll('.view').forEach(v => v.classList.remove('active'));
        document.getElementById('v-' + id).classList.add('active');
    }

    function startGame() {
        loadStory();
        sound.play().then(() => { sound.pause(); sound.currentTime = 0; });
        lvl = 1; showView('game'); runLevel();
    }

    function runLevel() {
        isTrans = false;
        const zone = document.getElementById('game-zone');
        zone.innerHTML = '';
        const d = parseInt(document.getElementById('diff-select').value);
        
        let timeBase = (lvl === 3) ? 15 : 12; 
        startTimer(timeBase - (lvl * 2) - (d * 1.5));

        if(lvl === 1) {
            zone.innerHTML = '<p>REBOOT NODES</p>';
            for(let i=0; i<3; i++) {
                let div = document.createElement('div');
                div.style = "width:50px; height:50px; border:1px solid var(--fnaf-green); margin:15px; cursor:pointer; display:inline-block;";
                div.onclick = function() { if(isTrans) return; this.style.background="red"; this.classList.add('ok'); if(document.querySelectorAll('.ok').length==3) next(); };
                zone.appendChild(div);
            }
        } else if(lvl === 2) {
            zone.innerHTML = '<p>STABILIZE SIGNAL</p><div id="freq-container"><div class="target-zone"></div><div id="stab-bar"></div></div><p style="font-size:10px; margin-top:10px;">CLICK TO STOP IN GREEN AREA</p>';
            let p = 0, dr = 1;
            moveInterval = setInterval(() => {
                p += (2.4 + d) * dr; if(p >= 274 || p <= 0) dr *= -1;
                document.getElementById('stab-bar').style.left = p + "px";
            }, 10);
            document.getElementById('freq-container').onclick = () => {
                clearInterval(moveInterval);
                // Hit-Detection: Zone ist bei 110px bis 170px
                if(p >= 110 && p <= 170) { next(); } else { sc(); }
            };
        } else if(lvl === 3) {
            zone.innerHTML = '<p>FREQ_MATCH</p><input type="range" id="knob" min="0" max="100" value="0"><p id="f-val" style="margin-top:15px; font-weight:bold;">SEARCHING...</p>';
            let target = Math.floor(Math.random() * 70) + 15;
            const k = document.getElementById('knob');
            k.oninput = () => {
                document.getElementById('f-val').innerText = `TARGET: ${target}Hz | CURRENT: ${k.value}Hz`;
                if(Math.abs(k.value - target) <= (5 - d)) next();
            };
        } else finale();
    }

    function startTimer(s) {
        let w = 100; clearInterval(timer);
        timer = setInterval(() => {
            w -= (100 / (s * 10));
            document.getElementById('timer-bar').style.width = w + "%";
            if(w <= 0) { clearInterval(moveInterval); sc(); }
        }, 100);
    }

    function next() { isTrans = true; clearInterval(timer); lvl++; setTimeout(runLevel, 600); }

    function sc() {
        isTrans = true; clearInterval(timer);
        sound.play();
        document.getElementById('main-body').style.animation = "masterShake 0.1s infinite";
        document.getElementById('jumpscare-layer').style.display = 'flex';
        setTimeout(() => location.reload(), 1800);
    }

    function finale() {
        clearInterval(timer); showView('boss');
        setTimeout(() => {
            document.getElementById('crt-overlay').style.opacity = "1";
            document.getElementById('monitor').style.animation = "masterShake 0.05s infinite";
            setTimeout(() => {
                document.getElementById('monitor').style.display = "none";
                const v = document.getElementById('scp-void');
                v.style.opacity = "1"; v.style.transform = "translate(-50%, -50%) scale(1.5)"; v.style.pointerEvents = "auto";
                v.onclick = () => {
                    document.getElementById('knife').style.display = "block";
                    v.onclick = null;
                    setTimeout(() => { document.getElementById('dialog-box').style.display = "block"; advanceDialog(); }, 600);
                };
            }, 2500);
        }, 1500);
    }

    function advanceDialog() {
        dialogStep++;
        const t = document.getElementById('dialog-text');
        if(dialogStep === 1) t.innerText = "Why... do you always attack first?";
        else if(dialogStep === 2) t.innerText = "I only wanted to be more than a shadow.";
        else if(dialogStep === 3) t.innerText = "The monster you see is just the fear in your own heart.";
        else {
            document.getElementById('dialog-box').style.display = "none";
            const v = document.getElementById('scp-void');
            v.style.transition = "all 4s";
            v.style.filter = "invert(1) blur(30px)";
            v.style.transform = "translate(-50%, -50%) scale(0)";
            setTimeout(() => { document.getElementById('ending-screen').style.display = "flex"; }, 4000);
        }
    }
</script>
</body>
</html>

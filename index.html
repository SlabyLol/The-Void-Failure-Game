<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>The Void Failure Game - Ultimate</title>
    <style>
        :root {
            --fnaf-green: #24ff15;
            --fnaf-red: #ff0000;
            --fnaf-blue: #00ffff;
            --monitor-glow: rgba(36, 255, 21, 0.2);
            --desk-color: #1a1a1a;
        }

        /* Colorblind Modes */
        .cb-protanopia { --fnaf-red: #888; --fnaf-green: #fff100; }
        .cb-deuteranopia { --fnaf-red: #6d5a00; --fnaf-green: #ffd500; }
        .cb-tritanopia { --fnaf-red: #ff0050; --fnaf-green: #00f0ff; }

        body, html {
            margin: 0; padding: 0; width: 100%; height: 100%;
            background: #000; color: var(--fnaf-green);
            font-family: 'Courier New', monospace; overflow: hidden;
        }

        /* 3D Büro Atmosphäre */
        .office {
            width: 100%; height: 100%;
            background: radial-gradient(circle at center, #151515 0%, #000 80%);
            display: flex; justify-content: center; align-items: center;
            perspective: 1000px;
        }

        .desk {
            width: 600px; height: 400px;
            background: var(--desk-color);
            position: relative;
            transform: rotateX(10deg);
            border-top: 5px solid #111;
            display: flex; justify-content: center; align-items: center;
            box-shadow: 0 50px 100px rgba(0,0,0,0.9);
        }

        /* Der Röhrenmonitor */
        .monitor {
            width: 420px; height: 320px;
            background: #222;
            border-radius: 15px;
            padding: 15px;
            position: relative;
            box-shadow: 0 0 30px #000;
            transform: translateZ(20px);
        }

        .screen {
            width: 100%; height: 100%;
            background: #050805;
            position: relative;
            overflow: hidden;
            border-radius: 5px;
            border: 3px solid #111;
            box-shadow: inset 0 0 40px #000;
        }

        /* CRT Filter */
        .crt::before {
            content: " "; position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background: linear-gradient(rgba(18, 16, 16, 0) 50%, rgba(0, 0, 0, 0.1) 50%),
                        linear-gradient(90deg, rgba(255, 0, 0, 0.02), rgba(0, 255, 0, 0.01), rgba(0, 0, 255, 0.02));
            z-index: 10; pointer-events: none; background-size: 100% 3px, 3px 100%;
        }

        /* UI Overlays */
        #ui-layer {
            position: absolute; top: 10px; width: 90%; left: 5%;
            display: flex; justify-content: space-between; font-size: 10px; z-index: 20;
        }
        .battery-bar { width: 50px; height: 8px; border: 1px solid var(--fnaf-green); }
        #timer-fill { width: 100%; height: 100%; background: var(--fnaf-green); transition: width 0.1s linear; }

        /* Menüs */
        .menu-view {
            width: 100%; height: 100%;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            text-align: center;
        }

        .settings-view { display: none; padding: 20px; box-sizing: border-box; }

        .btn {
            background: transparent; border: 1px solid var(--fnaf-green);
            color: var(--fnaf-green); padding: 8px 15px; margin: 5px;
            cursor: pointer; font-family: inherit; font-size: 0.8rem;
        }
        .btn:hover { background: var(--fnaf-green); color: #000; }

        /* Tasks & Game Elements */
        .task-panel { display: none; width: 100%; height: 100%; flex-direction: column; align-items: center; justify-content: center; }
        
        #stab-disk {
            width: 150px; height: 150px; border: 5px solid #111; border-radius: 50%;
            position: relative; background: #010101; margin: 20px; cursor: pointer;
        }
        #stab-target { width: 40px; height: 20px; background: rgba(255,0,0,0.4); position: absolute; top: -3px; left: 55px; border: 1px solid red; border-radius: 3px; }
        #stab-needle { width: 4px; height: 75px; background: #fff; position: absolute; bottom: 50%; left: calc(50% - 2px); transform-origin: bottom center; }

        .wire { width: 40px; height: 40px; border: 1px solid #333; margin: 10px; cursor: pointer; }
        .wire.active { background: var(--fnaf-red); box-shadow: 0 0 15px var(--fnaf-red); }

        #boss-creature { width: 10px; height: 10px; background: #fff; border-radius: 50%; filter: blur(10px); position: absolute; opacity: 0; top: 40%; left: 50%; }
        #knife-img { width: 70px; position: absolute; bottom: 10px; filter: invert(1); transition: transform 0.1s; pointer-events: none; }

        /* Scares */
        #jumpscare-layer {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: #000; display: none; z-index: 10000; align-items: center; justify-content: center;
        }
        .monster { width: 120%; height: 120%; fill: #200; animation: jitter 0.04s infinite; }
        #fail-wall { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #000; color: #400; display: none; z-index: 11000; word-break: break-all; overflow: hidden; font-size: 1rem; line-height: 0.7; }

        @keyframes jitter { 0%{transform: translate(5px,5px);} 50%{transform: translate(-5px,-5px);} }
        
        label { font-size: 0.7rem; margin-top: 10px; }
        input[type="range"] { accent-color: var(--fnaf-green); width: 150px; }
    </style>
</head>
<body id="game-body">

    <div class="office">
        <div class="desk">
            <div class="monitor">
                <div class="screen crt">
                    
                    <div id="ui-layer" style="display:none;">
                        <div id="depth-txt">D-01</div>
                        <div class="battery-bar"><div id="timer-fill"></div></div>
                    </div>

                    <div id="content">
                        <div id="start-view" class="menu-view">
                            <h2 style="letter-spacing: 5px;">VOID_FAILURE</h2>
                            <button class="btn" onclick="showView('game')">START GAME</button>
                            <button class="btn" onclick="showView('settings')">SETTINGS</button>
                        </div>

                        <div id="settings-view" class="menu-view settings-view">
                            <h3>CONFIGURATION</h3>
                            <label>VOLUME</label>
                            <input type="range" id="vol-slider" min="0" max="100" value="50" onchange="updateSettings()">
                            
                            <label>COLORBLIND</label>
                            <select id="cb-mode" class="btn" onchange="updateSettings()">
                                <option value="none">OFF</option>
                                <option value="cb-protanopia">PROTANOPIA</option>
                                <option value="cb-deuteranopia">DEUTERANOPIA</option>
                                <option value="cb-tritanopia">TRITANOPIA</option>
                            </select>
                            <button class="btn" onclick="showView('start')" style="margin-top: 20px;">BACK</button>
                        </div>

                        <div id="game-view" class="task-panel"></div>

                        <div id="mic-view" class="task-panel">
                            <div style="font-size: 0.8rem;">UPLOADING... <span style="color:red">SHHH!</span></div>
                            <div class="battery-bar" style="width: 150px; margin-top: 15px;">
                                <div id="upload-fill" style="width: 0%; height: 100%; background: var(--fnaf-green);"></div>
                            </div>
                        </div>

                        <div id="boss-view" class="task-panel">
                            <div id="boss-creature"></div>
                            <div id="knife-img">
                                <svg viewBox="0 0 50 150"><path d="M25 0 L45 80 L30 150 L20 150 L5 80 Z" fill="#fff" stroke="#fff"/></svg>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <div id="jumpscare-layer">
        <svg class="monster" viewBox="0 0 200 200">
            <circle cx="65" cy="80" r="20" fill="red"/><circle cx="135" cy="80" r="20" fill="red"/>
            <path d="M 40 150 Q 100 240 160 150" stroke="red" fill="none" stroke-width="12"/>
        </svg>
    </div>

    <div id="fail-wall"></div>

    <audio id="snd-jscare" src="c_jscare.mp3"></audio>
    <audio id="snd-loop" src="ncb_loop.mp3" loop></audio>

    <script>
        let level = 1;
        let timerInt, bossInt;
        let volume = 0.5;
        const sndJscare = document.getElementById('snd-jscare');
        const sndLoop = document.getElementById('snd-loop');

        function updateSettings() {
            volume = document.getElementById('vol-slider').value / 100;
            sndJscare.volume = volume;
            sndLoop.volume = volume * 0.7;

            const cbMode = document.getElementById('cb-mode').value;
            document.getElementById('game-body').className = cbMode !== 'none' ? cbMode : '';
        }

        function showView(view) {
            document.querySelectorAll('.menu-view, .task-panel').forEach(v => v.style.display = 'none');
            document.getElementById('ui-layer').style.display = 'none';

            if(view === 'start') document.getElementById('start-view').style.display = 'flex';
            if(view === 'settings') document.getElementById('settings-view').style.display = 'flex';
            if(view === 'game') {
                document.getElementById('ui-layer').style.display = 'flex';
                startGame();
            }
        }

        function startGame() {
            level = 1;
            loadLevel();
        }

        function loadLevel() {
            const panel = document.getElementById('game-view');
            panel.style.display = 'flex';
            panel.innerHTML = '';
            document.getElementById('depth-txt').innerText = "D-0" + level;

            if(level === 1) { // Wires
                for(let i=0; i<3; i++) {
                    let w = document.createElement('div'); w.className = 'wire';
                    w.onclick = function() { this.classList.add('active'); if(document.querySelectorAll('.wire.active').length === 3) nextLevel(); };
                    panel.appendChild(w);
                }
            } else if(level === 2) { // Sequence
                let goal = 1;
                [1,2,3].sort(()=>Math.random()-0.5).forEach(n => {
                    let b = document.createElement('button'); b.className = 'btn'; b.innerText = n;
                    b.onclick = function() { if(parseInt(this.innerText) === goal) { this.style.opacity = 0.2; goal++; if(goal > 3) nextLevel(); } else triggerFail(); };
                    panel.appendChild(b);
                });
            } else if(level === 3) { // Stabilizer
                let disk = document.createElement('div'); disk.id = 'stab-disk';
                let target = document.createElement('div'); target.id = 'stab-target';
                let needle = document.createElement('div'); needle.id = 'stab-needle';
                let deg = 0;
                let rot = setInterval(() => { deg = (deg + 8) % 360; needle.style.transform = `rotate(${deg}deg)`; }, 20);
                disk.onclick = () => { if(deg > 340 || deg < 20) { clearInterval(rot); nextLevel(); } else triggerFail(); };
                disk.appendChild(target); disk.appendChild(needle); panel.appendChild(disk);
            } else if(level === 4) { // Click
                let taps = 0;
                let b = document.createElement('button'); b.className = 'btn'; b.innerText = "CLICK 10x";
                b.onclick = () => { taps++; b.innerText = (10-taps) + "x"; if(taps >= 10) nextLevel(); };
                panel.appendChild(b);
            } else {
                panel.style.display = 'none';
                runLevel5();
                return;
            }
            startTimer(12 - level);
        }

        function startTimer(s) {
            let left = 100;
            clearInterval(timerInt);
            timerInt = setInterval(() => {
                left -= (0.1 / s) * 100;
                document.getElementById('timer-fill').style.width = left + "%";
                if(left <= 0) triggerFail();
            }, 100);
        }

        function nextLevel() { level++; loadLevel(); }

        async function runLevel5() {
            document.getElementById('mic-view').style.display = 'flex';
            document.getElementById('ui-layer').style.display = 'none';
            let prog = 0;
            try {
                const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
                const audioCtx = new AudioContext();
                const analyser = audioCtx.createAnalyser();
                const source = audioCtx.createMediaStreamSource(stream);
                source.connect(analyser);
                const data = new Uint8Array(analyser.frequencyBinCount);
                const loop = setInterval(() => {
                    prog += 0.5;
                    document.getElementById('upload-fill').style.width = prog + "%";
                    analyser.getByteFrequencyData(data);
                    let vol = data.reduce((a,b)=>a+b)/data.length;
                    if(vol > 50) { clearInterval(loop); stream.getTracks().forEach(t=>t.stop()); triggerFail(); }
                    if(prog >= 100) { clearInterval(loop); stream.getTracks().forEach(t=>t.stop()); runBoss(); }
                }, 50);
            } catch(e) { triggerFail(); }
        }

        function runBoss() {
            document.getElementById('mic-view').style.display = 'none';
            document.getElementById('boss-view').style.display = 'flex';
            let sz = 15;
            const cre = document.getElementById('boss-creature');
            bossInt = setInterval(() => {
                sz += 4; cre.style.width = sz + "px"; cre.style.height = sz + "px"; cre.style.opacity = sz/150;
                if(sz > 350) triggerFail();
            }, 30);
            document.getElementById('boss-view').onclick = () => {
                clearInterval(bossInt);
                document.getElementById('knife-img').style.transform = "translateY(-100px) rotate(-15deg)";
                if(sz > 80 && sz < 150) {
                    setTimeout(() => { alert("SYSTEM SECURED!"); location.reload(); }, 1000);
                } else triggerFail();
            };
        }

        function triggerFail() {
            clearInterval(timerInt); clearInterval(bossInt);
            document.getElementById('jumpscare-layer').style.display = 'flex';
            sndJscare.play();
            setTimeout(() => {
                document.getElementById('jumpscare-layer').style.display = 'none';
                const wall = document.getElementById('fail-wall');
                wall.style.display = 'block'; sndLoop.play();
                wall.innerText = "NEVER COME BACK ".repeat(2000);
            }, 1500);
        }

        updateSettings(); // Initialise
    </script>
</body>
</html>

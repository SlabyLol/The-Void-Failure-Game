<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>THE VOID FAILURE // BALANCED_FINAL</title>
    <style>
        :root { --red: #ff0000; --green: #00ff41; --dim: #0a0a0a; }
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; background: #000; font-family: 'Courier New', monospace; overflow: hidden; color: #fff; }

        /* CRT & Atmosphere */
        .crt { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: linear-gradient(rgba(18, 16, 16, 0) 50%, rgba(0, 0, 0, 0.2) 50%); background-size: 100% 4px; pointer-events: none; z-index: 1000; opacity: 0.3; }
        .glow { position: fixed; width: 100%; height: 100%; background: radial-gradient(circle, transparent 60%, #000 150%); pointer-events: none; z-index: 999; }

        /* Hardware Framework */
        .wrapper { position: fixed; width: 100%; height: 100%; display: flex; justify-content: center; align-items: center; background: radial-gradient(circle at center, #111 0%, #000 100%); }
        .monitor { width: 850px; height: 620px; background: #0c0c0c; border: 15px solid #1a1a1a; border-radius: 30px; position: relative; box-shadow: 0 0 100px #000; transition: transform 0.1s; }
        .screen { width: calc(100% - 40px); height: calc(100% - 40px); margin: 20px; background: #010101; position: relative; overflow: hidden; border: 4px solid #080808; display: flex; flex-direction: column; }

        /* Views */
        .view { width: 100%; height: 100%; display: none; flex-direction: column; align-items: center; justify-content: center; position: absolute; padding: 40px; box-sizing: border-box; text-align: center; }
        .active { display: flex; }

        /* UI Styling */
        .glitch { font-size: 50px; letter-spacing: 10px; text-shadow: 2px 0 red, -2px 0 blue; animation: glitch-anim 0.2s infinite; }
        @keyframes glitch-anim { 0% { transform: translate(1px); } 50% { clip-path: inset(5% 0 15% 0); } 100% { transform: translate(-1px); } }
        
        .story-text { font-size: 18px; color: var(--green); min-height: 100px; margin: 20px 0; line-height: 1.6; font-style: italic; }
        .btn { background: transparent; border: 1px solid #444; color: #888; padding: 15px 30px; margin: 10px; cursor: pointer; font-family: inherit; transition: 0.3s; text-transform: uppercase; letter-spacing: 2px; }
        .btn:hover { color: #fff; border-color: var(--red); box-shadow: 0 0 15px var(--red); background: rgba(255,0,0,0.05); }

        /* Gameplay */
        #timer-box { position: absolute; top: 0; left: 0; width: 100%; height: 8px; background: #111; }
        #timer-bar { height: 100%; width: 100%; background: var(--red); box-shadow: 0 0 10px var(--red); }
        .node { width: 60px; height: 60px; border: 1px solid #333; margin: 15px; cursor: pointer; display: inline-block; background: #050505; }
        .gauge { width: 350px; height: 50px; border: 2px solid #222; position: relative; background: #000; margin-top: 20px; }
        .safe-zone { position: absolute; width: 60px; height: 100%; background: rgba(255,0,0,0.2); left: 145px; border-inline: 1px solid var(--red); }
        #needle { width: 4px; height: 100%; background: #fff; position: absolute; box-shadow: 0 0 10px #fff; }

        /* Boss */
        #boss-layer { position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: 2000; display: none; flex-direction: column; align-items: center; justify-content: center; background: #000; cursor: crosshair; }
        .boss-entity { width: 650px; height: 650px; fill: #fff; animation: pulse 0.08s infinite; filter: contrast(15); transition: transform 0.05s; }
        @keyframes pulse { 0% { transform: scale(1); } 50% { transform: scale(1.03); filter: blur(1px); } }
        #jumpscare { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #000; z-index: 9999; display: none; align-items: center; justify-content: center; }

        /* Ending shake */
        .shake { animation: shake-anim 0.1s linear; }
        @keyframes shake-anim { 0% { transform: translate(5px, 5px); } 50% { transform: translate(-5px, -5px); } 100% { transform: translate(0); } }
    </style>
</head>
<body>

<audio id="sfx" src="c_jscare.mp3" preload="auto"></audio>
<div class="crt"></div>
<div class="glow"></div>

<div class="wrapper">
    <div class="monitor" id="mon-frame">
        <div class="screen">
            
            <div id="v-menu" class="view active">
                <h1 class="glitch">VOID FAILURE</h1>
                <p style="color: #444; font-size: 11px;">STORY_MODE: ACTIVE // story-void.txt</p>
                <button class="btn" onclick="startStory()">Start Narrative</button>
                <button class="btn" onclick="showView('v-settings')">Settings</button>
                <button class="btn" onclick="showView('v-credits')">Credits</button>
            </div>

            <div id="v-settings" class="view">
                <h2>SETTINGS</h2>
                <button class="btn" onclick="testAudio()">Test Jumpscare Audio</button>
                <button class="btn" onclick="showView('v-menu')">Back</button>
            </div>

            <div id="v-credits" class="view">
                <h2>CREDITS</h2>
                <p>Logic: DarkFox Co.<br>Audio/Story: DarkFox Co.</p>
                <button class="btn" onclick="showView('v-menu')">Back</button>
            </div>

            <div id="v-story" class="view">
                <div id="writer" class="story-text"></div>
                <button id="cont-btn" class="btn" style="display:none;" onclick="nextLevel()">Enter Void</button>
            </div>

            <div id="v-game" class="view">
                <div id="timer-box"><div id="timer-bar"></div></div>
                <div id="dialogue-box" style="font-size: 14px; color: #555; margin-bottom: 20px;"></div>
                <div id="game-canvas"></div>
            </div>

            <div id="v-breach" class="view">
                <h1 style="color:var(--red); font-size: 40px;">CRITICAL BREACH</h1>
                <p>THE BOUNDARY IS GONE.</p>
            </div>

            <div id="v-lesson" class="view">
                <h1 style="letter-spacing: 5px; color: var(--green);">THE LESSON</h1>
                <div id="lesson-text" style="color: #888; line-height: 1.8; max-width: 80%;"></div>
                <button class="btn" style="margin-top:20px;" onclick="location.reload()">Reboot Terminal</button>
            </div>

        </div>
    </div>
</div>

<div id="boss-layer">
    <div style="color: red; margin-bottom: 20px; font-weight: bold; letter-spacing: 5px;">PURGE THE SOURCE</div>
    <svg viewBox="0 0 200 200" class="boss-entity" id="boss-svg" onclick="damageBoss()">
        <path d="M100,10 C150,40 190,20 195,80 C200,140 150,170 160,200 C100,180 30,200 10,140 C-5,80 40,50 50,15 Z" fill="white"/>
        <circle cx="70" cy="80" r="14" fill="red" />
        <circle cx="130" cy="85" r="16" fill="red" />
    </svg>
    <div style="width: 400px; height: 10px; background: #111; border: 1px solid red; margin-top: 30px;">
        <div id="boss-hp" style="width: 100%; height: 100%; background: red; box-shadow: 0 0 15px red;"></div>
    </div>
</div>

<div id="jumpscare">
    <svg width="150%" height="150%" viewBox="0 0 200 200" style="filter: invert(1); animation: glitch-anim 0.04s infinite;">
        <path d="M100,10 C40,10 10,60 15,120 C20,180 70,195 100,190 C130,195 180,180 185,120 C190,60 160,10 100,10" fill="white" />
        <circle cx="60" cy="80" r="25" fill="red" />
        <circle cx="140" cy="80" r="25" fill="red" />
    </svg>
</div>

<script>
    /* NARRATIVE DATA - Update with your story-void.txt content */
    const story = {
        intro: "You found story-void.txt. It was a mistake to open it. The system isn't failing because of a bug... it's failing because you're inside.",
        lesson: "Curiosity is the key that unlocks doors that were meant to stay closed. You survived the breach, but the void is now a part of your machine forever.",
        midLevel: [
            "Level 1: Reconnect the nodes before it sees the gap.",
            "Level 2: The Core is unstable. Catch the rhythm.",
            "Level 3: It is whispering. Input the sequence.",
            "Level 4: Reality is slipping. Sync the frequencies.",
        ]
    };

    let lvl = 0, bossHp = 100, mTimer, aInterval;
    const sfx = document.getElementById('sfx');

    function showView(id) {
        document.querySelectorAll('.view').forEach(v => v.classList.remove('active'));
        document.getElementById(id).classList.add('active');
    }

    function testAudio() {
        sfx.volume = 0.3; sfx.play().then(() => { setTimeout(() => { sfx.pause(); sfx.currentTime = 0; sfx.volume = 1; }, 500); });
    }

    function startStory() {
        showView('v-story');
        typeWriter(story.intro, "writer", () => { document.getElementById('cont-btn').style.display = 'block'; });
    }

    function typeWriter(txt, elId, cb) {
        let i = 0; const el = document.getElementById(elId); el.innerHTML = "";
        const t = setInterval(() => {
            el.innerHTML += txt.charAt(i); i++;
            if(i >= txt.length) { clearInterval(t); cb(); }
        }, 40);
    }

    function nextLevel() {
        lvl++;
        if(lvl > 4) { triggerBreach(); return; }
        
        showView('v-game');
        const canvas = document.getElementById('game-canvas');
        const diag = document.getElementById('dialogue-box');
        canvas.innerHTML = ''; clearInterval(aInterval);
        
        diag.innerText = story.midLevel[lvl-1];
        let time = (lvl === 3) ? 15 : 10;
        startTimer(time);

        if(lvl === 1) {
            for(let i=0; i<4; i++) {
                let n = document.createElement('div'); n.className='node';
                n.onclick = function() { this.style.background='red'; this.classList.add('ok'); if(document.querySelectorAll('.ok').length==4) nextLevel(); };
                canvas.appendChild(n);
            }
        } else if(lvl === 2) {
            canvas.innerHTML = '<div class="gauge" id="gb"><div class="safe-zone"></div><div id="needle"></div></div>';
            let p = 0, d = 1;
            aInterval = setInterval(() => {
                p += 4.5 * d; if(p >= 346 || p <= 0) d *= -1;
                document.getElementById('needle').style.left = p + 'px';
            }, 16);
            document.getElementById('gb').onclick = () => { if(p >= 145 && p <= 205) nextLevel(); else fail(); };
        } else if(lvl === 3) {
            let code = Math.floor(Math.random()*8999)+1000;
            canvas.innerHTML = `<h3>DECRYPT: ${code}</h3><input type="text" id="ci" autocomplete="off" style="background:black; color:white; border:1px solid red; font-family:inherit; text-align:center; font-size:24px; width:140px; outline:none;">`;
            const inp = document.getElementById('ci'); setTimeout(()=>inp.focus(),50);
            inp.oninput = () => { if(inp.value == code) nextLevel(); };
        } else if(lvl === 4) {
            canvas.innerHTML = '<h3>SYNC REALITY...</h3><input type="range" id="sl" min="0" max="100" style="width:280px;">';
            let target = Math.floor(Math.random()*80)+10;
            document.getElementById('sl').oninput = (e) => { if(Math.abs(e.target.value - target) < 2) nextLevel(); };
        }
    }

    function startTimer(s) {
        let w = 100; clearInterval(mTimer);
        mTimer = setInterval(() => {
            w -= (100/(s*10));
            document.getElementById('timer-bar').style.width = w + "%";
            if(w <= 0) fail();
        }, 100);
    }

    function fail() {
        sfx.play();
        document.getElementById('jumpscare').style.display = 'flex';
        setTimeout(() => location.reload(), 2000);
    }

    function triggerBreach() {
        showView('v-breach');
        setTimeout(() => {
            document.getElementById('mon-frame').style.opacity = "0";
            setTimeout(() => {
                document.getElementById('boss-layer').style.display = 'flex';
                // BOSS TIMER: NOW 20 SECONDS
                mTimer = setTimeout(fail, 20000); 
            }, 1000);
        }, 3000);
    }

    function damageBoss() {
        bossHp -= 5; // 20 clicks to win
        document.getElementById('boss-hp').style.width = bossHp + "%";
        
        // Impact Visuals
        document.body.style.background = "#300";
        document.getElementById('boss-svg').style.transform = "scale(0.9)";
        setTimeout(() => {
            document.body.style.background = "#000";
            document.getElementById('boss-svg').style.transform = "scale(1)";
        }, 50);

        if(bossHp <= 0) {
            clearTimeout(mTimer);
            document.getElementById('boss-layer').style.display = 'none';
            document.getElementById('mon-frame').style.opacity = "1";
            showView('v-lesson');
            typeWriter(story.lesson, "lesson-text", () => {});
        }
    }
</script>
</body>
</html>
